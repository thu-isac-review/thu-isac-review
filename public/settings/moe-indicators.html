<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教育部審查指標設定</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { 50: '#f0f5fa', 500: '#2c75b3', 600: '#1a5c96', 700: '#004785' } } } } }
    </script>
    <style>
        body { background-color: transparent; margin: 0; padding: 0; font-family: "SF Pro TC", "Noto Sans TC", sans-serif; -webkit-font-smoothing: antialiased; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .modal-enter { animation: modalFadeIn 0.2s ease-out forwards; }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.97) translateY(-5px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        table { table-layout: fixed; width: 100%; } td { word-break: break-word; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen flex flex-col overflow-hidden">

    <div class="shrink-0 px-6 pt-6 pb-4 space-y-4 animate-fade">
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-indigo-50 text-indigo-600 flex items-center justify-center border border-indigo-100 shrink-0">
                    <i class="fa-solid fa-list-check text-xl"></i>
                </div>
                <div>
                    <h2 class="text-xl font-bold text-slate-800 tracking-tight">教育部審查指標設定</h2>
                    <p class="text-xs text-slate-500 mt-1">建置教育部實習查核之「指標代碼」與「審查項目」主檔 (全系統通用)。</p>
                </div>
            </div>
            
            <div class="flex flex-wrap gap-2">
                <button onclick="exportToCSV()" class="h-9 bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 font-bold px-3 rounded-lg text-sm transition-all flex items-center gap-1.5 shadow-sm">
                    <i class="fa-solid fa-file-export text-emerald-600"></i> 匯出清單
                </button>
                <div class="w-px h-6 bg-slate-200 self-center mx-1"></div>
                <button onclick="openDimensionModal()" class="h-9 bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 font-bold px-3 rounded-lg text-sm transition-all flex items-center gap-1.5 shadow-sm">
                    <i class="fa-solid fa-layer-group text-slate-500"></i> 構面設定
                </button>
                <button onclick="openModal()" class="h-9 bg-blue-600 hover:bg-blue-700 text-white font-bold px-4 rounded-lg text-sm transition-all flex items-center gap-1.5 shadow-sm shadow-blue-500/20">
                    <i class="fa-solid fa-plus text-base"></i> 新增指標項目
                </button>
            </div>
        </div>

        <div class="flex flex-col md:flex-row justify-between items-center gap-4 w-full">
            <div class="flex gap-2 w-full md:w-auto">
                <select id="filter-dimension" class="bg-white border border-slate-200 text-slate-700 text-sm font-bold rounded-lg px-3 h-10 outline-none focus:ring-2 focus:ring-blue-500 transition-all cursor-pointer shadow-sm">
                    <option value="all">評鑑構面：全部</option>
                </select>
                <select id="filter-status" class="bg-white border border-slate-200 text-slate-700 text-sm font-bold rounded-lg px-3 h-10 outline-none focus:ring-2 focus:ring-blue-500 transition-all cursor-pointer shadow-sm">
                    <option value="all">狀態：全部</option>
                    <option value="active">狀態：啟用中</option>
                    <option value="inactive">狀態：已停用</option>
                </select>
            </div>
            <div class="relative w-full md:w-72 shadow-sm rounded-lg">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                <input type="text" id="search-input" placeholder="搜尋指標代碼或名稱..." class="w-full bg-white border border-slate-200 rounded-lg pl-9 pr-3 h-10 text-sm outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            </div>
        </div>
    </div>

    <!-- 表格滾動區 -->
    <div class="flex-1 overflow-hidden px-6 pb-6 flex flex-col animate-fade">
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col flex-1 overflow-hidden">
            <div class="flex-1 overflow-auto custom-scrollbar relative">
                <table class="w-full text-left table-fixed">
                    <thead class="bg-slate-50 border-b border-slate-200 sticky top-0 z-10">
                        <tr>
                            <th class="px-6 py-3.5 text-center text-xs font-bold text-slate-500 w-[12%] whitespace-nowrap">指標代碼</th>
                            <th class="px-6 py-3.5 text-left text-xs font-bold text-slate-500 w-[28%]">評鑑構面 (大指標)</th>
                            <th class="px-6 py-3.5 text-left text-xs font-bold text-slate-500 w-[30%]">審查項目名稱</th>
                            <th class="px-6 py-3.5 text-center text-xs font-bold text-slate-500 w-[15%] whitespace-nowrap">系統狀態</th>
                            <th class="px-6 py-3.5 text-center text-xs font-bold text-slate-500 w-[15%]">操作</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-100 text-sm">
                        <tr><td colspan="5" class="px-6 py-16 text-center text-slate-400"><i class="fa-solid fa-circle-notch fa-spin text-3xl mb-3 text-blue-500"></i><p class="font-bold">資料載入與驗證中...</p></td></tr>
                    </tbody>
                </table>
            </div>
            
            <div class="bg-slate-50 border-t border-slate-200 px-6 py-3 flex justify-between items-center shrink-0">
                <div id="pagination-info" class="text-xs font-bold text-slate-500">顯示 0 到 0 筆，共 0 筆</div>
                <div id="pagination-buttons" class="flex gap-1"></div>
            </div>
        </div>
    </div>

    <!-- 彈跳視窗 1：新增/編輯指標 -->
    <div id="data-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-xl overflow-hidden modal-enter relative max-h-[90vh] flex flex-col">
            <div class="px-8 py-5 border-b border-slate-100 flex justify-between items-center shrink-0 bg-slate-50">
                <h3 id="modal-title" class="font-black text-slate-800 text-lg flex items-center gap-2">
                    <i class="fa-solid fa-square-check text-blue-600"></i> 新增審查指標主檔
                </h3>
                <button onclick="closeModal()" class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-slate-600 bg-white shadow-sm border border-slate-200 hover:bg-slate-50 transition-colors shrink-0"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            
            <form id="data-form" class="p-8 space-y-6 overflow-y-auto custom-scrollbar flex-1 bg-white">
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-2">評鑑構面 (大指標) <span class="text-rose-500">*</span></label>
                    <div class="relative">
                        <i class="fa-solid fa-layer-group absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <select id="input-dimension" required class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none font-bold text-slate-700 cursor-pointer shadow-sm">
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-4">
                    <div class="col-span-1">
                        <label class="block text-xs font-bold text-slate-600 mb-2">指標代碼 <span class="text-rose-500">*</span></label>
                        <div class="relative">
                            <i class="fa-solid fa-hashtag absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input type="text" id="input-code" required placeholder="如: 1-1" class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none font-mono font-bold text-slate-700 shadow-sm text-center">
                        </div>
                    </div>
                    <div class="col-span-2">
                        <label class="block text-xs font-bold text-slate-600 mb-2">審查項目名稱 <span class="text-rose-500">*</span></label>
                        <div class="relative">
                            <i class="fa-solid fa-tag absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input type="text" id="input-item-name" required placeholder="例如：(一)實習委員會組成及運作" class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none font-bold text-slate-700 shadow-sm">
                        </div>
                    </div>
                </div>
            </form>
            
            <div class="p-6 border-t border-slate-100 shrink-0 flex gap-4 bg-slate-50">
                <button type="button" onclick="closeModal()" class="flex-1 py-2.5 text-sm font-bold text-slate-600 bg-white border border-slate-200 hover:bg-slate-100 rounded-xl transition-all shadow-sm">取消</button>
                <button type="button" id="btn-submit" onclick="submitForm()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-xl shadow-md shadow-blue-500/20 transition-all flex items-center justify-center gap-2">
                    儲存指標
                </button>
            </div>
        </div>
    </div>

    <!-- 彈跳視窗 2：評鑑構面設定 -->
    <div id="dimension-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeDimensionModal()"></div>
        <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-md overflow-hidden modal-enter relative flex flex-col max-h-[85vh]">
            <div class="px-8 py-5 border-b border-slate-100 flex justify-between items-center bg-white shrink-0">
                <h3 class="font-black text-slate-800 text-lg flex items-center gap-2">
                    <i class="fa-solid fa-layer-group text-blue-600"></i> 評鑑構面設定管理
                </h3>
                <button onclick="closeDimensionModal()" class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-slate-600 bg-white shadow-sm border border-slate-200 hover:bg-slate-50 transition-colors shrink-0"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            
            <div class="p-8 space-y-6 overflow-y-auto custom-scrollbar flex-1 bg-white">
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-2">新增評鑑構面 (大指標)</label>
                    <div class="flex gap-3">
                        <div class="relative flex-1">
                            <i class="fa-solid fa-plus absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                            <input type="text" id="new-dimension-input" placeholder="輸入新構面名稱..." class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all shadow-sm font-bold text-slate-700">
                        </div>
                        <button onclick="addDimension()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl text-sm font-bold transition-all shadow-md shadow-blue-500/20 whitespace-nowrap">新增</button>
                    </div>
                </div>

                <div class="pt-6 border-t border-slate-100">
                    <div class="flex items-center justify-between mb-4">
                        <label class="block text-xs font-bold text-slate-600">現有評鑑構面 (可排序與編輯)</label>
                    </div>
                    <ul id="dimension-list-container" class="space-y-3"></ul>
                </div>
            </div>
            
            <div class="p-6 border-t border-slate-100 shrink-0 flex gap-4 bg-slate-50">
                <button type="button" onclick="closeDimensionModal()" class="w-full py-3 text-sm font-bold text-slate-600 bg-white border border-slate-200 hover:bg-slate-100 rounded-xl transition-all shadow-sm">完成並關閉</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, addDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDcsGfvVKnGmCzWfK5F03saydFpNc1ReYY", authDomain: "thu-isac-review.firebaseapp.com", projectId: "thu-isac-review", storageBucket: "thu-isac-review.firebasestorage.app", messagingSenderId: "453299876735", appId: "1:453299876735:web:1d8babca3315423161a04a" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app); 
        const db = getFirestore(app);

        // 💡 移除學期綁定：設定主檔為全域共用
        const dataCollection = collection(db, "moe_indicators_master");
        const dimensionDocRef = doc(db, "settings", "moe_dimensions");

        let allData = []; 
        let dimensionList = []; 
        let editingId = null; 
        let currentPage = 1; 
        const itemsPerPage = 10;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // 載入評鑑構面 (大指標) 全域主檔
                onSnapshot(dimensionDocRef, (docSnap) => {
                    if (docSnap.exists()) {
                        dimensionList = docSnap.data().list || [];
                    } else {
                        dimensionList = ["一、學校推動實習課程相關機制", "二、學校辦理學生實習課程現況與成效", "三、持續改善機制"];
                        setDoc(dimensionDocRef, { list: dimensionList }); 
                    }
                    renderDimensionUI();
                    renderTable();
                });

                // 💡 直接載入全域指標資料 (不再加上 where 過濾學期)
                onSnapshot(dataCollection, (snapshot) => {
                    allData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    renderTable();
                }, (error) => {
                    document.getElementById('table-body').innerHTML = `<tr><td colspan="5" class="px-6 py-16 text-center text-rose-500 font-bold"><i class="fa-solid fa-lock text-3xl mb-3"></i><p>資料讀取失敗，權限不足。</p></td></tr>`;
                });
            } else {
                document.getElementById('table-body').innerHTML = `<tr><td colspan="5" class="px-6 py-16 text-center text-slate-400 font-bold"><i class="fa-solid fa-shield-halved text-3xl mb-3 text-slate-300"></i><p>請先登入系統以存取資料。</p></td></tr>`;
            }
        });

        // 評鑑構面 (大指標) 管理邏輯
        window.openDimensionModal = () => document.getElementById('dimension-modal').classList.remove('hidden');
        window.closeDimensionModal = () => document.getElementById('dimension-modal').classList.add('hidden');

        function renderDimensionUI() {
            const listContainer = document.getElementById('dimension-list-container');
            listContainer.innerHTML = dimensionList.map((dim, index) => `
                <li class="flex justify-between items-center bg-white border border-slate-200 shadow-sm rounded-xl p-3 text-sm group hover:border-blue-300 transition-all">
                    <div class="flex items-center gap-3 flex-1 overflow-hidden">
                        <div class="flex flex-col opacity-20 group-hover:opacity-100 transition-opacity">
                            <button onclick="moveDimension(${index}, -1)" class="w-6 h-5 rounded hover:bg-slate-100 text-slate-400 hover:text-blue-600 disabled:opacity-0 transition-colors flex items-center justify-center shrink-0" ${index === 0 ? 'disabled' : ''}><i class="fa-solid fa-chevron-up text-[10px]"></i></button>
                            <button onclick="moveDimension(${index}, 1)" class="w-6 h-5 rounded hover:bg-slate-100 text-slate-400 hover:text-blue-600 disabled:opacity-0 transition-colors flex items-center justify-center shrink-0" ${index === dimensionList.length - 1 ? 'disabled' : ''}><i class="fa-solid fa-chevron-down text-[10px]"></i></button>
                        </div>
                        <span id="dim-text-${index}" class="font-bold text-slate-700 truncate">${dim}</span>
                        <input type="text" id="dim-input-${index}" value="${dim}" class="hidden flex-1 border border-blue-400 bg-blue-50 rounded-lg px-3 py-1.5 text-sm font-bold text-blue-900 outline-none focus:ring-2 focus:ring-blue-500 transition-all shadow-inner">
                    </div>
                    <div class="flex items-center ml-3 gap-1.5 shrink-0">
                        <button id="dim-edit-btn-${index}" onclick="editDimension(${index})" class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-blue-600 hover:bg-blue-50 transition-colors border border-transparent hover:border-blue-100 shrink-0"><i class="fa-solid fa-pen text-sm"></i></button>
                        <button id="dim-save-btn-${index}" onclick="saveDimension(${index})" class="hidden w-8 h-8 rounded-lg flex items-center justify-center text-emerald-600 bg-emerald-50 hover:bg-emerald-100 border border-emerald-200 transition-colors shadow-sm shrink-0"><i class="fa-solid fa-check text-base"></i></button>
                        <div class="w-px h-4 bg-slate-200 mx-0.5"></div>
                        <button onclick="removeDimension(${index})" class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-rose-600 hover:bg-rose-50 transition-colors border border-transparent hover:border-rose-100 shrink-0"><i class="fa-solid fa-trash-can text-sm"></i></button>
                    </div>
                </li>
            `).join('');

            const filterSelect = document.getElementById('filter-dimension');
            const currentFilter = filterSelect.value;
            const optionsHtml = dimensionList.map(dim => `<option value="${dim}">${dim}</option>`).join('');
            filterSelect.innerHTML = `<option value="all">評鑑構面：全部</option>` + optionsHtml;
            filterSelect.value = dimensionList.includes(currentFilter) ? currentFilter : 'all';

            const inputSelect = document.getElementById('input-dimension');
            const currentInput = inputSelect.value;
            inputSelect.innerHTML = `<option value="">請選擇評鑑構面...</option>` + optionsHtml;
            inputSelect.value = dimensionList.includes(currentInput) ? currentInput : '';
        }

        window.addDimension = async () => {
            const input = document.getElementById('new-dimension-input');
            const val = input.value.trim();
            if (!val) return;
            if (dimensionList.includes(val)) { alert("此構面已存在！"); return; }
            await updateDoc(dimensionDocRef, { list: [...dimensionList, val] });
            input.value = '';
        };
        window.editDimension = (index) => {
            document.getElementById(`dim-text-${index}`).classList.add('hidden');
            document.getElementById(`dim-input-${index}`).classList.remove('hidden');
            document.getElementById(`dim-input-${index}`).focus();
            document.getElementById(`dim-edit-btn-${index}`).classList.add('hidden');
            document.getElementById(`dim-save-btn-${index}`).classList.remove('hidden');
        };
        window.saveDimension = async (index) => {
            const newVal = document.getElementById(`dim-input-${index}`).value.trim();
            if (!newVal) return;
            const newList = [...dimensionList]; newList[index] = newVal;
            await updateDoc(dimensionDocRef, { list: newList });
        };
        window.moveDimension = async (index, dir) => {
            if (index + dir < 0 || index + dir >= dimensionList.length) return;
            const newList = [...dimensionList];
            const temp = newList[index]; newList[index] = newList[index + dir]; newList[index + dir] = temp;
            await updateDoc(dimensionDocRef, { list: newList });
        };
        window.removeDimension = async (index) => {
            if (confirm(`確定移除「${dimensionList[index]}」嗎？\n(注意：不會刪除已套用此構面的指標項目)`)) {
                const newList = dimensionList.filter((_, i) => i !== index);
                await updateDoc(dimensionDocRef, { list: newList });
            }
        };

        window.openModal = () => {
            if (!editingId) { 
                document.getElementById('data-form').reset();
                document.getElementById('modal-title').innerHTML = '<i class="fa-solid fa-square-check text-blue-600"></i> 新增審查指標主檔';
            }
            document.getElementById('data-modal').classList.remove('hidden');
        };

        window.closeModal = () => { document.getElementById('data-modal').classList.add('hidden'); editingId = null; };
        window.changePage = (page) => { currentPage = page; renderTable(); };

        function renderTable() {
            const tbody = document.getElementById('table-body');
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const filterDimension = document.getElementById('filter-dimension').value;
            const filterStatus = document.getElementById('filter-status').value;

            let filtered = allData.filter(d => {
                const matchSearch = (d.item_name || '').toLowerCase().includes(searchTerm) || (d.code || '').toLowerCase().includes(searchTerm);
                const matchDimension = filterDimension === 'all' || d.dimension === filterDimension;
                const matchStatus = filterStatus === 'all' || (filterStatus === 'active' ? d.is_active : !d.is_active);
                return matchSearch && matchDimension && matchStatus;
            });

            filtered.sort((a, b) => (a.sortOrder || 999) - (b.sortOrder || 999));

            const totalItems = filtered.length;
            const totalPages = Math.ceil(totalItems / itemsPerPage) || 1;
            if (currentPage > totalPages) currentPage = totalPages;

            const startIndex = (currentPage - 1) * itemsPerPage;
            const paginatedItems = filtered.slice(startIndex, startIndex + itemsPerPage);

            document.getElementById('pagination-info').innerText = totalItems > 0 ? `顯示 ${startIndex + 1} 到 ${Math.min(startIndex + itemsPerPage, totalItems)} 筆，共 ${totalItems} 筆` : '尚無資料';
            
            let btnHtml = '';
            btnHtml += `<button onclick="changePage(${currentPage - 1})" class="px-3 py-1 border border-slate-200 rounded-md text-sm font-bold text-slate-600 hover:bg-slate-100 disabled:opacity-40 transition-colors" ${currentPage === 1 ? 'disabled' : ''}>上一頁</button>`;
            btnHtml += `<span class="px-4 py-1 text-sm font-bold text-blue-600 bg-blue-50 rounded-md mx-1">${currentPage} / ${totalPages}</span>`;
            btnHtml += `<button onclick="changePage(${currentPage + 1})" class="px-3 py-1 border border-slate-200 rounded-md text-sm font-bold text-slate-600 hover:bg-slate-100 disabled:opacity-40 transition-colors" ${currentPage === totalPages ? 'disabled' : ''}>下一頁</button>`;
            document.getElementById('pagination-buttons').innerHTML = btnHtml;

            if (totalItems === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-16 text-center text-slate-400 font-bold bg-white">找不到符合條件的指標設定。</td></tr>`;
                return;
            }

            let html = '';
            paginatedItems.forEach((data, idx) => {
                const globalIndex = startIndex + idx; 

                html += `
                <tr class="group bg-white hover:bg-blue-50/40 transition-all duration-150 ${!data.is_active ? 'opacity-60 grayscale-[20%] bg-slate-50/50' : ''}">
                    <td class="px-6 py-4 align-middle text-center">
                        <span class="inline-block bg-slate-100 border border-slate-300 text-slate-600 font-mono font-bold px-2 py-1 rounded shadow-inner text-xs whitespace-nowrap">${data.code || '-'}</span>
                    </td>
                    <td class="px-6 py-4 align-middle">
                        <span class="text-sm font-bold text-slate-700 block">${data.dimension || '-'}</span>
                    </td>
                    <td class="px-6 py-4 align-middle">
                        <span class="text-sm font-bold text-slate-800 leading-tight block">${data.item_name}</span>
                    </td>
                    <td class="px-6 py-4 align-middle text-center whitespace-nowrap">
                        <div class="flex items-center justify-center">
                            <label class="relative inline-flex items-center cursor-pointer group/toggle whitespace-nowrap">
                                <input type="checkbox" class="sr-only peer" ${data.is_active ? 'checked' : ''} onchange="window.toggleStatus('${data.id}', ${data.is_active})">
                                <div class="relative w-11 h-6 bg-slate-200 rounded-full peer peer-checked:after:translate-x-[20px] peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-500 shadow-inner shrink-0 min-w-[44px]"></div>
                                <span class="ml-3 text-sm font-bold ${data.is_active ? 'text-emerald-600' : 'text-slate-400'} whitespace-nowrap">${data.is_active ? '啟用' : '停用'}</span>
                            </label>
                        </div>
                    </td>
                    <td class="px-6 py-4 align-middle text-center">
                        <div class="flex items-center justify-center gap-2 opacity-100 transition-opacity">
                            <button onclick="window.moveData('${data.id}', 'up')" class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-slate-600 hover:bg-slate-100 transition-all disabled:opacity-20 shrink-0" ${globalIndex === 0 ? 'disabled' : ''} title="向上移動">
                                <i class="fa-solid fa-chevron-up text-xs"></i>
                            </button>
                            <button onclick="window.moveData('${data.id}', 'down')" class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-slate-600 hover:bg-slate-100 transition-all disabled:opacity-20 shrink-0" ${globalIndex === filtered.length - 1 ? 'disabled' : ''} title="向下移動">
                                <i class="fa-solid fa-chevron-down text-xs"></i>
                            </button>
                            <button onclick="window.editData('${data.id}')" class="w-8 h-8 rounded-lg flex items-center justify-center bg-blue-50 text-blue-600 hover:bg-blue-100 transition-all shrink-0" title="編輯"><i class="fa-solid fa-pen text-sm"></i></button>
                            <button onclick="window.deleteData('${data.id}', '${data.item_name}')" class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-rose-600 hover:bg-rose-50 transition-all shrink-0" title="刪除"><i class="fa-solid fa-trash-can text-sm"></i></button>
                        </div>
                    </td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        window.exportToCSV = () => {
            if (allData.length === 0) { alert("沒有資料可供匯出！"); return; }
            let csv = '\uFEFF排序,指標代碼,評鑑構面(大指標),審查項目名稱,系統狀態\n';
            let sorted = [...allData].sort((a, b) => (a.sortOrder || 999) - (b.sortOrder || 999));
            sorted.forEach(d => {
                let status = d.is_active ? '啟用' : '停用';
                csv += [d.sortOrder, d.code, d.dimension, d.item_name, status].map(v => `"${(v||'').toString().replace(/"/g, '""')}"`).join(',') + '\n';
            });
            const link = document.createElement('a'); link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
            link.download = `ISAC教育部審查指標_${new Date().toISOString().split('T')[0]}.csv`; link.click();
        };

        window.submitForm = async () => {
            const btn = document.getElementById('btn-submit');
            
            const payload = { 
                dimension: document.getElementById('input-dimension').value.trim(),
                code: document.getElementById('input-code').value.trim(),
                item_name: document.getElementById('input-item-name').value.trim()
                // 💡 移除了學期綁定
            };

            if(!payload.dimension || !payload.code || !payload.item_name) { 
                alert("請填寫所有必填欄位！"); return; 
            }

            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> 儲存中...';
            try {
                if (editingId) { 
                    await updateDoc(doc(db, "moe_indicators_master", editingId), { ...payload, updated_at: serverTimestamp() }); 
                } else {
                    let maxOrder = allData.length > 0 ? Math.max(...allData.map(d => d.sortOrder || 0)) : 0;
                    await addDoc(dataCollection, { ...payload, sortOrder: maxOrder + 10, is_active: true, created_at: serverTimestamp() });
                }
                closeModal();
            } catch (err) { alert("儲存發生錯誤：" + err.message); } 
            finally { btn.disabled = false; btn.innerText = '儲存指標'; }
        };

        window.editData = (id) => {
            const docData = allData.find(d => d.id === id);
            if (!docData) return;
            
            editingId = id;
            document.getElementById('input-dimension').value = docData.dimension || '';
            document.getElementById('input-code').value = docData.code || '';
            document.getElementById('input-item-name').value = docData.item_name || ''; 

            document.getElementById('modal-title').innerHTML = '<i class="fa-solid fa-pen text-blue-600"></i> 編輯審查指標主檔';
            document.getElementById('data-modal').classList.remove('hidden');
        };

        window.toggleStatus = async (id, status) => { await updateDoc(doc(db, "moe_indicators_master", id), { is_active: !status }); };
        
        window.deleteData = async (id, name) => {
            if (confirm(`警告：確定要刪除指標「${name}」嗎？\n此操作無法復原。`)) {
                await deleteDoc(doc(db, "moe_indicators_master", id));
                if (currentPage > Math.ceil((allData.length - 1) / itemsPerPage) || 1) currentPage = Math.ceil((allData.length - 1) / itemsPerPage) || 1;
                renderTable();
            }
        };

        window.moveData = async (id, direction) => {
            let sorted = [...allData].sort((a, b) => (a.sortOrder || 999) - (b.sortOrder || 999));
            const currentIndex = sorted.findIndex(d => d.id === id);
            if (direction === 'up' && currentIndex > 0) {
                await updateDoc(doc(db, "moe_indicators_master", sorted[currentIndex].id), { sortOrder: sorted[currentIndex - 1].sortOrder || (currentIndex-1)*10 });
                await updateDoc(doc(db, "moe_indicators_master", sorted[currentIndex - 1].id), { sortOrder: sorted[currentIndex].sortOrder || currentIndex*10 });
            } else if (direction === 'down' && currentIndex < sorted.length - 1) {
                await updateDoc(doc(db, "moe_indicators_master", sorted[currentIndex].id), { sortOrder: sorted[currentIndex + 1].sortOrder || (currentIndex+1)*10 });
                await updateDoc(doc(db, "moe_indicators_master", sorted[currentIndex + 1].id), { sortOrder: sorted[currentIndex].sortOrder || currentIndex*10 });
            }
        };

        document.getElementById('search-input').addEventListener('input', renderTable);
        document.getElementById('filter-dimension').addEventListener('change', renderTable);
        document.getElementById('filter-status').addEventListener('change', renderTable);
    </script>
</body>
</html>
