<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教育部審查指標設定</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { 50: '#f0f5fa', 500: '#2c75b3', 600: '#1a5c96', 700: '#004785' } } } } }
    </script>
    <style>
        body { background-color: transparent; margin: 0; padding: 0; font-family: "SF Pro TC", "Noto Sans TC", sans-serif; -webkit-font-smoothing: antialiased; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .modal-enter { animation: modalFadeIn 0.2s ease-out forwards; }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.97) translateY(-5px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        table { table-layout: fixed; width: 100%; } td { word-break: break-word; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen flex flex-col overflow-hidden">

    <div class="shrink-0 px-6 pt-6 pb-4 space-y-4 animate-fade">
        <!-- 區塊 1：頂部標題與動作按鈕 -->
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-indigo-50 text-indigo-600 flex items-center justify-center border border-indigo-100 shrink-0">
                    <i class="fa-solid fa-list-check text-xl"></i>
                </div>
                <div>
                    <h2 class="text-xl font-bold text-slate-800 tracking-tight">教育部審查指標設定</h2>
                    <p class="text-xs text-slate-500 mt-1">建置教育部實習查核之「評鑑構面」與「審查項目」主檔，供後續各類應繳文件綁定檢核點使用。</p>
                </div>
            </div>
            
            <div class="flex flex-wrap gap-2">
                <button onclick="exportToCSV()" class="h-9 bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 font-bold px-3 rounded-lg text-sm transition-all flex items-center gap-1.5 shadow-sm">
                    <i class="fa-solid fa-file-export text-emerald-600"></i> 匯出清單
                </button>
                <div class="w-px h-6 bg-slate-200 self-center mx-1"></div>
                <button onclick="openModal()" class="h-9 bg-blue-600 hover:bg-blue-700 text-white font-bold px-4 rounded-lg text-sm transition-all flex items-center gap-1.5 shadow-sm shadow-blue-500/20">
                    <i class="fa-solid fa-plus text-base"></i> 新增指標項目
                </button>
            </div>
        </div>

        <!-- 區塊 2：篩選與搜尋列 -->
        <div class="flex flex-col md:flex-row justify-between items-center gap-4 w-full">
            <div class="flex gap-2 w-full md:w-auto">
                <select id="filter-dimension" class="bg-white border border-slate-200 text-slate-700 text-sm font-bold rounded-lg px-3 h-10 outline-none focus:ring-2 focus:ring-blue-500 transition-all cursor-pointer shadow-sm">
                    <option value="all">評鑑構面：全部</option>
                    <!-- 動態生成 -->
                </select>
                <select id="filter-status" class="bg-white border border-slate-200 text-slate-700 text-sm font-bold rounded-lg px-3 h-10 outline-none focus:ring-2 focus:ring-blue-500 transition-all cursor-pointer shadow-sm">
                    <option value="all">狀態：全部</option>
                    <option value="active">狀態：啟用中</option>
                    <option value="inactive">狀態：已停用</option>
                </select>
            </div>
            <div class="relative w-full md:w-72 shadow-sm rounded-lg">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                <input type="text" id="search-input" placeholder="搜尋項目名稱或說明..." class="w-full bg-white border border-slate-200 rounded-lg pl-9 pr-3 h-10 text-sm outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            </div>
        </div>
    </div>

    <!-- 表格滾動區 -->
    <div class="flex-1 overflow-hidden px-6 pb-6 flex flex-col animate-fade">
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col flex-1 overflow-hidden">
            <div class="flex-1 overflow-auto custom-scrollbar relative">
                <table class="w-full text-left table-fixed">
                    <thead class="bg-slate-50 border-b border-slate-200 sticky top-0 z-10">
                        <tr>
                            <th class="px-6 py-3.5 text-left text-xs font-bold text-slate-500 w-[20%]">評鑑構面 (大指標)</th>
                            <th class="px-6 py-3.5 text-left text-xs font-bold text-slate-500 w-[25%]">審查項目</th>
                            <th class="px-6 py-3.5 text-left text-xs font-bold text-slate-500 w-[30%]">內涵與參考作法</th>
                            <th class="px-6 py-3.5 text-center text-xs font-bold text-slate-500 w-[12%]">系統狀態</th>
                            <th class="px-6 py-3.5 text-center text-xs font-bold text-slate-500 w-[13%]">操作</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-100 text-sm">
                        <tr><td colspan="5" class="px-6 py-16 text-center text-slate-400"><i class="fa-solid fa-circle-notch fa-spin text-3xl mb-3 text-blue-500"></i><p class="font-bold">資料載入與驗證中...</p></td></tr>
                    </tbody>
                </table>
            </div>
            
            <div class="bg-slate-50 border-t border-slate-200 px-6 py-3 flex justify-between items-center shrink-0">
                <div id="pagination-info" class="text-xs font-bold text-slate-500">顯示 0 到 0 筆，共 0 筆</div>
                <div id="pagination-buttons" class="flex gap-1"></div>
            </div>
        </div>
    </div>

    <!-- ==========================================
         彈跳視窗：新增/編輯指標
         ========================================== -->
    <div id="data-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-2xl overflow-hidden modal-enter relative max-h-[90vh] flex flex-col">
            <div class="px-8 py-5 border-b border-slate-100 flex justify-between items-center shrink-0 bg-slate-50">
                <h3 id="modal-title" class="font-black text-slate-800 text-lg flex items-center gap-2">
                    <i class="fa-solid fa-square-check text-blue-600"></i> 新增審查指標主檔
                </h3>
                <button onclick="closeModal()" class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-slate-600 bg-white shadow-sm border border-slate-200 hover:bg-slate-50 transition-colors"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            
            <form id="data-form" class="p-8 space-y-6 overflow-y-auto custom-scrollbar flex-1 bg-white">
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-2">評鑑構面 (大指標) - <span class="text-blue-500">可下拉選擇或直接輸入新增</span> <span class="text-rose-500">*</span></label>
                    <div class="relative">
                        <i class="fa-solid fa-layer-group absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <!-- 改為 text input + datalist，允許自訂輸入 -->
                        <input type="text" id="input-dimension" list="dimension-options" required placeholder="請選擇或輸入新的評鑑構面..." class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none font-bold text-slate-700 shadow-sm">
                        <datalist id="dimension-options">
                            <!-- 動態生成 -->
                        </datalist>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-2">審查項目 <span class="text-rose-500">*</span></label>
                    <div class="relative">
                        <i class="fa-solid fa-tag absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="text" id="input-item-name" required placeholder="例如：(一)實習委員會組成及運作" class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none font-bold text-slate-700 shadow-sm">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-2">內涵與學校參考作法 <span class="text-rose-500">*</span></label>
                    <textarea id="input-description" required rows="5" placeholder="例如：▶ 依「專科以上學校產學合作實施辦法」設立校級及院、系、所學位學程實習委員會..." class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none font-medium text-slate-700 shadow-sm resize-none leading-relaxed"></textarea>
                    <p class="text-[11px] text-slate-400 mt-2 font-medium">請輸入教育部指標文件中的「內涵」與「學校參考作法」，作為審查員未來核對時的依據。</p>
                </div>
            </form>
            
            <div class="p-6 border-t border-slate-100 shrink-0 flex gap-4 bg-slate-50">
                <button type="button" onclick="closeModal()" class="flex-1 py-2.5 text-sm font-bold text-slate-600 bg-white border border-slate-200 hover:bg-slate-100 rounded-xl transition-all shadow-sm">取消</button>
                <button type="button" id="btn-submit" onclick="submitForm()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-xl shadow-md shadow-blue-500/20 transition-all flex items-center justify-center gap-2">
                    儲存指標
                </button>
            </div>
        </div>
    </div>

    <!-- Firebase 邏輯 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDcsGfvVKnGmCzWfK5F03saydFpNc1ReYY", authDomain: "thu-isac-review.firebaseapp.com", projectId: "thu-isac-review", storageBucket: "thu-isac-review.firebasestorage.app", messagingSenderId: "453299876735", appId: "1:453299876735:web:1d8babca3315423161a04a" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app); 
        const db = getFirestore(app);
        
        const dataCollection = collection(db, "moe_indicators_master");

        let allData = []; 
        let uniqueDimensions = []; // 儲存動態抓取的獨立大指標
        let editingId = null; 
        let currentPage = 1; 
        const itemsPerPage = 10;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                onSnapshot(dataCollection, (snapshot) => {
                    allData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    
                    // 動態萃取所有不重複的「評鑑構面 (大指標)」
                    const dims = new Set();
                    allData.forEach(d => { if(d.dimension) dims.add(d.dimension); });
                    uniqueDimensions = Array.from(dims);
                    
                    // 若資料庫完全為空，給予預設選項方便操作
                    if(uniqueDimensions.length === 0) {
                        uniqueDimensions = [
                            "一、學校推動實習課程相關機制",
                            "二、學校辦理學生實習課程現況與成效",
                            "三、持續改善機制"
                        ];
                    }
                    
                    updateDimensionDropdowns();
                    renderTable();
                }, (error) => {
                    document.getElementById('table-body').innerHTML = `<tr><td colspan="5" class="px-6 py-16 text-center text-rose-500 font-bold"><i class="fa-solid fa-lock text-3xl mb-3"></i><p>資料讀取失敗，權限不足。</p></td></tr>`;
                });
            } else {
                document.getElementById('table-body').innerHTML = `<tr><td colspan="5" class="px-6 py-16 text-center text-slate-400 font-bold"><i class="fa-solid fa-shield-halved text-3xl mb-3 text-slate-300"></i><p>請先登入系統以存取資料。</p></td></tr>`;
            }
        });

        // 獨立更新篩選器與 datalist，避免打字時被重新渲染中斷
        function updateDimensionDropdowns() {
            // 1. 更新上方的篩選器
            const filterSelect = document.getElementById('filter-dimension');
            const currentFilter = filterSelect.value;
            let filterHtml = `<option value="all">評鑑構面：全部</option>`;
            uniqueDimensions.forEach(dim => {
                filterHtml += `<option value="${dim}">${dim}</option>`;
            });
            filterSelect.innerHTML = filterHtml;
            // 保留原本的選擇狀態
            filterSelect.value = uniqueDimensions.includes(currentFilter) ? currentFilter : 'all';

            // 2. 更新表單的 datalist
            const datalist = document.getElementById('dimension-options');
            let datalistHtml = '';
            uniqueDimensions.forEach(dim => {
                datalistHtml += `<option value="${dim}"></option>`;
            });
            datalist.innerHTML = datalistHtml;
        }

        window.openModal = () => {
            if (!editingId) { 
                document.getElementById('data-form').reset();
                document.getElementById('modal-title').innerHTML = '<i class="fa-solid fa-square-check text-blue-600"></i> 新增審查指標主檔';
            }
            document.getElementById('data-modal').classList.remove('hidden');
        };

        window.closeModal = () => { document.getElementById('data-modal').classList.add('hidden'); editingId = null; };
        window.changePage = (page) => { currentPage = page; renderTable(); };

        function renderTable() {
            const tbody = document.getElementById('table-body');
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const filterDimension = document.getElementById('filter-dimension').value;
            const filterStatus = document.getElementById('filter-status').value;

            let filtered = allData.filter(d => {
                const matchSearch = (d.item_name || '').toLowerCase().includes(searchTerm) || (d.description || '').toLowerCase().includes(searchTerm);
                const matchDimension = filterDimension === 'all' || d.dimension === filterDimension;
                const matchStatus = filterStatus === 'all' || (filterStatus === 'active' ? d.is_active : !d.is_active);
                return matchSearch && matchDimension && matchStatus;
            });

            filtered.sort((a, b) => (a.sortOrder || 999) - (b.sortOrder || 999));

            const totalItems = filtered.length;
            const totalPages = Math.ceil(totalItems / itemsPerPage) || 1;
            if (currentPage > totalPages) currentPage = totalPages;

            const startIndex = (currentPage - 1) * itemsPerPage;
            const paginatedItems = filtered.slice(startIndex, startIndex + itemsPerPage);

            document.getElementById('pagination-info').innerText = totalItems > 0 ? `顯示 ${startIndex + 1} 到 ${Math.min(startIndex + itemsPerPage, totalItems)} 筆，共 ${totalItems} 筆` : '尚無資料';
            
            let btnHtml = '';
            btnHtml += `<button onclick="changePage(${currentPage - 1})" class="px-3 py-1 border border-slate-200 rounded-md text-sm font-bold text-slate-600 hover:bg-slate-100 disabled:opacity-40 transition-colors" ${currentPage === 1 ? 'disabled' : ''}>上一頁</button>`;
            btnHtml += `<span class="px-4 py-1 text-sm font-bold text-blue-600 bg-blue-50 rounded-md mx-1">${currentPage} / ${totalPages}</span>`;
            btnHtml += `<button onclick="changePage(${currentPage + 1})" class="px-3 py-1 border border-slate-200 rounded-md text-sm font-bold text-slate-600 hover:bg-slate-100 disabled:opacity-40 transition-colors" ${currentPage === totalPages ? 'disabled' : ''}>下一頁</button>`;
            document.getElementById('pagination-buttons').innerHTML = btnHtml;

            if (totalItems === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-16 text-center text-slate-400 font-bold bg-white">找不到符合條件的指標設定。</td></tr>`;
                return;
            }

            let html = '';
            paginatedItems.forEach((data, idx) => {
                const globalIndex = startIndex + idx; 

                // 簡單判斷徽章顏色，遇到未知的自訂大指標就使用預設的靛藍色
                let dimBadgeColor = "bg-indigo-50 text-indigo-700 border-indigo-200";
                if (data.dimension && data.dimension.includes("二、")) dimBadgeColor = "bg-emerald-50 text-emerald-700 border-emerald-200";
                if (data.dimension && data.dimension.includes("三、")) dimBadgeColor = "bg-amber-50 text-amber-700 border-amber-200";

                let dimensionBadge = `<span class="inline-flex items-center px-2.5 py-1 rounded-md border ${dimBadgeColor} text-xs font-bold whitespace-nowrap"><i class="fa-solid fa-layer-group mr-1.5"></i> ${data.dimension}</span>`;

                html += `
                <tr class="group bg-white hover:bg-blue-50/40 transition-all duration-150 ${!data.is_active ? 'opacity-60 grayscale-[20%] bg-slate-50/50' : ''}">
                    <td class="px-6 py-4 align-middle">${dimensionBadge}</td>
                    <td class="px-6 py-4 align-middle">
                        <span class="text-sm font-bold text-slate-800 leading-tight block">${data.item_name}</span>
                    </td>
                    <td class="px-6 py-4 align-middle">
                        <div class="text-xs text-slate-500 line-clamp-3 leading-relaxed whitespace-pre-wrap" title="${data.description}">${data.description}</div>
                    </td>
                    <td class="px-6 py-4 align-middle text-center">
                        <div class="flex items-center justify-center">
                            <label class="relative inline-flex items-center cursor-pointer group/toggle">
                                <input type="checkbox" class="sr-only peer" ${data.is_active ? 'checked' : ''} onchange="window.toggleStatus('${data.id}', ${data.is_active})">
                                <div class="relative w-11 h-6 bg-slate-200 rounded-full peer peer-checked:after:translate-x-[20px] peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-500 shadow-inner shrink-0 min-w-[44px]"></div>
                                <span class="ml-3 text-sm font-bold ${data.is_active ? 'text-emerald-600' : 'text-slate-400'}">${data.is_active ? '啟用' : '停用'}</span>
                            </label>
                        </div>
                    </td>
                    <td class="px-6 py-4 align-middle text-center">
                        <div class="flex items-center justify-center gap-2 opacity-100 transition-opacity">
                            <button onclick="window.moveData('${data.id}', 'up')" class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-slate-600 hover:bg-slate-100 transition-all disabled:opacity-20" ${globalIndex === 0 ? 'disabled' : ''} title="向上移動">
                                <i class="fa-solid fa-chevron-up text-xs"></i>
                            </button>
                            <button onclick="window.moveData('${data.id}', 'down')" class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-slate-600 hover:bg-slate-100 transition-all disabled:opacity-20" ${globalIndex === filtered.length - 1 ? 'disabled' : ''} title="向下移動">
                                <i class="fa-solid fa-chevron-down text-xs"></i>
                            </button>
                            <button onclick="window.editData('${data.id}')" class="w-8 h-8 rounded-lg flex items-center justify-center bg-blue-50 text-blue-600 hover:bg-blue-100 transition-all" title="編輯"><i class="fa-solid fa-pen text-sm"></i></button>
                            <button onclick="window.deleteData('${data.id}', '${data.item_name}')" class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-rose-600 hover:bg-rose-50 transition-all" title="刪除"><i class="fa-solid fa-trash-can text-sm"></i></button>
                        </div>
                    </td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        window.exportToCSV = () => {
            if (allData.length === 0) { alert("沒有資料可供匯出！"); return; }
            let csv = '\uFEFF排序,評鑑構面(大指標),審查項目,內涵與參考作法,系統狀態\n';
            let sorted = [...allData].sort((a, b) => (a.sortOrder || 999) - (b.sortOrder || 999));
            sorted.forEach(d => {
                let status = d.is_active ? '啟用' : '停用';
                csv += [d.sortOrder, d.dimension, d.item_name, d.description, status].map(v => `"${(v||'').toString().replace(/"/g, '""')}"`).join(',') + '\n';
            });
            const link = document.createElement('a'); link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
            link.download = `ISAC教育部審查指標主檔_${new Date().toISOString().split('T')[0]}.csv`; link.click();
        };

        window.submitForm = async () => {
            const btn = document.getElementById('btn-submit');
            
            const payload = { 
                dimension: document.getElementById('input-dimension').value.trim(),
                item_name: document.getElementById('input-item-name').value.trim(), 
                description: document.getElementById('input-description').value.trim(), 
            };

            if(!payload.dimension || !payload.item_name || !payload.description) { 
                alert("請填寫所有必填欄位！"); return; 
            }

            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> 儲存中...';
            try {
                if (editingId) { 
                    await updateDoc(doc(db, "moe_indicators_master", editingId), { ...payload, updated_at: serverTimestamp() }); 
                } else {
                    let maxOrder = allData.length > 0 ? Math.max(...allData.map(d => d.sortOrder || 0)) : 0;
                    await addDoc(dataCollection, { ...payload, sortOrder: maxOrder + 10, is_active: true, created_at: serverTimestamp() });
                }
                closeModal();
            } catch (err) { alert("儲存發生錯誤：" + err.message); } 
            finally { btn.disabled = false; btn.innerText = '儲存指標'; }
        };

        window.editData = (id) => {
            const docData = allData.find(d => d.id === id);
            if (!docData) return;
            
            editingId = id;
            document.getElementById('input-dimension').value = docData.dimension || '';
            document.getElementById('input-item-name').value = docData.item_name || ''; 
            document.getElementById('input-description').value = docData.description || ''; 

            document.getElementById('modal-title').innerHTML = '<i class="fa-solid fa-pen text-blue-600"></i> 編輯審查指標主檔';
            document.getElementById('data-modal').classList.remove('hidden');
        };

        window.toggleStatus = async (id, status) => { await updateDoc(doc(db, "moe_indicators_master", id), { is_active: !status }); };
        
        window.deleteData = async (id, name) => {
            if (confirm(`警告：確定要刪除指標「${name}」嗎？\n此操作無法復原。`)) {
                await deleteDoc(doc(db, "moe_indicators_master", id));
                if (currentPage > Math.ceil((allData.length - 1) / itemsPerPage) || 1) currentPage = Math.ceil((allData.length - 1) / itemsPerPage) || 1;
                renderTable();
            }
        };

        window.moveData = async (id, direction) => {
            let sorted = [...allData].sort((a, b) => (a.sortOrder || 999) - (b.sortOrder || 999));
            const currentIndex = sorted.findIndex(d => d.id === id);
            
            if (direction === 'up' && currentIndex > 0) {
                await updateDoc(doc(db, "moe_indicators_master", sorted[currentIndex].id), { sortOrder: sorted[currentIndex - 1].sortOrder || (currentIndex-1)*10 });
                await updateDoc(doc(db, "moe_indicators_master", sorted[currentIndex - 1].id), { sortOrder: sorted[currentIndex].sortOrder || currentIndex*10 });
            } else if (direction === 'down' && currentIndex < sorted.length - 1) {
                await updateDoc(doc(db, "moe_indicators_master", sorted[currentIndex].id), { sortOrder: sorted[currentIndex + 1].sortOrder || (currentIndex+1)*10 });
                await updateDoc(doc(db, "moe_indicators_master", sorted[currentIndex + 1].id), { sortOrder: sorted[currentIndex].sortOrder || currentIndex*10 });
            }
        };

        document.getElementById('search-input').addEventListener('input', renderTable);
        document.getElementById('filter-dimension').addEventListener('change', renderTable);
        document.getElementById('filter-status').addEventListener('change', renderTable);
    </script>
</body>
</html>
