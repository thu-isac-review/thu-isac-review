<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>機構文件審查設定</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { 50: '#f0f5fa', 500: '#2c75b3', 600: '#1a5c96', 700: '#004785' } } } } }
    </script>
    <style>
        body { background-color: transparent; margin: 0; padding: 0; font-family: "SF Pro TC", "Noto Sans TC", sans-serif; -webkit-font-smoothing: antialiased; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .modal-enter { animation: modalFadeIn 0.2s ease-out forwards; }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.97) translateY(-5px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        table { table-layout: fixed; width: 100%; } td { word-break: break-word; }
        .filter-btn { height: 40px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen flex flex-col overflow-hidden font-bold">

    <div class="shrink-0 px-6 pt-6 pb-4 space-y-4 animate-fade">
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center border border-blue-100 shrink-0">
                    <i class="fa-solid fa-file-pen text-xl"></i>
                </div>
                <div>
                    <h2 class="text-xl font-bold text-slate-800 tracking-tight">機構文件審查設定</h2>
                    <p class="text-xs text-slate-500 mt-1 font-bold">設定參與實習的機構與企業應繳交之佐證文件，並規範標準上傳檔名規則。</p>
                </div>
            </div>
            
            <div class="flex flex-wrap gap-2">
                <button onclick="window.exportToCSV()" class="h-9 bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 font-bold px-3 rounded-lg text-sm transition-all flex items-center gap-1.5 shadow-sm">
                    <i class="fa-solid fa-file-export text-emerald-600"></i> 匯出清單
                </button>
                <div class="w-px h-6 bg-slate-200 self-center mx-1"></div>
                <button onclick="window.openDocModal()" class="h-9 bg-blue-600 hover:bg-blue-700 text-white font-bold px-4 rounded-lg text-sm transition-all flex items-center gap-1.5 shadow-sm shadow-blue-500/20 active:scale-95">
                    <i class="fa-solid fa-plus text-base"></i> 新增機構文件
                </button>
            </div>
        </div>

        <div class="flex flex-col md:flex-row justify-between items-center gap-4 w-full z-20 relative">
            <div id="advanced-filters-container" class="flex flex-wrap gap-2 w-full md:w-auto flex-1 items-center font-bold">
                <!-- 篩選器動態載入 -->
            </div>
            
            <div class="relative w-full md:w-72 shadow-sm rounded-lg shrink-0">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                <input type="text" id="search-input" oninput="window.renderTable()" placeholder="搜尋文件名稱或指標代碼..." class="w-full bg-white border border-slate-200 rounded-lg pl-9 pr-3 h-10 text-sm outline-none focus:ring-2 focus:ring-blue-500 transition-all font-bold">
            </div>
        </div>
    </div>

    <!-- 總表格區 -->
    <div class="flex-1 overflow-hidden px-6 pb-6 flex flex-col animate-fade">
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col flex-1 overflow-hidden font-bold">
            <div class="flex-1 overflow-auto custom-scrollbar relative">
                <table class="w-full text-left table-fixed min-w-[1100px]">
                    <thead class="bg-slate-50 border-b border-slate-200 sticky top-0 z-10 shadow-sm text-center">
                        <tr>
                            <th class="px-5 py-3.5 text-xs font-bold text-slate-500 w-[120px] whitespace-nowrap">指標代碼</th>
                            <th class="px-5 py-3.5 text-xs font-bold text-slate-500 w-[20%] text-center">審查項目名稱</th>
                            <th class="px-5 py-3.5 text-xs font-bold text-slate-500 w-[24%] text-center">要求文件名稱</th>
                            <th class="px-5 py-3.5 text-xs font-bold text-slate-500 min-w-[320px] text-center">上傳檔名規則</th>
                            <th class="px-5 py-3.5 text-xs font-bold text-slate-500 w-[100px] whitespace-nowrap">系統狀態</th>
                            <th class="px-4 py-3.5 text-xs font-bold text-slate-500 w-[110px]">操作</th>
                        </tr>
                    </thead>
                    <tbody id="doc-table-body" class="divide-y divide-slate-100 text-sm">
                        <tr><td colspan="6" class="px-6 py-16 text-center text-slate-400 font-bold bg-white"><i class="fa-solid fa-circle-notch fa-spin text-3xl mb-3 text-blue-500"></i><p>資料載入與驗證中...</p></td></tr>
                    </tbody>
                </table>
            </div>
            <div class="bg-slate-50 border-t border-slate-200 px-6 py-3 flex justify-between items-center shrink-0">
                <div id="pagination-info" class="text-xs font-bold text-slate-500">顯示 0 到 0 筆，共 0 筆</div>
                <div id="pagination-buttons" class="flex gap-1"></div>
            </div>
        </div>
    </div>

    <!-- 彈跳視窗 (左右布局) -->
    <div id="doc-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="window.closeDocModal()"></div>
        <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-6xl overflow-hidden modal-enter relative max-h-[95vh] flex flex-col">
            <div class="px-8 py-5 border-b border-slate-100 flex justify-between items-center shrink-0 bg-slate-50">
                <h3 id="modal-title" class="font-black text-slate-800 text-lg flex items-center gap-2">
                    <i class="fa-solid fa-file-circle-plus text-blue-600"></i> 新增機構文件
                </h3>
                <button onclick="window.closeDocModal()" class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-slate-600 bg-white shadow-sm border border-slate-200 hover:bg-slate-50 transition-colors shrink-0"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            
            <form id="doc-form" class="p-8 flex flex-col md:flex-row gap-8 min-h-0 bg-white overflow-hidden flex-1 items-stretch">
                
                <!-- 左側：設定與檔名規則 -->
                <div class="flex-[1.2] flex flex-col space-y-4 min-h-0">
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1.5">對應之教育部審查指標 <span class="text-rose-500">*</span></label>
                        <select id="input-indicator" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none font-bold text-slate-700 cursor-pointer shadow-sm">
                            <option value="">請選擇要綁定的主檔指標...</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-3 gap-4">
                        <div class="col-span-1">
                            <label class="block text-xs font-bold text-slate-600 mb-1.5">繳交屬性 <span class="text-rose-500">*</span></label>
                            <select id="input-required" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none font-bold text-slate-700 cursor-pointer shadow-sm">
                                <option value="true" selected>必繳項目</option>
                                <option value="false">選繳 / 補充</option>
                            </select>
                        </div>
                        <div class="col-span-1">
                            <label class="block text-xs font-bold text-slate-600 mb-1.5">數量限制 <span class="text-rose-500">*</span></label>
                            <select id="input-file-limit" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none font-bold text-slate-700 cursor-pointer shadow-sm">
                                <option value="single" selected>單一檔案</option>
                                <option value="multiple">多檔上傳</option>
                            </select>
                        </div>
                        <div class="col-span-1">
                            <label class="block text-xs font-bold text-slate-600 mb-1.5">文件子指標 <span class="text-rose-500">*</span></label>
                            <input type="text" id="input-sub-indicator" required placeholder="如：1" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none font-bold text-slate-700 shadow-sm">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1.5">要求上傳文件名稱 <span class="text-rose-500">*</span></label>
                        <input type="text" id="input-name" required placeholder="例如：機構實習評估表" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none font-bold text-slate-800 shadow-sm">
                    </div>

                    <!-- 檔名規則區 -->
                    <div class="bg-blue-50/40 border border-blue-100 rounded-xl p-4 flex flex-col justify-center flex-1 min-h-0 overflow-hidden">
                        <div class="space-y-1.5">
                            <label class="block text-[11px] font-bold text-blue-500">【機構文件】預設檔名</label>
                            <input type="text" id="input-filename" placeholder="請手動設定檔名規則..." class="w-full bg-white border border-slate-200 rounded-lg px-3 py-2 text-sm font-mono font-bold text-blue-600 shadow-sm outline-none transition-all focus:ring-2 focus:ring-blue-400">
                        </div>
                    </div>

                    <!-- 固定底部系統變數 -->
                    <div class="bg-white p-3.5 rounded-xl border border-slate-200 shadow-sm shrink-0">
                        <div class="flex items-center gap-2 mb-2 border-b border-slate-100 pb-2">
                            <i class="fa-solid fa-circle-info text-blue-500"></i>
                            <strong class="text-xs text-slate-700">系統變數清單：</strong>
                        </div>
                        <div class="flex flex-wrap gap-1.5 text-[10px] font-mono leading-relaxed mb-2">
                            <span class="bg-slate-100 border border-slate-200 px-1.5 py-0.5 rounded text-slate-600">[指標代碼]</span>
                            <span class="bg-slate-100 border border-slate-200 px-1.5 py-0.5 rounded text-slate-600">[子指標]</span>
                            <span class="bg-slate-100 border border-slate-200 px-1.5 py-0.5 rounded text-slate-600">[文件名稱]</span>
                            <span class="bg-slate-100 border border-slate-200 px-1.5 py-0.5 rounded text-slate-600">[學期]</span>
                            <span class="bg-indigo-50 border border-indigo-200 px-1.5 py-0.5 rounded text-indigo-700">[機構名稱]</span>
                            <span class="bg-emerald-50 border border-emerald-200 px-1.5 py-0.5 rounded text-emerald-700" title="指開課系所">[系所代碼]<span class="opacity-50">(開課)</span></span>
                            <span class="bg-emerald-50 border border-emerald-200 px-1.5 py-0.5 rounded text-emerald-700" title="指開課系所">[系所名稱]<span class="opacity-50">(開課)</span></span>
                            <span class="bg-blue-50 border border-blue-200 px-1.5 py-0.5 rounded text-blue-700">[流水號]</span>
                        </div>
                        <div class="text-[10px] text-slate-500 font-medium leading-tight">
                            <strong class="text-blue-600">多檔流水號機制：</strong> 若選擇「多檔上傳」並使用 <code>[流水號]</code> 變數，系統將依檔案原名(A-Z)自動編號001, 002...。
                        </div>
                    </div>
                </div>

                <!-- 右側：檢核指標 -->
                <div class="flex-[0.8] flex flex-col border-t md:border-t-0 md:border-l border-slate-100 pt-6 md:pt-0 md:pl-8 min-h-0">
                    <div class="mb-3 shrink-0">
                        <label class="block text-sm font-bold text-slate-800">文件檢核指標設定</label>
                        <p class="text-[11px] text-slate-500 mt-1 font-medium leading-relaxed">請列出具體檢核項目，按下 <kbd class="bg-slate-100 border border-slate-200 px-1 rounded text-slate-600 font-mono">Enter</kbd> 可自動編號。</p>
                    </div>
                    <textarea id="input-checklists" placeholder="例如：&#10;1. 是否有機構單位蓋章&#10;2. 實習內容與工作項目是否完整填寫" class="w-full flex-1 bg-slate-50 border border-slate-200 rounded-xl p-5 text-base focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none font-bold text-slate-700 shadow-sm resize-none custom-scrollbar leading-loose"></textarea>
                </div>
            </form>
            
            <div class="p-6 border-t border-slate-100 shrink-0 flex gap-4 bg-slate-50 font-bold">
                <button type="button" onclick="window.closeDocModal()" class="flex-1 py-3.5 text-sm text-slate-600 bg-white border border-slate-200 hover:bg-slate-100 rounded-xl transition-all shadow-sm">取消返回</button>
                <button type="button" id="btn-submit" onclick="window.submitDocForm()" class="flex-[1.5] bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl shadow-md shadow-blue-500/20 transition-all flex items-center justify-center gap-2 active:scale-95">儲存機構文件設定</button>
            </div>
        </div>
    </div>

    <!-- Firebase 邏輯 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDcsGfvVKnGmCzWfK5F03saydFpNc1ReYY", authDomain: "thu-isac-review.firebaseapp.com", projectId: "thu-isac-review", storageBucket: "thu-isac-review.firebasestorage.app", messagingSenderId: "453299876735", appId: "1:453299876735:web:1d8babca3315423161a04a" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app); 
        const db = getFirestore(app);
        
        // 💡 綁定機構文件集合
        const docsCollection = collection(db, "institution_files_settings");
        const indicatorsCollection = collection(db, "moe_indicators_master");

        let allDocs = [], allIndicators = [], editingId = null, currentPage = 1, itemsPerPage = 10;
        
        const filterSelections = { indicatorName: new Set(), status: new Set() };
        const filterDefinitions = [
            { key: 'indicatorName', label: '審查項目名稱', searchable: true, width: 'w-72' },
            { key: 'status', label: '系統狀態', searchable: false, width: 'w-56' }
        ];
        let isFiltersInitialized = false;

        const setupAutoNumbering = () => {
            const textarea = document.getElementById('input-checklists');
            if (!textarea || textarea.dataset.bound) return;
            textarea.dataset.bound = "true";
            textarea.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const start = this.selectionStart, end = this.selectionEnd, text = this.value;
                    const textBefore = text.substring(0, start), textAfter = text.substring(end);
                    const lines = textBefore.split('\n'), currentLine = lines[lines.length - 1] || '';
                    const match = currentLine.match(/^(\d+)\.\s*/);
                    if (match) {
                        if (currentLine.trim() === match[0].trim()) {
                            this.value = textBefore.substring(0, textBefore.length - currentLine.length) + '\n' + textAfter;
                            this.selectionStart = this.selectionEnd = start - currentLine.length + 1;
                        } else {
                            const nextNum = parseInt(match[1], 10) + 1;
                            const insertText = '\n' + nextNum + '. ';
                            this.value = textBefore + insertText + textAfter;
                            this.selectionStart = this.selectionEnd = start + insertText.length;
                        }
                    } else {
                        this.value = textBefore + '\n' + textAfter;
                        this.selectionStart = this.selectionEnd = start + 1;
                    }
                }
            });
        };

        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', setupAutoNumbering);
        else setupAutoNumbering();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                onSnapshot(indicatorsCollection, (snapshot) => {
                    allIndicators = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    allIndicators.sort((a, b) => (a.sortOrder || 999) - (b.sortOrder || 999));
                    updateIndicatorDropdown();
                    if (isFiltersInitialized) renderFilterDropdowns(); 
                });
                onSnapshot(docsCollection, (snapshot) => {
                    allDocs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    renderFilterDropdowns(); window.renderTable();
                }, (error) => {
                    const tbody = document.getElementById('doc-table-body');
                    if (tbody) tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-16 text-center text-rose-500 font-bold">資料存取失敗，請重新整理頁面。</td></tr>`;
                });
            } else {
                const tbody = document.getElementById('doc-table-body');
                if (tbody) tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-16 text-center text-slate-400 font-bold"><i class="fa-solid fa-shield-halved text-3xl mb-3 text-slate-300"></i><p>請先登入系統以存取資料。</p></td></tr>`;
            }
        });

        function renderFilterDropdowns() {
            const container = document.getElementById('advanced-filters-container');
            if (!container) return;
            const indicatorNameSet = new Set();
            allDocs.forEach(d => {
                const ind = allIndicators.find(i => i.id === d.indicator_id);
                if (ind && ind.item_name) indicatorNameSet.add(ind.item_name);
            });
            const filterOptions = {
                indicatorName: Array.from(indicatorNameSet).sort().map(name => ({ value: name, label: name })),
                status: [{ value: 'active', label: '啟用中' }, { value: 'inactive', label: '已停用' }]
            };
            if (!isFiltersInitialized) {
                container.innerHTML = filterDefinitions.map(def => `
                    <div class="relative group-filter shrink-0 mb-1 font-bold">
                        <button type="button" class="filter-btn h-10 border border-slate-200 bg-white text-slate-700 text-[13px] font-bold rounded-lg px-4 shadow-sm flex items-center hover:bg-slate-50 transition-colors" data-key="${def.key}">
                            ${def.label} <span class="filter-count hidden bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded text-[10px] ml-1.5">0</span> <i class="fa-solid fa-chevron-down text-[10px] text-slate-400 ml-1.5"></i>
                        </button>
                        <div class="filter-panel hidden absolute top-[calc(100%+4px)] left-0 bg-white border border-slate-200 rounded-xl shadow-xl ${def.width} max-h-72 flex-col overflow-hidden z-[100]">
                            ${def.searchable ? `<div class="p-2 border-b border-slate-100 bg-slate-50/50"><div class="relative"><i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[11px]"></i><input type="text" placeholder="搜尋項目..." class="filter-search w-full bg-white border border-slate-200 rounded-lg pl-8 pr-3 py-1.5 text-xs font-bold outline-none focus:ring-2 focus:ring-blue-500" data-key="${def.key}"></div></div>` : ''}
                            <div class="filter-options flex-1 overflow-y-auto p-1 custom-scrollbar space-y-0.5"></div>
                            <div class="p-2 border-t border-slate-100 bg-slate-50 flex justify-between clear-btn-wrap hidden"><button type="button" class="text-xs font-bold text-slate-500 hover:text-rose-600 transition-colors w-full text-center" onclick="window.clearFilter('${def.key}')">清除條件</button></div>
                        </div>
                    </div>`).join('');
                container.querySelectorAll('.filter-btn').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); const panel = btn.nextElementSibling; const wasHidden = panel.classList.contains('hidden'); document.querySelectorAll('.filter-panel').forEach(p => { p.classList.add('hidden'); p.classList.remove('flex'); }); if (wasHidden) { panel.classList.remove('hidden'); panel.classList.add('flex'); } }));
                document.addEventListener('click', (e) => { if (!e.target.closest('.group-filter')) document.querySelectorAll('.filter-panel').forEach(p => { p.classList.add('hidden'); p.classList.remove('flex'); }); });
                isFiltersInitialized = true;
            }
            filterDefinitions.forEach(def => {
                const options = filterOptions[def.key] || [];
                const wrap = document.querySelector(`.group-filter .filter-btn[data-key="${def.key}"]`).closest('.group-filter');
                const optionsContainer = wrap.querySelector('.filter-options');
                const searchInput = wrap.querySelector('.filter-search');
                const searchTerm = searchInput ? searchInput.value.toLowerCase().trim() : '';
                optionsContainer.innerHTML = options.map(opt => {
                    const isChecked = filterSelections[def.key].has(opt.value) ? 'checked' : '';
                    const displayStyle = (searchTerm && !opt.label.toLowerCase().includes(searchTerm)) ? 'none' : 'flex';
                    return `<label class="flex items-start gap-2.5 p-2 hover:bg-slate-50 rounded-lg cursor-pointer transition-colors font-bold" style="display: ${displayStyle}"><input type="checkbox" class="mt-0.5 w-3.5 h-3.5 rounded border-slate-300 text-blue-600 focus:ring-blue-500 filter-checkbox" value="${opt.value}" data-key="${def.key}" ${isChecked}><span class="text-xs font-bold text-slate-700 select-none flex-1 leading-tight">${opt.label}</span></label>`;
                }).join('');
                optionsContainer.querySelectorAll('.filter-checkbox').forEach(chk => chk.addEventListener('change', (e) => { const k = e.target.getAttribute('data-key'); if (e.target.checked) filterSelections[k].add(e.target.value); else filterSelections[k].delete(e.target.value); window.updateFilterPillUI(k); currentPage = 1; window.renderTable(); }));
                window.updateFilterPillUI(def.key);
            });
        }

        window.updateFilterPillUI = (key) => {
            const btnNode = document.querySelector(`.group-filter .filter-btn[data-key="${key}"]`);
            if (!btnNode) return;
            const wrap = btnNode.closest('.group-filter'), badge = wrap.querySelector('.filter-count'), btn = wrap.querySelector('.filter-btn'), clearWrap = wrap.querySelector('.clear-btn-wrap'), set = filterSelections[key];
            if(set.size > 0) { badge.textContent = set.size; badge.classList.remove('hidden'); btn.classList.add('border-blue-500', 'bg-blue-50', 'text-blue-700'); btn.classList.remove('border-slate-200', 'bg-white', 'text-slate-700'); clearWrap.classList.remove('hidden'); }
            else { badge.classList.add('hidden'); btn.classList.remove('border-blue-500', 'bg-blue-50', 'text-blue-700'); btn.classList.add('border-slate-200', 'bg-white', 'text-slate-700'); clearWrap.classList.add('hidden'); }
        };

        window.clearFilter = (key) => { filterSelections[key].clear(); const btnNode = document.querySelector(`button.filter-btn[data-key="${key}"]`); if (btnNode) { const panel = btnNode.nextElementSibling; panel.querySelectorAll('input[type="checkbox"]').forEach(chk => chk.checked = false); } window.updateFilterPillUI(key); currentPage = 1; window.renderTable(); };

        function updateIndicatorDropdown() {
            const select = document.getElementById('input-indicator'); if (!select) return;
            select.innerHTML = '<option value="">請選擇要綁定的主檔指標...</option>' + allIndicators.map(ind => `<option value="${ind.id}" data-code="${ind.code}">[${ind.code}] ${ind.item_name}</option>`).join('');
        }

        window.openDocModal = () => {
            if (!editingId) { 
                document.getElementById('doc-form').reset(); 
                document.getElementById('modal-title').innerHTML = '<i class="fa-solid fa-file-circle-plus text-blue-600"></i> 新增機構文件'; 
                document.getElementById('input-required').value = 'true';
                document.getElementById('input-checklists').value = '1. '; 
            }
            document.getElementById('doc-modal').classList.remove('hidden');
            setupAutoNumbering();
        };
        
        window.closeDocModal = () => { document.getElementById('doc-modal').classList.add('hidden'); editingId = null; };
        window.changePage = (p) => { currentPage = p; window.renderTable(); };

        const sortDocsByCode = (a, b) => {
            try {
                const getP = (i) => {
                    const f = String(i.indicator_code || '') + (i.sub_indicator ? `-${i.sub_indicator}` : '');
                    return f.split('-').map(p => isNaN(parseInt(p, 10)) ? p : parseInt(p, 10));
                };
                const pa = getP(a), pb = getP(b), len = Math.max(pa.length, pb.length);
                for (let i = 0; i < len; i++) {
                    if (pa[i] === undefined) return -1; if (pb[i] === undefined) return 1;
                    if (pa[i] !== pb[i]) return (typeof pa[i] === 'number' && typeof pb[i] === 'number') ? pa[i] - pb[i] : String(pa[i]).localeCompare(String(pb[i]));
                }
                return String(a.name || '').localeCompare(String(b.name || ''));
            } catch (e) { return 0; }
        };

        window.renderTable = () => {
            const tbody = document.getElementById('doc-table-body'); if (!tbody) return;
            const search = document.getElementById('search-input').value.toLowerCase().trim();
            const filtered = allDocs.filter(d => {
                const matchSearch = String(d.name || '').toLowerCase().includes(search) || String(d.indicator_code || '').toLowerCase().includes(search);
                let matchS = filterSelections.status.size === 0 || filterSelections.status.has(d.is_active ? 'active' : 'inactive');
                let matchI = true;
                if (filterSelections.indicatorName.size > 0) {
                    const ind = allIndicators.find(i => i.id === d.indicator_id);
                    matchI = ind && filterSelections.indicatorName.has(ind.item_name);
                }
                return matchSearch && matchS && matchI;
            });
            filtered.sort(sortDocsByCode);
            const total = filtered.length, tPages = Math.ceil(total / itemsPerPage) || 1;
            if (currentPage > tPages) currentPage = tPages;
            const items = filtered.slice((currentPage - 1) * itemsPerPage, currentPage * itemsPerPage);
            document.getElementById('pagination-info').innerText = total > 0 ? `顯示 ${(currentPage-1)*itemsPerPage+1} 到 ${Math.min(currentPage*itemsPerPage, total)} 筆，共 ${total} 筆` : '尚無資料';
            let btnH = `<button onclick="window.changePage(${currentPage-1})" class="px-3 py-1 border border-slate-200 rounded-md text-sm font-bold" ${currentPage===1?'disabled':''}>上一頁</button>`;
            btnH += `<span class="px-4 py-1 text-sm font-bold text-blue-600 bg-blue-50 rounded-md mx-1">${currentPage} / ${tPages}</span>`;
            btnH += `<button onclick="window.changePage(${currentPage+1})" class="px-3 py-1 border border-slate-200 rounded-md text-sm font-bold" ${currentPage===tPages?'disabled':''}>下一頁</button>`;
            document.getElementById('pagination-buttons').innerHTML = btnH;

            if (total === 0) { 
                if (!auth.currentUser) return;
                tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-16 text-center text-slate-400 font-bold bg-white">找不到符合條件的文件項目。</td></tr>`; 
                return; 
            }

            tbody.innerHTML = items.map(data => {
                const ind = allIndicators.find(i => i.id === data.indicator_id);
                const indName = ind ? ind.item_name : '<span class="text-rose-500">指標已遺失</span>';
                
                let reqBadge = data.is_required === 'false' 
                    ? `<span class="inline-flex items-center px-2 py-0.5 rounded text-[10px] font-bold bg-slate-100 text-slate-500 border border-slate-200 ml-2 whitespace-nowrap">選繳</span>`
                    : `<span class="inline-flex items-center px-2 py-0.5 rounded text-[10px] font-bold bg-rose-50 text-rose-600 border border-rose-100 ml-2 whitespace-nowrap">必繳</span>`;

                let rulesH = `<span class="text-[11px] font-mono text-blue-600 tracking-tight">${data.filename || '未設定'}</span>`;

                return `
                <tr class="group bg-white hover:bg-blue-50/40 transition-all duration-150 border-b border-slate-100 last:border-0 ${!data.is_active ? 'opacity-50 grayscale' : ''}">
                    <td class="px-5 py-4 align-middle text-center"><span class="inline-block bg-slate-100 text-slate-700 border border-slate-200 font-bold px-2.5 py-1 rounded text-xs whitespace-nowrap shadow-sm">${String(data.indicator_code || '')}-${String(data.sub_indicator || '')}</span></td>
                    <td class="px-5 py-4 align-middle text-left"><span class="text-sm font-bold text-slate-800 leading-tight line-clamp-2" title="${indName}">${indName}</span></td>
                    <td class="px-5 py-4 align-middle text-left"><div class="flex flex-col items-start gap-1"><div class="flex items-center"><span class="text-sm font-bold text-slate-800 leading-tight">${data.name}</span>${reqBadge}</div>${data.file_limit==='multiple'?'<span class="text-[10px] text-amber-600 font-bold mt-0.5">多檔上傳</span>':''}</div></td>
                    <td class="px-5 py-4 align-middle text-left"><div class="bg-slate-50 border border-slate-200 p-2.5 rounded-lg shadow-inner">${rulesH}</div></td>
                    <td class="px-5 py-4 align-middle text-center whitespace-nowrap"><label class="relative inline-flex items-center cursor-pointer group/toggle whitespace-nowrap"><input type="checkbox" class="sr-only peer" ${data.is_active ? 'checked' : ''} onchange="window.toggleStatus('${data.id}', ${data.is_active})"><div class="relative w-11 h-6 bg-slate-200 rounded-full peer peer-checked:after:translate-x-[20px] peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-500 shadow-inner shrink-0"></div><span class="ml-2 text-xs font-bold ${data.is_active ? 'text-emerald-600' : 'text-slate-400'}">${data.is_active ? '啟用' : '停用'}</span></label></td>
                    <td class="px-4 py-4 align-middle text-center"><div class="flex items-center justify-center gap-2 transition-opacity">
                        <button onclick="window.editDoc('${data.id}')" class="w-10 h-10 rounded-lg flex items-center justify-center bg-blue-50 text-blue-600 hover:bg-blue-100 transition-all shrink-0"><i class="fa-solid fa-pen text-sm"></i></button>
                        <button onclick="window.deleteDoc('${data.id}', '${data.name}')" class="w-10 h-10 rounded-lg flex items-center justify-center text-slate-300 hover:text-rose-600 hover:bg-rose-50 transition-all shrink-0"><i class="fa-solid fa-trash-can text-sm"></i></button>
                    </div></td>
                </tr>`;
            }).join('');
        };

        window.exportToCSV = () => {
            if (allDocs.length === 0) { alert("沒有資料可供匯出！"); return; }
            let csv = '\uFEFF指標代碼,文件子指標,是否必繳,要求上傳文件名稱,檔案數量限制,預設上傳檔名規則,系統狀態\n';
            
            let sorted = [...allDocs].sort(sortDocsByCode);

            sorted.forEach(d => {
                let status = d.is_active ? '啟用' : '停用';
                let limitStr = d.file_limit === 'multiple' ? '多檔(自動流水號)' : '單一檔案';
                let fullCode = d.indicator_code || '';
                let reqStr = d.is_required === 'false' ? '選繳' : '必繳';
                
                csv += [fullCode, d.sub_indicator || '', reqStr, d.name, limitStr, d.filename || '', status].map(v => `"${(v||'').toString().replace(/"/g, '""')}"`).join(',') + '\n';
            });
            const link = document.createElement('a'); link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
            link.download = `ISAC機構文件設定_${new Date().toISOString().split('T')[0]}.csv`; link.click();
        };

        window.submitDocForm = async () => {
            const btn = document.getElementById('btn-submit'), indS = document.getElementById('input-indicator');
            const checks = document.getElementById('input-checklists').value.split('\n').map(l => l.trim()).filter(l => l !== '' && !/^\d+\.\s*$/.test(l));
            const payload = { 
                indicator_id: indS.value, 
                indicator_code: indS.options[indS.selectedIndex]?.getAttribute('data-code') || '',
                sub_indicator: document.getElementById('input-sub-indicator').value.trim(), 
                is_required: document.getElementById('input-required').value,
                file_limit: document.getElementById('input-file-limit').value, 
                name: document.getElementById('input-name').value.trim(),
                filename: document.getElementById('input-filename').value.trim(), 
                checklists: checks
            };
            if(!payload.indicator_id || !payload.name) { alert("請填寫必填欄位！"); return; }
            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> 儲存中...';
            try {
                if (editingId) await updateDoc(doc(db, "institution_files_settings", editingId), { ...payload, updated_at: serverTimestamp() });
                else await addDoc(docsCollection, { ...payload, is_active: true, created_at: serverTimestamp() });
                window.closeDocModal();
            } catch (err) { alert(err.message); } finally { btn.disabled = false; btn.innerText = '儲存機構文件設定'; }
        };

        window.editDoc = (id) => {
            const d = allDocs.find(x => x.id === id); if (!d) return;
            editingId = id;
            document.getElementById('input-indicator').value = d.indicator_id || '';
            document.getElementById('input-sub-indicator').value = d.sub_indicator || '';
            document.getElementById('input-required').value = d.is_required || 'true';
            document.getElementById('input-file-limit').value = d.file_limit || 'single';
            document.getElementById('input-name').value = d.name || ''; 
            document.getElementById('input-filename').value = d.filename || '';
            
            const checklistText = (d.checklists && d.checklists.length > 0) ? d.checklists.join('\n') : '1. ';
            document.getElementById('input-checklists').value = checklistText;

            document.getElementById('modal-title').innerHTML = '<i class="fa-solid fa-pen text-blue-600"></i> 編輯機構文件';
            document.getElementById('doc-modal').classList.remove('hidden');
            setupAutoNumbering();
        };

        window.toggleStatus = async (id, s) => await updateDoc(doc(db, "institution_files_settings", id), { is_active: !s });
        window.deleteDoc = async (id, n) => { if (confirm(`確定刪除「${n}」？`)) { await deleteDoc(doc(db, "institution_files_settings", id)); window.renderTable(); } };
        document.getElementById('search-input').addEventListener('input', () => window.renderTable());
    </script>
</body>
</html>
