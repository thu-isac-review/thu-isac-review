<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行政文件審查設定</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { 50: '#f0f5fa', 500: '#2c75b3', 600: '#1a5c96', 700: '#004785' } } } } }
    </script>
    <style>
        body { background-color: transparent; margin: 0; padding: 0; font-family: "SF Pro TC", "Noto Sans TC", sans-serif; -webkit-font-smoothing: antialiased; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .modal-enter { animation: modalFadeIn 0.2s ease-out forwards; }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.97) translateY(-5px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        table { table-layout: fixed; width: 100%; } td { word-break: break-word; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen flex flex-col overflow-hidden">

    <div class="shrink-0 px-6 pt-6 pb-4 space-y-4 animate-fade">
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center border border-blue-100 shrink-0">
                    <i class="fa-regular fa-folder-open text-xl"></i>
                </div>
                <div>
                    <h2 class="text-xl font-bold text-slate-800 tracking-tight">行政文件審查設定</h2>
                    <p class="text-xs text-slate-500 mt-1">綁定教育部查核指標，設定系所應繳交之對應佐證文件，並規範標準上傳檔名 (全系統通用)。</p>
                </div>
            </div>
            
            <div class="flex flex-wrap gap-2">
                <button onclick="window.exportToCSV()" class="h-9 bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 font-bold px-3 rounded-lg text-sm transition-all flex items-center gap-1.5 shadow-sm">
                    <i class="fa-solid fa-file-export text-emerald-600"></i> 匯出清單
                </button>
                <div class="w-px h-6 bg-slate-200 self-center mx-1"></div>
                <button onclick="window.openDocModal()" class="h-9 bg-blue-600 hover:bg-blue-700 text-white font-bold px-4 rounded-lg text-sm transition-all flex items-center gap-1.5 shadow-sm shadow-blue-500/20">
                    <i class="fa-solid fa-plus text-base"></i> 新增行政文件
                </button>
            </div>
        </div>

        <div class="flex flex-col md:flex-row justify-between items-center gap-4 w-full">
            <div class="flex gap-2 w-full md:w-auto">
                <select id="filter-level" class="bg-white border border-slate-200 text-slate-700 text-sm font-bold rounded-lg px-3 h-10 outline-none focus:ring-2 focus:ring-blue-500 transition-all cursor-pointer shadow-sm">
                    <option value="all">適用層級：全部</option>
                    <option value="school">全校統一文件</option>
                    <option value="department">各系所獨立文件</option>
                    <option value="both">全校與各系所</option>
                </select>
                <select id="filter-status" class="bg-white border border-slate-200 text-slate-700 text-sm font-bold rounded-lg px-3 h-10 outline-none focus:ring-2 focus:ring-blue-500 transition-all cursor-pointer shadow-sm">
                    <option value="all">狀態：全部</option>
                    <option value="active">狀態：啟用中</option>
                    <option value="inactive">狀態：已停用</option>
                </select>
            </div>
            <div class="relative w-full md:w-72 shadow-sm rounded-lg">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                <input type="text" id="search-input" placeholder="搜尋文件名稱或指標代碼..." class="w-full bg-white border border-slate-200 rounded-lg pl-9 pr-3 h-10 text-sm outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            </div>
        </div>
    </div>

    <div class="flex-1 overflow-hidden px-6 pb-6 flex flex-col animate-fade">
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col flex-1 overflow-hidden">
            <div class="flex-1 overflow-auto custom-scrollbar relative">
                <table class="w-full text-left table-fixed min-w-[1100px]">
                    <thead class="bg-slate-50 border-b border-slate-200 sticky top-0 z-10 shadow-sm">
                        <tr>
                            <th class="px-5 py-3.5 text-center text-xs font-bold text-slate-500 w-[10%]">適用層級</th>
                            <th class="px-5 py-3.5 text-left text-xs font-bold text-slate-500 w-[20%]">所屬指標</th>
                            <th class="px-5 py-3.5 text-left text-xs font-bold text-slate-500 w-[22%]">要求上傳文件名稱</th>
                            <th class="px-5 py-3.5 text-left text-xs font-bold text-slate-500 min-w-[280px]">上傳檔名規則</th>
                            <th class="px-5 py-3.5 text-center text-xs font-bold text-slate-500 w-[10%] whitespace-nowrap">系統狀態</th>
                            <th class="px-4 py-3.5 text-center text-xs font-bold text-slate-500 w-[10%]">操作</th>
                        </tr>
                    </thead>
                    <tbody id="doc-table-body" class="divide-y divide-slate-100 text-sm">
                        <tr><td colspan="6" class="px-6 py-16 text-center text-slate-400"><i class="fa-solid fa-circle-notch fa-spin text-3xl mb-3 text-blue-500"></i><p class="font-bold">資料載入與驗證中...</p></td></tr>
                    </tbody>
                </table>
            </div>
            
            <div class="bg-slate-50 border-t border-slate-200 px-6 py-3 flex justify-between items-center shrink-0">
                <div id="pagination-info" class="text-xs font-bold text-slate-500">顯示 0 到 0 筆，共 0 筆</div>
                <div id="pagination-buttons" class="flex gap-1"></div>
            </div>
        </div>
    </div>

    <div id="doc-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="window.closeDocModal()"></div>
        <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-3xl overflow-hidden modal-enter relative max-h-[90vh] flex flex-col">
            <div class="px-8 py-5 border-b border-slate-100 flex justify-between items-center shrink-0 bg-slate-50">
                <h3 id="modal-title" class="font-black text-slate-800 text-lg flex items-center gap-2">
                    <i class="fa-solid fa-file-circle-plus text-blue-600"></i> 新增行政文件
                </h3>
                <button onclick="window.closeDocModal()" class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-slate-600 bg-white shadow-sm border border-slate-200 hover:bg-slate-50 transition-colors shrink-0"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            
            <form id="doc-form" class="p-8 space-y-6 overflow-y-auto custom-scrollbar flex-1 bg-white">
                <div class="grid grid-cols-3 gap-5">
                    <div class="col-span-2">
                        <label class="block text-xs font-bold text-slate-600 mb-2">對應之教育部審查指標 <span class="text-rose-500">*</span></label>
                        <select id="input-indicator" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none font-bold text-slate-700 cursor-pointer shadow-sm" onchange="window.autoGenerateFilename()">
                            <option value="">請選擇要綁定的主檔指標...</option>
                            </select>
                    </div>
                    <div class="col-span-1">
                        <label class="block text-xs font-bold text-slate-600 mb-2" title="同一指標下的次分類編號，例如 1-1-1 中的最後一個 1">文件子指標 (序號) <span class="text-rose-500">*</span></label>
                        <input type="text" id="input-sub-indicator" required placeholder="如：1, 2" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none font-bold text-slate-700 shadow-sm" oninput="window.autoGenerateFilename()">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-2">適用層級 <span class="text-rose-500">*</span></label>
                        <select id="input-level" required onchange="window.toggleFilenameInputs()" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none font-bold text-slate-700 cursor-pointer shadow-sm">
                            <option value="school">全校統一文件</option>
                            <option value="department" selected>各系所獨立文件</option>
                            <option value="both">全校與各系所</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-2">檔案數量限制 <span class="text-rose-500">*</span></label>
                        <select id="input-file-limit" required onchange="window.autoGenerateFilename()" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none font-bold text-slate-700 cursor-pointer shadow-sm">
                            <option value="single" selected>單一檔案</option>
                            <option value="multiple">多檔上傳 (自動生成流水號)</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-2">要求上傳文件名稱 <span class="text-rose-500">*</span></label>
                    <div class="relative">
                        <i class="fa-solid fa-file-lines absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="text" id="input-name" required placeholder="如：實習辦法 / 施行細則 / 授課大綱" class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none font-bold text-slate-700 shadow-sm" oninput="window.autoGenerateFilename()">
                    </div>
                </div>

                <div class="bg-blue-50/30 border border-blue-100 rounded-xl p-5 mt-2 space-y-4">
                    <div class="flex justify-between items-center border-b border-blue-100/50 pb-2">
                        <span class="text-xs font-black text-blue-700 uppercase tracking-wide"><i class="fa-solid fa-wand-magic-sparkles mr-1.5"></i> 標準上傳檔名規則設定</span>
                        <button type="button" onclick="window.autoGenerateFilename()" class="text-[11px] font-bold bg-white border border-blue-200 text-blue-600 px-3 py-1.5 rounded-lg hover:bg-blue-600 hover:text-white transition-all shadow-sm active:scale-95">自動帶入建議格式</button>
                    </div>
                    
                    <div id="school-filename-group" class="hidden space-y-1.5">
                        <label class="block text-[11px] font-bold text-indigo-500">【全校統一格式】預設檔名範本 (可自由修改)</label>
                        <input type="text" id="input-school-filename" placeholder="例如：[指標代碼]-[子指標]_[流水號]_東海大學[文件名稱].pdf" class="w-full bg-white border border-slate-200 rounded-lg px-3 py-2 text-sm font-mono font-bold text-indigo-700 shadow-sm focus:ring-2 focus:ring-indigo-400 outline-none transition-all">
                    </div>
                    
                    <div id="dept-filename-group" class="hidden space-y-1.5">
                        <label class="block text-[11px] font-bold text-blue-500">【各系所獨立格式】預設檔名範本 (可自由修改)</label>
                        <input type="text" id="input-dept-filename" placeholder="例如：[指標代碼]-[子指標]_[系所代碼][流水號]_[系所名稱]_[文件名稱].pdf" class="w-full bg-white border border-slate-200 rounded-lg px-3 py-2 text-sm font-mono font-bold text-blue-700 shadow-sm focus:ring-2 focus:ring-blue-400 outline-none transition-all">
                    </div>
                    
                    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                        <p class="text-[12px] text-slate-700 font-bold leading-relaxed border-b border-slate-100 pb-2 mb-2">
                            <i class="fa-solid fa-circle-info text-blue-500 mr-1.5"></i> <strong>系統變數清單：</strong>
                        </p>
                        <div class="flex flex-wrap gap-2 text-[11px] font-mono">
                            <span class="bg-slate-100 border border-slate-200 px-2 py-0.5 rounded text-slate-600">[指標代碼]</span>
                            <span class="bg-slate-100 border border-slate-200 px-2 py-0.5 rounded text-slate-600">[子指標]</span>
                            <span class="bg-slate-100 border border-slate-200 px-2 py-0.5 rounded text-slate-600">[文件名稱]</span>
                            <span class="bg-slate-100 border border-slate-200 px-2 py-0.5 rounded text-slate-600">[學期]</span>
                            <span class="bg-emerald-50 border border-emerald-200 px-2 py-0.5 rounded text-emerald-700">[系所代碼]</span>
                            <span class="bg-emerald-50 border border-emerald-200 px-2 py-0.5 rounded text-emerald-700">[系所名稱]</span>
                            <span class="bg-amber-50 border border-amber-200 px-2 py-0.5 rounded text-amber-700" title="課程大綱適用">[選課代號]</span>
                            <span class="bg-amber-50 border border-amber-200 px-2 py-0.5 rounded text-amber-700" title="課程大綱適用">[課程名稱]</span>
                            <span class="bg-blue-50 border border-blue-200 px-2 py-0.5 rounded text-blue-700" title="多檔上傳適用">[流水號]</span>
                        </div>
                        <div class="text-[11px] text-slate-500 font-medium leading-relaxed mt-3 space-y-1">
                            <p><strong class="text-blue-600"><i class="fa-solid fa-bolt mr-1"></i> 多檔上傳與流水號機制：</strong> 若選擇「多檔上傳」並使用 <code>[流水號]</code> 變數，系統將依檔案原始名稱 (A-Z) 自動替換為 001, 002...，各系所獨立計算。</p>
                        </div>
                    </div>
                </div>
            </form>
            
            <div class="p-6 border-t border-slate-100 shrink-0 flex gap-4 bg-slate-50">
                <button type="button" onclick="window.closeDocModal()" class="flex-1 py-2.5 text-sm font-bold text-slate-600 bg-white border border-slate-200 hover:bg-slate-100 rounded-xl transition-all shadow-sm">取消返回</button>
                <button type="button" id="btn-submit" onclick="window.submitDocForm()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-xl shadow-md shadow-blue-500/20 transition-all flex items-center justify-center gap-2 active:scale-95">
                    儲存設定
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDcsGfvVKnGmCzWfK5F03saydFpNc1ReYY", authDomain: "thu-isac-review.firebaseapp.com", projectId: "thu-isac-review", storageBucket: "thu-isac-review.firebasestorage.app", messagingSenderId: "453299876735", appId: "1:453299876735:web:1d8babca3315423161a04a" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app); 
        const db = getFirestore(app);
        
        const docsCollection = collection(db, "admin_files_settings");
        const indicatorsCollection = collection(db, "moe_indicators_master");

        let allDocs = []; 
        let allIndicators = []; 
        let editingId = null; 
        let currentPage = 1; 
        const itemsPerPage = 10;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                onSnapshot(indicatorsCollection, (snapshot) => {
                    allIndicators = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    allIndicators.sort((a, b) => (a.sortOrder || 999) - (b.sortOrder || 999));
                    updateIndicatorDropdown();
                });

                onSnapshot(docsCollection, (snapshot) => {
                    allDocs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    window.renderTable();
                }, (error) => {
                    document.getElementById('doc-table-body').innerHTML = `<tr><td colspan="6" class="px-6 py-16 text-center text-rose-500 font-bold"><i class="fa-solid fa-lock text-3xl mb-3"></i><p>資料讀取失敗，權限不足。</p></td></tr>`;
                });
            } else {
                document.getElementById('doc-table-body').innerHTML = `<tr><td colspan="6" class="px-6 py-16 text-center text-slate-400 font-bold"><i class="fa-solid fa-shield-halved text-3xl mb-3 text-slate-300"></i><p>請先登入系統以存取資料。</p></td></tr>`;
            }
        });

        function updateIndicatorDropdown() {
            const select = document.getElementById('input-indicator');
            let html = '<option value="">請選擇要綁定的主檔指標...</option>';
            allIndicators.forEach(ind => {
                if (ind.code) {
                    html += `<option value="${ind.id}" data-code="${ind.code}">[${ind.code}] ${ind.item_name}</option>`;
                }
            });
            select.innerHTML = html;
        }

        window.toggleFilenameInputs = () => {
            const level = document.getElementById('input-level').value;
            const schoolGroup = document.getElementById('school-filename-group');
            const deptGroup = document.getElementById('dept-filename-group');
            
            if (level === 'school') {
                schoolGroup.classList.remove('hidden');
                deptGroup.classList.add('hidden');
            } else if (level === 'department') {
                schoolGroup.classList.add('hidden');
                deptGroup.classList.remove('hidden');
            } else {
                schoolGroup.classList.remove('hidden');
                deptGroup.classList.remove('hidden');
            }
        };

        window.autoGenerateFilename = () => {
            const indSelect = document.getElementById('input-indicator');
            const subInd = document.getElementById('input-sub-indicator').value.trim() || '[子指標]';
            const fileLimit = document.getElementById('input-file-limit').value;
            const docName = document.getElementById('input-name').value.trim() || '[文件名稱]';
            
            let code = '[指標代碼]';
            if (indSelect.selectedIndex > 0) {
                code = indSelect.options[indSelect.selectedIndex].getAttribute('data-code') || code;
            }

            const schoolSeq = fileLimit === 'multiple' ? '[流水號]' : '000001';
            const deptSeq = fileLimit === 'multiple' ? '[流水號]' : '001';

            // 💡 根據要求，組合出指標代碼與子指標
            document.getElementById('input-school-filename').value = `${code}-${subInd}_${schoolSeq}_東海大學_${docName}.pdf`;
            document.getElementById('input-dept-filename').value = `${code}-${subInd}_[系所代碼]${deptSeq}_東海大學_[系所名稱]_${docName}.pdf`;
        };

        window.openDocModal = () => {
            if (!editingId) { 
                document.getElementById('doc-form').reset();
                document.getElementById('modal-title').innerHTML = '<i class="fa-solid fa-file-circle-plus text-blue-600"></i> 新增行政文件';
                window.toggleFilenameInputs();
            }
            document.getElementById('doc-modal').classList.remove('hidden');
        };

        window.closeDocModal = () => { document.getElementById('doc-modal').classList.add('hidden'); editingId = null; };
        window.changePage = (page) => { currentPage = page; window.renderTable(); };

        window.renderTable = () => {
            const tbody = document.getElementById('doc-table-body');
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const filterLevel = document.getElementById('filter-level').value;
            const filterStatus = document.getElementById('filter-status').value;

            let filtered = allDocs.filter(d => {
                const matchSearch = (d.name || '').toLowerCase().includes(searchTerm) || (d.indicator_code || '').toLowerCase().includes(searchTerm);
                const matchLevel = filterLevel === 'all' || d.level === filterLevel;
                const matchStatus = filterStatus === 'all' || (filterStatus === 'active' ? d.is_active : !d.is_active);
                return matchSearch && matchLevel && matchStatus;
            });

            // 💡 排序邏輯：優先依據 指標代碼，再依據 文件子指標，最後依據 檔案名稱
            filtered.sort((a, b) => {
                const codeA = a.indicator_code || '';
                const codeB = b.indicator_code || '';
                if (codeA !== codeB) return codeA.localeCompare(codeB);

                const subA = a.sub_indicator || '';
                const subB = b.sub_indicator || '';
                if (subA !== subB) return subA.localeCompare(subB);

                const nameA = a.name || '';
                const nameB = b.name || '';
                return nameA.localeCompare(nameB);
            });

            const totalItems = filtered.length;
            const totalPages = Math.ceil(totalItems / itemsPerPage) || 1;
            if (currentPage > totalPages) currentPage = totalPages || 1;

            const startIndex = (currentPage - 1) * itemsPerPage;
            const paginatedItems = filtered.slice(startIndex, startIndex + itemsPerPage);

            document.getElementById('pagination-info').innerText = totalItems > 0 ? `顯示 ${startIndex + 1} 到 ${Math.min(startIndex + itemsPerPage, totalItems)} 筆，共 ${totalItems} 筆` : '尚無資料';
            
            let btnHtml = '';
            btnHtml += `<button onclick="window.changePage(${currentPage - 1})" class="px-3 py-1 border border-slate-200 rounded-md text-sm font-bold text-slate-600 hover:bg-slate-100 disabled:opacity-40 transition-colors" ${currentPage === 1 ? 'disabled' : ''}>上一頁</button>`;
            btnHtml += `<span class="px-4 py-1 text-sm font-bold text-blue-600 bg-blue-50 rounded-md mx-1">${currentPage} / ${totalPages}</span>`;
            btnHtml += `<button onclick="window.changePage(${currentPage + 1})" class="px-3 py-1 border border-slate-200 rounded-md text-sm font-bold text-slate-600 hover:bg-slate-100 disabled:opacity-40 transition-colors" ${currentPage === totalPages ? 'disabled' : ''}>下一頁</button>`;
            document.getElementById('pagination-buttons').innerHTML = btnHtml;

            if (totalItems === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-16 text-center text-slate-400 font-bold bg-white">找不到符合條件的文件項目。</td></tr>`;
                return;
            }

            let html = '';
            paginatedItems.forEach((data) => {
                
                // 💡 優化層級標籤 (Badge)
                let levelBadge = '';
                if (data.level === 'school') {
                    levelBadge = `<span class="inline-flex items-center justify-center px-2.5 py-1 rounded bg-slate-100 text-slate-600 text-xs font-bold border border-slate-200"><i class="fa-solid fa-building-columns mr-1.5 text-slate-400"></i>全校</span>`;
                } else if (data.level === 'department') {
                    levelBadge = `<span class="inline-flex items-center justify-center px-2.5 py-1 rounded bg-slate-100 text-slate-600 text-xs font-bold border border-slate-200"><i class="fa-solid fa-graduation-cap mr-1.5 text-slate-400"></i>系所</span>`;
                } else if (data.level === 'both') {
                    levelBadge = `<div class="flex gap-1.5 items-center justify-center"><span class="inline-flex items-center justify-center px-2 py-0.5 rounded bg-slate-100 text-slate-600 text-[10px] font-bold border border-slate-200">全校</span><span class="inline-flex items-center justify-center px-2 py-0.5 rounded bg-slate-100 text-slate-600 text-[10px] font-bold border border-slate-200">系所</span></div>`;
                }

                let limitBadge = data.file_limit === 'multiple' 
                    ? `<span class="inline-block mt-1 text-[10px] font-bold text-amber-600"><i class="fa-solid fa-layer-group mr-1 opacity-70"></i>多檔上傳</span>` 
                    : `<span class="inline-block mt-1 text-[10px] font-bold text-slate-400">單一檔案</span>`;

                const boundIndicator = allIndicators.find(ind => ind.id === data.indicator_id);
                const indicatorName = boundIndicator ? boundIndicator.item_name : '<span class="text-rose-500">指標已遺失</span>';

                let sFile = data.school_filename || `<span class="text-slate-400 italic">未設定</span>`;
                let dFile = data.dept_filename || `<span class="text-slate-400 italic">未設定</span>`;
                
                // 💡 優化檔名預覽樣式：清爽字體，去除厚重背景
                let previewFile = '';
                if (data.level === 'school') {
                    previewFile = `<div class="text-sm font-medium text-slate-700 break-all">${sFile}</div>`;
                } else if (data.level === 'department') {
                    previewFile = `<div class="text-sm font-medium text-slate-700 break-all">${dFile}</div>`;
                } else if (data.level === 'both') {
                    previewFile = `
                        <div class="mb-1.5 break-all flex items-start gap-1.5"><span class="text-[10px] font-bold bg-slate-200 text-slate-600 px-1.5 py-0.5 rounded shrink-0 mt-0.5">校</span> <span class="text-sm font-medium text-slate-700">${sFile}</span></div>
                        <div class="break-all flex items-start gap-1.5"><span class="text-[10px] font-bold bg-slate-200 text-slate-600 px-1.5 py-0.5 rounded shrink-0 mt-0.5">系</span> <span class="text-sm font-medium text-slate-700">${dFile}</span></div>
                    `;
                }

                // 💡 全面左對齊去雜訊排版
                html += `
                <tr class="group bg-white hover:bg-slate-50/50 transition-all duration-150 border-b border-slate-100 last:border-0 ${!data.is_active ? 'opacity-50 grayscale' : ''}">
                    <td class="px-5 py-4 align-top text-center pt-5">${levelBadge}</td>
                    <td class="px-5 py-4 align-top pt-5">
                        <div class="flex flex-col items-start gap-1">
                            <span class="inline-block bg-blue-50 text-blue-700 border border-blue-100 font-bold px-2 py-0.5 rounded text-xs whitespace-nowrap">${data.indicator_code || '-'}</span>
                            <span class="text-[11px] text-slate-500 font-medium line-clamp-2 mt-1" title="${indicatorName}">${indicatorName}</span>
                        </div>
                    </td>
                    <td class="px-5 py-4 align-top pt-5">
                        <div class="flex flex-col items-start">
                            <div class="flex items-center gap-1.5">
                                <span class="text-sm font-bold text-slate-800 leading-tight">${data.name}</span>
                            </div>
                            <div class="text-[11px] font-bold text-slate-400 mt-1">子指標: ${data.sub_indicator || '-'}</div>
                            ${limitBadge}
                        </div>
                    </td>
                    <td class="px-5 py-4 align-top pt-5">
                        <div class="space-y-1.5">
                            ${previewFile}
                        </div>
                    </td>
                    <td class="px-5 py-4 align-top text-center whitespace-nowrap pt-5">
                        <label class="relative inline-flex items-center cursor-pointer group/toggle whitespace-nowrap">
                            <input type="checkbox" class="sr-only peer" ${data.is_active ? 'checked' : ''} onchange="window.toggleStatus('${data.id}', ${data.is_active})">
                            <div class="relative w-9 h-5 bg-slate-200 rounded-full peer peer-checked:after:translate-x-[16px] peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-500 shadow-inner shrink-0"></div>
                            <span class="ml-2 text-xs font-bold ${data.is_active ? 'text-blue-600' : 'text-slate-400'} whitespace-nowrap">${data.is_active ? '啟用' : '停用'}</span>
                        </label>
                    </td>
                    <td class="px-4 py-4 align-top text-center pt-5">
                        <div class="flex items-center justify-center gap-1.5 opacity-100">
                            <button onclick="window.editDoc('${data.id}')" class="w-7 h-7 rounded flex items-center justify-center text-slate-400 hover:text-blue-600 hover:bg-blue-50 transition-all shrink-0" title="編輯文件"><i class="fa-solid fa-pen text-xs"></i></button>
                            <button onclick="window.deleteDoc('${data.id}', '${data.name}')" class="w-7 h-7 rounded flex items-center justify-center text-slate-400 hover:text-rose-600 hover:bg-rose-50 transition-all shrink-0" title="刪除文件"><i class="fa-solid fa-trash-can text-xs"></i></button>
                        </div>
                    </td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        window.exportToCSV = () => {
            if (allDocs.length === 0) { alert("沒有資料可供匯出！"); return; }
            let csv = '\uFEFF適用層級,指標代碼,文件子指標,要求上傳文件名稱,檔案數量限制,預設上傳檔名規則,系統狀態\n';
            
            let sorted = [...allDocs].sort((a, b) => {
                const codeA = (a.indicator_code || '') + '-' + (a.name || '');
                const codeB = (b.indicator_code || '') + '-' + (b.name || '');
                return codeA.localeCompare(codeB);
            });

            sorted.forEach(d => {
                let status = d.is_active ? '啟用' : '停用';
                let level = d.level === 'school' ? '全校統一文件' : (d.level === 'department' ? '各系所獨立文件' : '全校與各系所');
                let limitStr = d.file_limit === 'multiple' ? '多檔(自動流水號)' : '單一檔案';
                
                let sFile = d.school_filename || `未設定`;
                let dFile = d.dept_filename || `未設定`;
                let patternStr = d.level === 'school' ? sFile : (d.level === 'department' ? dFile : `校:${sFile} / 系:${dFile}`);

                csv += [level, d.indicator_code, d.sub_indicator || '', d.name, limitStr, patternStr, status].map(v => `"${(v||'').toString().replace(/"/g, '""')}"`).join(',') + '\n';
            });
            const link = document.createElement('a'); link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
            link.download = `ISAC行政文件設定_${new Date().toISOString().split('T')[0]}.csv`; link.click();
        };

        window.submitDocForm = async () => {
            const btn = document.getElementById('btn-submit');
            const indSelect = document.getElementById('input-indicator');
            
            let indicatorCode = '';
            if (indSelect.selectedIndex > 0) {
                indicatorCode = indSelect.options[indSelect.selectedIndex].getAttribute('data-code');
            }
            
            const payload = { 
                indicator_id: indSelect.value,
                indicator_code: indicatorCode,
                sub_indicator: document.getElementById('input-sub-indicator').value.trim(),
                level: document.getElementById('input-level').value,
                file_limit: document.getElementById('input-file-limit').value,
                name: document.getElementById('input-name').value.trim(),
                school_filename: document.getElementById('input-school-filename').value.trim(),
                dept_filename: document.getElementById('input-dept-filename').value.trim()
            };

            if(!payload.indicator_id || !payload.sub_indicator || !payload.name) { 
                alert("請填寫所有必填欄位！"); return; 
            }

            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> 儲存中...';
            try {
                if (editingId) { 
                    await updateDoc(doc(db, "admin_files_settings", editingId), { ...payload, updated_at: serverTimestamp() }); 
                } else {
                    await addDoc(docsCollection, { ...payload, is_active: true, created_at: serverTimestamp() });
                }
                window.closeDocModal();
            } catch (err) { alert("儲存發生錯誤：" + err.message); } 
            finally { btn.disabled = false; btn.innerHTML = '儲存設定'; }
        };

        window.editDoc = (id) => {
            const docData = allDocs.find(d => d.id === id);
            if (!docData) return;
            
            editingId = id;
            document.getElementById('input-indicator').value = docData.indicator_id || '';
            document.getElementById('input-sub-indicator').value = docData.sub_indicator || '';
            document.getElementById('input-level').value = docData.level || 'department';
            document.getElementById('input-file-limit').value = docData.file_limit || 'single';
            document.getElementById('input-name').value = docData.name || ''; 

            document.getElementById('input-school-filename').value = docData.school_filename || '';
            document.getElementById('input-dept-filename').value = docData.dept_filename || '';

            window.toggleFilenameInputs();

            document.getElementById('modal-title').innerHTML = '<i class="fa-solid fa-pen text-blue-600"></i> 編輯行政文件';
            document.getElementById('doc-modal').classList.remove('hidden');
        };
        
        window.toggleStatus = async (id, status) => { await updateDoc(doc(db, "admin_files_settings", id), { is_active: !status }); };

        window.deleteDoc = async (id, name) => {
            if (confirm(`警告：確定要刪除文件「${name}」嗎？\n此操作無法復原。`)) {
                await deleteDoc(doc(db, "admin_files_settings", id));
                if (currentPage > Math.ceil((allDocs.length - 1) / itemsPerPage) || 1) currentPage = Math.ceil((allDocs.length - 1) / itemsPerPage) || 1;
                window.renderTable();
            }
        };

        document.getElementById('search-input').addEventListener('input', () => window.renderTable());
        document.getElementById('filter-level').addEventListener('change', () => window.renderTable());
        document.getElementById('filter-status').addEventListener('change', () => window.renderTable());
    </script>
</body>
</html>
