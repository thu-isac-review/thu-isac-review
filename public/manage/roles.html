<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用戶權限管理內容</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { brand: { 50: '#f0f5fa', 500: '#2c75b3', 600: '#1a5c96', 700: '#004785' } } } }
        }
    </script>
    <style>
        body { background-color: transparent; margin: 0; padding: 0; font-family: "SF Pro TC", "Noto Sans TC", sans-serif; -webkit-font-smoothing: antialiased; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .modal-enter { animation: modalFadeIn 0.2s ease-out forwards; }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.97) translateY(-5px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        table { table-layout: fixed; width: 100%; }
        td { word-break: break-word; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen flex flex-col overflow-hidden">

    <!-- 頂部操作列 -->
    <div class="shrink-0 px-6 pt-6 pb-4 space-y-4 animate-fade">
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-indigo-50 text-indigo-600 flex items-center justify-center border border-indigo-100 shrink-0">
                    <i class="fa-solid fa-user-shield text-xl"></i>
                </div>
                <div>
                    <h2 class="text-xl font-bold text-slate-800 tracking-tight">管理系統操作人員</h2>
                    <p class="text-xs text-slate-500 mt-1">指派存取權限級別與帳號狀態。</p>
                </div>
            </div>
            
            <div class="flex flex-wrap gap-2">
                <button onclick="exportToCSV()" class="h-9 bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 font-bold px-3 rounded-lg text-sm transition-all flex items-center gap-1.5 shadow-sm">
                    <i class="fa-solid fa-file-export text-emerald-600"></i> 匯出清單
                </button>
                <div class="w-px h-6 bg-slate-200 self-center mx-1"></div>
                <button onclick="openUserModal()" class="h-9 bg-blue-600 hover:bg-blue-700 text-white font-bold px-4 rounded-lg text-sm transition-all flex items-center gap-1.5 shadow-sm shadow-blue-500/20">
                    <i class="fa-solid fa-user-plus text-base"></i> 新增授權用戶
                </button>
            </div>
        </div>

        <div class="flex flex-col md:flex-row justify-between items-center gap-4 w-full">
            <div class="flex gap-2 w-full md:w-auto">
                <select id="filter-role" class="bg-white border border-slate-200 text-slate-700 text-sm font-bold rounded-lg px-3 h-10 outline-none focus:ring-2 focus:ring-blue-500 transition-all cursor-pointer shadow-sm">
                    <option value="all">權限角色：全部</option>
                    <option value="admin">系統管理員 (Admin)</option>
                    <option value="reviewer">一般查核員 (Reviewer)</option>
                </select>
                <select id="filter-status" class="bg-white border border-slate-200 text-slate-700 text-sm font-bold rounded-lg px-3 h-10 outline-none focus:ring-2 focus:ring-blue-500 transition-all cursor-pointer shadow-sm">
                    <option value="all">狀態：全部</option>
                    <option value="active">狀態：啟用中</option>
                    <option value="inactive">狀態：已停權</option>
                </select>
            </div>
            <div class="relative w-full md:w-72 shadow-sm rounded-lg">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                <input type="text" id="search-input" placeholder="搜尋姓名或電子郵件..." class="w-full bg-white border border-slate-200 rounded-lg pl-9 pr-3 h-10 text-sm outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            </div>
        </div>
    </div>

    <!-- 表格滾動區 -->
    <div class="flex-1 overflow-hidden px-6 pb-6 flex flex-col animate-fade">
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col flex-1 overflow-hidden">
            <div class="flex-1 overflow-auto custom-scrollbar relative">
                <table class="w-full text-left table-fixed">
                    <thead class="bg-slate-50 border-b border-slate-200 sticky top-0 z-10">
                        <tr>
                            <th class="px-6 py-3.5 text-center text-xs font-bold text-slate-500 w-[25%]">使用者資訊</th>
                            <th class="px-6 py-3.5 text-center text-xs font-bold text-slate-500 w-[20%]">權限角色</th>
                            <th class="px-6 py-3.5 text-center text-xs font-bold text-slate-500 w-[20%]">加入時間</th>
                            <th class="px-6 py-3.5 text-center text-xs font-bold text-slate-500 w-[15%]">帳號狀態</th>
                            <th class="px-6 py-3.5 text-center text-xs font-bold text-slate-500 w-[20%]">操作</th>
                        </tr>
                    </thead>
                    <tbody id="user-table-body" class="divide-y divide-slate-100 text-sm">
                        <tr><td colspan="5" class="px-6 py-16 text-center text-slate-400"><i class="fa-solid fa-circle-notch fa-spin text-3xl mb-3 text-blue-500"></i><p class="font-bold">資料載入與驗證中...</p></td></tr>
                    </tbody>
                </table>
            </div>
            
            <div class="bg-slate-50 border-t border-slate-200 px-6 py-3 flex justify-between items-center shrink-0">
                <div id="pagination-info" class="text-xs font-bold text-slate-500">顯示 0 到 0 筆，共 0 筆</div>
                <div id="pagination-buttons" class="flex gap-1"></div>
            </div>
        </div>
    </div>

    <!-- 彈窗 -->
    <div id="user-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeUserModal()"></div>
        <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-md overflow-hidden modal-enter relative max-h-[90vh] flex flex-col">
            <div class="px-8 py-5 border-b border-slate-100 flex justify-between items-center shrink-0 bg-slate-50">
                <h3 id="modal-title" class="font-black text-slate-800 text-lg flex items-center gap-2">
                    <i class="fa-solid fa-user-plus text-blue-600"></i> 新增授權用戶
                </h3>
                <button onclick="closeUserModal()" class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-slate-600 bg-white shadow-sm border border-slate-200 hover:bg-slate-50 transition-colors"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            
            <form id="user-form" class="p-8 space-y-5 overflow-y-auto custom-scrollbar flex-1 bg-white">
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-2">使用者姓名 <span class="text-rose-500">*</span></label>
                    <div class="relative">
                        <i class="fa-solid fa-id-badge absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="text" id="input-name" required placeholder="例如：王小明" class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none font-bold text-slate-700 shadow-sm">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-2">電子郵件 (Email) <span class="text-rose-500">*</span></label>
                    <div class="relative">
                        <i class="fa-solid fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="email" id="input-email" required placeholder="example@thu.edu.tw" class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none font-mono font-bold text-slate-700 shadow-sm">
                    </div>
                    <p class="text-[11px] text-slate-400 font-medium mt-1.5"><i class="fa-solid fa-circle-info text-blue-500 mr-1"></i> 請填寫使用者的東海大學信箱，未來需以此信箱登入。</p>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-2">系統權限角色 <span class="text-rose-500">*</span></label>
                    <select id="input-role" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none font-bold text-slate-700 cursor-pointer shadow-sm">
                        <option value="reviewer">一般查核員 (Reviewer) - 僅能審查文件</option>
                        <option value="admin">系統管理員 (Admin) - 擁有全部權限</option>
                    </select>
                </div>
            </form>
            
            <div class="p-6 border-t border-slate-100 shrink-0 flex gap-4 bg-slate-50">
                <button type="button" onclick="closeUserModal()" class="flex-1 py-2.5 text-sm font-bold text-slate-600 bg-white border border-slate-200 hover:bg-slate-100 rounded-xl transition-all shadow-sm">取消</button>
                <button type="button" id="btn-submit" onclick="submitUserForm()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-xl shadow-md shadow-blue-500/20 transition-all flex items-center justify-center gap-2">
                    儲存設定
                </button>
            </div>
        </div>
    </div>

    <!-- Firebase 邏輯 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, doc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDcsGfvVKnGmCzWfK5F03saydFpNc1ReYY", authDomain: "thu-isac-review.firebaseapp.com", projectId: "thu-isac-review", storageBucket: "thu-isac-review.firebasestorage.app", messagingSenderId: "453299876735", appId: "1:453299876735:web:1d8babca3315423161a04a" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);
        const usersCollection = collection(db, "users");

        let allUsers = []; let editingId = null; let currentPage = 1; const itemsPerPage = 10;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                onSnapshot(usersCollection, (snapshot) => {
                    allUsers = snapshot.docs.map(doc => {
                        const data = doc.data();
                        let createdDate = '未知';
                        if (data.created_at && data.created_at.toDate) {
                            const date = data.created_at.toDate();
                            createdDate = `${date.getFullYear()}/${String(date.getMonth() + 1).padStart(2, '0')}/${String(date.getDate()).padStart(2, '0')}`;
                        }
                        return { id: doc.id, ...data, createdDate };
                    });
                    
                    if(allUsers.length === 0) {
                        allUsers = [{ id: 'default_admin', name: '系統預設管理員', email: 'thu.isac.review@gmail.com', role: 'admin', is_active: true, createdDate: '系統預設' }];
                    }
                    renderTable();
                }, (error) => {
                    document.getElementById('user-table-body').innerHTML = `<tr><td colspan="5" class="px-6 py-16 text-center text-rose-500 font-bold"><i class="fa-solid fa-lock text-3xl mb-3"></i><p>資料讀取失敗，權限不足。</p></td></tr>`;
                });
            } else {
                document.getElementById('user-table-body').innerHTML = `<tr><td colspan="5" class="px-6 py-16 text-center text-slate-400 font-bold"><i class="fa-solid fa-shield-halved text-3xl mb-3 text-slate-300"></i><p>請先登入系統以存取資料。</p></td></tr>`;
            }
        });

        // =====================================
        // 以下為原有的純粹 UI 邏輯 (無須更改)
        // =====================================
        window.openUserModal = () => {
            if (!editingId) { 
                document.getElementById('user-form').reset();
                document.getElementById('modal-title').innerHTML = '<i class="fa-solid fa-user-plus text-blue-600"></i> 新增授權用戶';
                document.getElementById('input-email').readOnly = false;
                document.getElementById('input-email').classList.remove('bg-slate-100', 'text-slate-500');
            }
            document.getElementById('user-modal').classList.remove('hidden');
        };

        window.closeUserModal = () => {
            document.getElementById('user-modal').classList.add('hidden');
            editingId = null;
        };

        window.changePage = (page) => { currentPage = page; renderTable(); };

        function renderTable() {
            const tbody = document.getElementById('user-table-body');
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const filterRole = document.getElementById('filter-role').value;
            const filterStatus = document.getElementById('filter-status').value;

            let filtered = allUsers.filter(u => {
                const matchSearch = (u.name || '').toLowerCase().includes(searchTerm) || (u.email || '').toLowerCase().includes(searchTerm);
                const matchRole = filterRole === 'all' || u.role === filterRole;
                const matchStatus = filterStatus === 'all' || (filterStatus === 'active' ? u.is_active : !u.is_active);
                return matchSearch && matchRole && matchStatus;
            });

            filtered.sort((a, b) => {
                if(!a.created_at) return 1; if(!b.created_at) return -1;
                return b.created_at.toMillis() - a.created_at.toMillis();
            });

            const totalItems = filtered.length;
            const totalPages = Math.ceil(totalItems / itemsPerPage) || 1;
            if (currentPage > totalPages) currentPage = totalPages;

            const startIndex = (currentPage - 1) * itemsPerPage;
            const paginatedItems = filtered.slice(startIndex, startIndex + itemsPerPage);

            document.getElementById('pagination-info').innerText = totalItems > 0 ? `顯示 ${startIndex + 1} 到 ${Math.min(startIndex + itemsPerPage, totalItems)} 筆，共 ${totalItems} 筆` : '尚無資料';
            
            let btnHtml = '';
            btnHtml += `<button onclick="changePage(${currentPage - 1})" class="px-3 py-1 border border-slate-200 rounded-md text-sm font-bold text-slate-600 hover:bg-slate-100 disabled:opacity-40 transition-colors" ${currentPage === 1 ? 'disabled' : ''}>上一頁</button>`;
            btnHtml += `<span class="px-4 py-1 text-sm font-bold text-blue-600 bg-blue-50 rounded-md mx-1">${currentPage} / ${totalPages}</span>`;
            btnHtml += `<button onclick="changePage(${currentPage + 1})" class="px-3 py-1 border border-slate-200 rounded-md text-sm font-bold text-slate-600 hover:bg-slate-100 disabled:opacity-40 transition-colors" ${currentPage === totalPages ? 'disabled' : ''}>下一頁</button>`;
            document.getElementById('pagination-buttons').innerHTML = btnHtml;

            if (totalItems === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-16 text-center text-slate-400 font-bold bg-white">找不到符合條件的用戶。</td></tr>`;
                return;
            }

            let html = '';
            paginatedItems.forEach((data) => {
                let roleBadge = data.role === 'admin' 
                    ? `<span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-md bg-indigo-50 border border-indigo-200 text-indigo-700 text-xs font-bold shadow-sm"><i class="fa-solid fa-crown text-indigo-500"></i> 管理員</span>` 
                    : `<span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-md bg-blue-50 border border-blue-200 text-blue-700 text-xs font-bold shadow-sm"><i class="fa-solid fa-clipboard-check text-blue-500"></i> 查核員</span>`;

                const isDefaultAdmin = data.id === 'default_admin' || data.email === 'thu.isac.review@gmail.com';

                html += `
                <tr class="group bg-white hover:bg-blue-50/40 transition-all duration-150 ${!data.is_active ? 'opacity-60 grayscale-[20%] bg-slate-50/50' : ''}">
                    <td class="px-6 py-4 align-middle">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm shrink-0 ${data.role === 'admin' ? 'bg-indigo-100 text-indigo-600' : 'bg-blue-100 text-blue-600'}">
                                ${data.name ? data.name.charAt(0) : 'U'}
                            </div>
                            <div class="flex flex-col">
                                <span class="text-sm font-bold text-slate-800 break-words leading-tight">${data.name || '未設定姓名'}</span>
                                <span class="text-[11px] text-slate-500 font-mono tracking-tight mt-0.5">${data.email}</span>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4 align-middle text-center">${roleBadge}</td>
                    <td class="px-6 py-4 align-middle text-center"><div class="text-xs font-mono font-medium text-slate-500">${data.createdDate}</div></td>
                    <td class="px-6 py-4 align-middle text-center">
                        <div class="flex items-center justify-center">
                            <label class="relative inline-flex items-center ${isDefaultAdmin ? 'cursor-not-allowed opacity-50' : 'cursor-pointer'} group/toggle" title="${isDefaultAdmin ? '預設管理員無法停用' : '點擊切換狀態'}">
                                <input type="checkbox" class="sr-only peer" ${data.is_active ? 'checked' : ''} ${isDefaultAdmin ? 'disabled' : `onchange="window.toggleStatus('${data.id}', ${data.is_active})"`}>
                                <div class="relative w-11 h-6 bg-slate-200 rounded-full peer peer-checked:after:translate-x-[20px] peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-500 shadow-inner shrink-0 min-w-[44px]"></div>
                                <span class="ml-3 text-sm font-bold ${data.is_active ? 'text-emerald-600' : 'text-slate-400'}">${data.is_active ? '啟用' : '停權'}</span>
                            </label>
                        </div>
                    </td>
                    <td class="px-6 py-4 align-middle text-center">
                        <div class="flex items-center justify-center gap-2 opacity-100 transition-opacity">
                            <button onclick="window.editUser('${data.id}')" class="w-8 h-8 rounded-lg flex items-center justify-center bg-blue-50 text-blue-600 hover:bg-blue-100 transition-all" title="編輯權限"><i class="fa-solid fa-user-pen text-sm"></i></button>
                            <button onclick="window.deleteUser('${data.id}', '${data.name}', '${data.email}')" class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-rose-600 hover:bg-rose-50 transition-all disabled:opacity-20 disabled:cursor-not-allowed" ${isDefaultAdmin ? 'disabled' : ''} title="${isDefaultAdmin ? '預設管理員無法刪除' : '刪除用戶'}"><i class="fa-solid fa-trash-can text-sm"></i></button>
                        </div>
                    </td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        window.exportToCSV = () => {
            if (allUsers.length === 0) { alert("沒有資料可供匯出！"); return; }
            let csv = '\uFEFF姓名,電子郵件,權限角色,帳號狀態,加入時間\n';
            allUsers.forEach(u => {
                let status = u.is_active ? '啟用' : '停權';
                let roleStr = u.role === 'admin' ? '系統管理員' : '一般查核員';
                csv += [u.name, u.email, roleStr, status, u.createdDate].map(v => `"${(v+'').replace(/"/g, '""')}"`).join(',') + '\n';
            });
            const link = document.createElement('a'); link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
            link.download = `ISAC系統用戶清單_${new Date().toISOString().split('T')[0]}.csv`; link.click();
        };

        window.submitUserForm = async () => {
            const btn = document.getElementById('btn-submit');
            const payload = { name: document.getElementById('input-name').value.trim(), email: document.getElementById('input-email').value.trim(), role: document.getElementById('input-role').value };
            if(!payload.name || !payload.email || !payload.role) { alert("請填寫所有必填欄位！"); return; }

            const isValidDomain = payload.email === 'thu.isac.review@gmail.com' || payload.email.endsWith('@thu.edu.tw');
            if (!isValidDomain) { alert("錯誤：僅允許設定東海大學信箱 (@thu.edu.tw) 為系統操作帳號！"); return; }

            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> 儲存中...';
            try {
                if (editingId) { await updateDoc(doc(db, "users", editingId), { name: payload.name, role: payload.role, updated_at: serverTimestamp() }); } 
                else {
                    if(allUsers.some(u => u.email === payload.email)) { alert("此電子郵件已經存在於系統中！"); btn.disabled = false; btn.innerHTML = '儲存設定'; return; }
                    await addDoc(usersCollection, { ...payload, is_active: true, created_at: serverTimestamp() });
                }
                closeUserModal();
            } catch (err) { alert(err.message); } finally { btn.disabled = false; btn.innerText = '儲存設定'; }
        };

        window.editUser = (id) => {
            const user = allUsers.find(u => u.id === id);
            if (!user) return;
            if (id === 'default_admin') { alert("系統預設管理員無法進行修改。"); return; }
            editingId = id;
            document.getElementById('input-name').value = user.name; document.getElementById('input-email').value = user.email; document.getElementById('input-role').value = user.role;
            document.getElementById('input-email').readOnly = true; document.getElementById('input-email').classList.add('bg-slate-100', 'text-slate-500');
            document.getElementById('modal-title').innerHTML = '<i class="fa-solid fa-user-pen text-blue-600"></i> 編輯用戶權限';
            document.getElementById('user-modal').classList.remove('hidden');
        };

        window.toggleStatus = async (id, status) => { await updateDoc(doc(db, "users", id), { is_active: !status }); };
        window.deleteUser = async (id, name, email) => {
            if (confirm(`警告：確定要刪除用戶「${name} (${email})」嗎？\n刪除後該用戶將失去系統存取權。`)) {
                await deleteDoc(doc(db, "users", id));
                if (currentPage > Math.ceil((allUsers.length - 1) / itemsPerPage) || 1) currentPage = Math.ceil((allUsers.length - 1) / itemsPerPage) || 1;
                renderTable();
            }
        };

        document.getElementById('search-input').addEventListener('input', renderTable);
        document.getElementById('filter-role').addEventListener('change', renderTable);
        document.getElementById('filter-status').addEventListener('change', renderTable);
    </script>
</body>
</html>
