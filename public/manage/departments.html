<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系所清單管理內容</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { brand: { 50: '#f0f5fa', 500: '#2c75b3', 600: '#1a5c96', 700: '#004785' } } } }
        }
    </script>
    <style>
        body { background-color: transparent; margin: 0; padding: 0; font-family: "SF Pro TC", "Noto Sans TC", sans-serif; -webkit-font-smoothing: antialiased; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .modal-enter { animation: modalFadeIn 0.2s ease-out forwards; }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.97) translateY(-5px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        table { table-layout: fixed; width: 100%; }
        td { word-break: break-word; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen flex flex-col overflow-hidden">

    <!-- 頂部操作列 (僅保留頁面內的操作鈕) -->
    <div class="shrink-0 px-6 pt-6 pb-4 space-y-4 animate-fade">
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center border border-blue-100 shrink-0">
                    <i class="fa-solid fa-graduation-cap text-xl"></i>
                </div>
                <div>
                    <h2 class="text-xl font-bold text-slate-800 tracking-tight">管理學系清單與承辦窗口</h2>
                    <p class="text-xs text-slate-500 mt-1">設定參與查核的單位開放狀態。</p>
                </div>
            </div>
            
            <div class="flex flex-wrap gap-2">
                <button onclick="exportToCSV()" class="h-9 bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 font-bold px-3 rounded-lg text-sm transition-all flex items-center gap-1.5 shadow-sm">
                    <i class="fa-solid fa-file-export text-emerald-600"></i> 匯出
                </button>
                <button id="btn-import" onclick="document.getElementById('import-file').click()" class="h-9 bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 font-bold px-3 rounded-lg text-sm transition-all flex items-center gap-1.5 shadow-sm">
                    <i class="fa-solid fa-file-import text-blue-600"></i> 批次匯入
                </button>
                <input type="file" id="import-file" accept=".csv" class="hidden" onchange="handleImport(event)">
                
                <div class="w-px h-6 bg-slate-200 self-center mx-1"></div>
                
                <button onclick="openCollegeModal()" class="h-9 bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 font-bold px-3 rounded-lg text-sm transition-all flex items-center gap-1.5 shadow-sm">
                    <i class="fa-solid fa-university text-slate-500"></i> 學院設定
                </button>
                <button onclick="openDeptModal()" class="h-9 bg-blue-600 hover:bg-blue-700 text-white font-bold px-4 rounded-lg text-sm transition-all flex items-center gap-1.5 shadow-sm shadow-blue-500/20">
                    <i class="fa-solid fa-plus"></i> 新增系所
                </button>
            </div>
        </div>

        <div class="flex flex-col md:flex-row justify-between items-center gap-4 w-full">
            <div class="flex gap-2 w-full md:w-auto">
                <select id="filter-college" class="bg-white border border-slate-200 text-slate-700 text-sm font-bold rounded-lg px-3 h-10 outline-none focus:ring-2 focus:ring-blue-500 transition-all cursor-pointer shadow-sm">
                    <option value="all">全部學院</option>
                </select>
                <select id="filter-status" class="bg-white border border-slate-200 text-slate-700 text-sm font-bold rounded-lg px-3 h-10 outline-none focus:ring-2 focus:ring-blue-500 transition-all cursor-pointer shadow-sm">
                    <option value="all">狀態：全部</option>
                    <option value="active">狀態：啟用中</option>
                    <option value="inactive">狀態：已停用</option>
                </select>
            </div>
            <div class="relative w-full md:w-72 shadow-sm rounded-lg">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                <input type="text" id="search-input" placeholder="搜尋學系或代碼..." class="w-full bg-white border border-slate-200 rounded-lg pl-9 pr-3 h-10 text-sm outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            </div>
        </div>
    </div>

    <!-- 表格滾動區 -->
    <div class="flex-1 overflow-hidden px-6 pb-6 flex flex-col animate-fade">
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col flex-1 overflow-hidden">
            <div class="flex-1 overflow-auto custom-scrollbar relative">
                <table class="w-full text-left table-fixed">
                    <thead class="bg-slate-50 sticky top-0 z-10 shadow-sm border-b border-slate-200">
                        <tr>
                            <th class="px-6 py-3.5 text-center text-xs font-bold text-slate-500 w-[15%]">學院</th>
                            <th class="px-6 py-3.5 text-center text-xs font-bold text-slate-500 w-[20%]">學系</th>
                            <th class="px-6 py-3.5 text-center text-xs font-bold text-slate-500 w-[15%]">系所代碼</th>
                            <th class="px-6 py-3.5 text-center text-xs font-bold text-slate-500 w-[20%]">承辦窗口</th>
                            <th class="px-6 py-3.5 text-center text-xs font-bold text-slate-500 w-[12%]">系統狀態</th>
                            <th class="px-6 py-3.5 text-center text-xs font-bold text-slate-500 w-[18%]">操作</th>
                        </tr>
                    </thead>
                    <tbody id="dept-table-body" class="divide-y divide-slate-100 text-sm">
                        <tr><td colspan="6" class="px-6 py-16 text-center text-slate-400"><i class="fa-solid fa-circle-notch fa-spin text-3xl mb-3 text-blue-500"></i><p class="font-bold">資料載入中...</p></td></tr>
                    </tbody>
                </table>
            </div>
            
            <div class="bg-slate-50 border-t border-slate-200 px-6 py-3 flex justify-between items-center shrink-0">
                <div id="pagination-info" class="text-xs font-bold text-slate-500">顯示 0 到 0 筆，共 0 筆</div>
                <div id="pagination-buttons" class="flex gap-1"></div>
            </div>
        </div>
    </div>

    <!-- 彈窗 (與之前邏輯相同) -->
    <div id="college-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeCollegeModal()"></div>
        <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-lg overflow-hidden modal-enter relative flex flex-col max-h-[90vh]">
            <div class="px-8 py-5 border-b border-slate-100 flex justify-between items-center shrink-0 bg-slate-50">
                <h3 class="font-black text-slate-800 text-lg flex items-center gap-2">
                    <i class="fa-solid fa-university text-blue-600"></i> 學院設定管理
                </h3>
                <button onclick="closeCollegeModal()" class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-slate-600 bg-white shadow-sm border border-slate-200 hover:bg-slate-50 transition-colors"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            
            <div class="p-8 space-y-5 overflow-y-auto custom-scrollbar flex-1 bg-white">
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-2">新增學院</label>
                    <div class="flex gap-3">
                        <div class="relative flex-1">
                            <i class="fa-solid fa-university absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                            <input type="text" id="new-college-input" placeholder="輸入新學院名稱..." class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all shadow-sm font-bold text-slate-700">
                        </div>
                        <button onclick="addCollege()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl text-sm font-bold transition-all shadow-md shadow-blue-500/20 whitespace-nowrap"><i class="fa-solid fa-plus mr-1"></i> 新增</button>
                    </div>
                </div>

                <div class="pt-5 border-t border-slate-100">
                    <div class="flex items-center justify-between mb-3">
                        <label class="block text-xs font-bold text-slate-600">現有學院清單 (可排序與編輯)</label>
                    </div>
                    <ul id="college-list-container" class="space-y-3"></ul>
                </div>
            </div>
            
            <div class="p-6 border-t border-slate-100 shrink-0 flex gap-4 bg-slate-50">
                <button type="button" onclick="closeCollegeModal()" class="w-full py-3 text-sm font-bold text-slate-600 bg-white border border-slate-200 hover:bg-slate-100 rounded-xl transition-all shadow-sm">關閉設定</button>
            </div>
        </div>
    </div>

    <div id="dept-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeDeptModal()"></div>
        <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-lg overflow-hidden modal-enter relative max-h-[90vh] flex flex-col">
            <div class="px-8 py-5 border-b border-slate-100 flex justify-between items-center shrink-0 bg-slate-50">
                <h3 id="modal-title" class="font-black text-slate-800 text-lg flex items-center gap-2">
                    <i class="fa-solid fa-graduation-cap text-blue-600"></i> 新增系所單位
                </h3>
                <button onclick="closeDeptModal()" class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-slate-600 bg-white shadow-sm border border-slate-200 hover:bg-slate-50 transition-colors"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            
            <form id="dept-form" class="p-8 space-y-6 overflow-y-auto custom-scrollbar flex-1 bg-white">
                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-2">所屬學院 <span class="text-rose-500">*</span></label>
                        <select id="input-college" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none font-bold text-slate-700 cursor-pointer shadow-sm">
                            <option value="">請選擇學院...</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-2">系所代碼 <span class="text-rose-500">*</span></label>
                        <input type="text" id="input-code" required placeholder="例如：IM" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none uppercase font-mono font-bold text-slate-700 shadow-sm">
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-5">
                    <div class="col-span-2">
                        <label class="block text-xs font-bold text-slate-600 mb-2">學系全名 <span class="text-rose-500">*</span></label>
                        <input type="text" id="input-name" required placeholder="例如：資訊管理學系" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none font-bold text-slate-700 shadow-sm">
                    </div>
                    <div class="col-span-1">
                        <label class="block text-xs font-bold text-slate-600 mb-2">簡稱 (選填)</label>
                        <input type="text" id="input-short-name" placeholder="例如：資管系" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none font-bold text-slate-700 shadow-sm">
                    </div>
                </div>
                
                <div class="pt-6 border-t border-slate-100">
                    <div class="flex justify-between items-center mb-4">
                        <label class="block text-xs font-bold text-slate-600">承辦窗口 (可多位)</label>
                        <button type="button" onclick="addContactField()" class="text-xs font-bold text-blue-600 hover:text-blue-800 bg-blue-50 px-3 py-1.5 rounded-lg flex items-center gap-1 transition-colors border border-blue-100">
                            <i class="fa-solid fa-plus"></i> 新增窗口
                        </button>
                    </div>
                    <div id="contacts-container" class="space-y-3"></div>
                </div>
            </form>
            
            <div class="p-6 border-t border-slate-100 shrink-0 flex gap-4 bg-slate-50">
                <button type="button" onclick="closeDeptModal()" class="flex-1 py-3 text-sm font-bold text-slate-600 bg-white border border-slate-200 hover:bg-slate-100 rounded-xl transition-all shadow-sm">取消</button>
                <button type="button" id="btn-submit" onclick="submitDeptForm()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-md shadow-blue-500/20 transition-all flex items-center justify-center gap-2">
                    儲存系所
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, doc, updateDoc, deleteDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDcsGfvVKnGmCzWfK5F03saydFpNc1ReYY", authDomain: "thu-isac-review.firebaseapp.com", projectId: "thu-isac-review", storageBucket: "thu-isac-review.firebasestorage.app", messagingSenderId: "453299876735", appId: "1:453299876735:web:1d8babca3315423161a04a" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const deptCollection = collection(db, "departments");
        const collegeDocRef = doc(db, "settings", "colleges");

        let allDepts = []; let collegeList = []; let editingId = null;
        let currentPage = 1; const itemsPerPage = 10;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                onSnapshot(collegeDocRef, (docSnap) => {
                    if (docSnap.exists()) { collegeList = docSnap.data().list || []; } 
                    else { collegeList = ["文學院", "理學院", "工學院", "管理學院", "農學院"]; setDoc(collegeDocRef, { list: collegeList }); }
                    renderCollegeUI(); renderTable();
                });
                onSnapshot(deptCollection, (snapshot) => {
                    allDepts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    renderTable();
                });
            } else {
                document.getElementById('dept-table-body').innerHTML = `<tr><td colspan="6" class="px-6 py-16 text-center text-slate-400 font-bold"><i class="fa-solid fa-shield-halved text-3xl mb-3 text-slate-300"></i><p>請先登入系統以存取資料。</p></td></tr>`;
            }
        });

        // 以下為原有的純粹邏輯 (無須更改)
        window.openCollegeModal = () => document.getElementById('college-modal').classList.remove('hidden');
        window.closeCollegeModal = () => document.getElementById('college-modal').classList.add('hidden');

        function renderCollegeUI() {
            const listContainer = document.getElementById('college-list-container');
            listContainer.innerHTML = collegeList.map((c, index) => `
                <li class="flex justify-between items-center bg-white border border-slate-200 shadow-sm rounded-xl p-3 text-sm group hover:border-blue-300 transition-all">
                    <div class="flex items-center gap-3 flex-1 overflow-hidden">
                        <div class="flex flex-col opacity-20 group-hover:opacity-100 transition-opacity">
                            <button onclick="moveCollege(${index}, -1)" class="w-6 h-5 rounded hover:bg-slate-100 text-slate-400 hover:text-blue-600 disabled:opacity-0 transition-colors flex items-center justify-center" ${index === 0 ? 'disabled' : ''}><i class="fa-solid fa-chevron-up text-[10px]"></i></button>
                            <button onclick="moveCollege(${index}, 1)" class="w-6 h-5 rounded hover:bg-slate-100 text-slate-400 hover:text-blue-600 disabled:opacity-0 transition-colors flex items-center justify-center" ${index === collegeList.length - 1 ? 'disabled' : ''}><i class="fa-solid fa-chevron-down text-[10px]"></i></button>
                        </div>
                        <span id="col-text-${index}" class="font-bold text-slate-700 truncate pl-1">${c}</span>
                        <input type="text" id="col-input-${index}" value="${c}" class="hidden flex-1 border border-blue-400 bg-blue-50 rounded-lg px-3 py-1.5 text-sm font-bold text-blue-900 outline-none focus:ring-2 focus:ring-blue-500 transition-all shadow-inner">
                    </div>
                    <div class="flex items-center ml-3 gap-1.5 shrink-0">
                        <button id="col-edit-btn-${index}" onclick="editCollege(${index})" class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-blue-600 hover:bg-blue-50 transition-colors border border-transparent hover:border-blue-100"><i class="fa-solid fa-pen text-sm"></i></button>
                        <button id="col-save-btn-${index}" onclick="saveCollege(${index})" class="hidden w-8 h-8 rounded-lg flex items-center justify-center text-emerald-600 bg-emerald-50 hover:bg-emerald-100 border border-emerald-200 transition-colors shadow-sm"><i class="fa-solid fa-check text-base"></i></button>
                        <div class="w-px h-4 bg-slate-200 mx-0.5"></div>
                        <button onclick="removeCollege(${index})" class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-rose-600 hover:bg-rose-50 transition-colors border border-transparent hover:border-rose-100"><i class="fa-solid fa-trash-can text-sm"></i></button>
                    </div>
                </li>
            `).join('');

            const optionsHtml = collegeList.map(c => `<option value="${c}">${c}</option>`).join('');
            const filterSelect = document.getElementById('filter-college');
            filterSelect.innerHTML = `<option value="all">全部學院</option>` + optionsHtml;
            filterSelect.value = collegeList.includes(filterSelect.value) ? filterSelect.value : 'all';

            const inputSelect = document.getElementById('input-college');
            inputSelect.innerHTML = `<option value="">請選擇學院...</option>` + optionsHtml;
        }

        window.addCollege = async () => {
            const input = document.getElementById('new-college-input');
            const val = input.value.trim();
            if (!val) return;
            if (collegeList.includes(val)) { alert("此學院已存在！"); return; }
            await updateDoc(collegeDocRef, { list: [...collegeList, val] });
            input.value = '';
        };

        window.editCollege = (index) => {
            document.getElementById(`col-text-${index}`).classList.add('hidden');
            document.getElementById(`col-input-${index}`).classList.remove('hidden');
            document.getElementById(`col-input-${index}`).focus();
            document.getElementById(`col-edit-btn-${index}`).classList.add('hidden');
            document.getElementById(`col-save-btn-${index}`).classList.remove('hidden');
        };

        window.saveCollege = async (index) => {
            const newVal = document.getElementById(`col-input-${index}`).value.trim();
            if (!newVal) return;
            const newList = [...collegeList]; newList[index] = newVal;
            await updateDoc(collegeDocRef, { list: newList });
        };

        window.moveCollege = async (index, dir) => {
            if (index + dir < 0 || index + dir >= collegeList.length) return;
            const newList = [...collegeList];
            const temp = newList[index]; newList[index] = newList[index + dir]; newList[index + dir] = temp;
            await updateDoc(collegeDocRef, { list: newList });
        };

        window.removeCollege = async (index) => {
            if (confirm(`確定移除「${collegeList[index]}」嗎？`)) {
                await updateDoc(collegeDocRef, { list: collegeList.filter((_, i) => i !== index) });
            }
        };

        window.openDeptModal = () => {
            if (!editingId) { 
                document.getElementById('dept-form').reset();
                document.getElementById('contacts-container').innerHTML = '';
                addContactField();
                document.getElementById('modal-title').innerHTML = '<i class="fa-solid fa-graduation-cap text-blue-600"></i> 新增系所單位';
            }
            document.getElementById('dept-modal').classList.remove('hidden');
        };

        window.closeDeptModal = () => {
            document.getElementById('dept-modal').classList.add('hidden');
            editingId = null;
        };

        window.addContactField = (name = '', email = '') => {
            const container = document.getElementById('contacts-container');
            const div = document.createElement('div');
            div.className = 'contact-entry flex gap-3 items-start animate-[fadeIn_0.3s_ease-out]';
            div.innerHTML = `
                <div class="flex-1 space-y-2 bg-slate-50 p-3 rounded-lg border border-slate-200 shadow-sm">
                    <div class="flex items-center gap-2">
                        <span class="text-xs font-bold text-slate-400 w-12 shrink-0">姓名：</span>
                        <input type="text" placeholder="例如：陳助教" value="${name}" class="contact-name w-full bg-transparent text-sm focus:outline-none font-bold text-slate-700">
                    </div>
                    <div class="h-px bg-slate-200"></div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs font-bold text-slate-400 w-12 shrink-0">Email：</span>
                        <input type="email" placeholder="example@thu.edu.tw" value="${email}" class="contact-email w-full bg-transparent text-sm focus:outline-none text-slate-500 font-mono">
                    </div>
                </div>
                <button type="button" onclick="this.parentElement.remove()" class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-rose-500 hover:bg-rose-50 border border-transparent hover:border-rose-100 transition-all mt-1">
                    <i class="fa-solid fa-trash-can text-sm"></i>
                </button>
            `;
            container.appendChild(div);
        };

        window.changePage = (page) => { currentPage = page; renderTable(); };

        function renderTable() {
            const tbody = document.getElementById('dept-table-body');
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const filterCollege = document.getElementById('filter-college').value;
            const filterStatus = document.getElementById('filter-status').value;

            let filtered = allDepts.filter(d => {
                const matchSearch = d.name.toLowerCase().includes(searchTerm) || (d.shortName && d.shortName.toLowerCase().includes(searchTerm)) || d.code.toLowerCase().includes(searchTerm) || (d.contacts && d.contacts.some(c => c.name.includes(searchTerm)));
                const matchCollege = filterCollege === 'all' || d.college === filterCollege;
                const matchStatus = filterStatus === 'all' || (filterStatus === 'active' ? d.is_active : !d.is_active);
                return matchSearch && matchCollege && matchStatus;
            });

            filtered.sort((a, b) => (a.sortOrder || 999) - (b.sortOrder || 999));

            const totalItems = filtered.length;
            const totalPages = Math.ceil(totalItems / itemsPerPage) || 1;
            if (currentPage > totalPages) currentPage = totalPages;
            const startIndex = (currentPage - 1) * itemsPerPage;
            const paginatedItems = filtered.slice(startIndex, startIndex + itemsPerPage);

            document.getElementById('pagination-info').innerText = totalItems > 0 ? `顯示 ${startIndex + 1} 到 ${Math.min(startIndex + itemsPerPage, totalItems)} 筆，共 ${totalItems} 筆` : '尚無資料';
            
            let btnHtml = '';
            btnHtml += `<button onclick="changePage(${currentPage - 1})" class="px-3 py-1 border border-slate-200 rounded-md text-sm font-bold text-slate-600 hover:bg-slate-100 disabled:opacity-40 transition-colors" ${currentPage === 1 ? 'disabled' : ''}>上一頁</button>`;
            btnHtml += `<span class="px-4 py-1 text-sm font-bold text-blue-600 bg-blue-50 rounded-md mx-1">${currentPage} / ${totalPages}</span>`;
            btnHtml += `<button onclick="changePage(${currentPage + 1})" class="px-3 py-1 border border-slate-200 rounded-md text-sm font-bold text-slate-600 hover:bg-slate-100 disabled:opacity-40 transition-colors" ${currentPage === totalPages ? 'disabled' : ''}>下一頁</button>`;
            document.getElementById('pagination-buttons').innerHTML = btnHtml;

            if (totalItems === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-16 text-center text-slate-400 font-bold bg-white">找不到符合條件的系所。</td></tr>`;
                return;
            }

            let html = '';
            paginatedItems.forEach((data, idx) => {
                const globalIndex = startIndex + idx; 
                let contactsHtml = data.contacts && data.contacts.length > 0 ? data.contacts.map(c => `
                    <div class="flex flex-col items-start mb-2 last:mb-0">
                        <div class="text-sm font-bold text-slate-700 truncate" title="${c.name}">${c.name || '未填寫'}</div>
                        <div class="text-[11px] text-slate-400 font-mono tracking-tight truncate">${c.email || ''}</div>
                    </div>`).join('') : '<span class="text-slate-400 text-xs font-bold bg-slate-100 px-2 py-1 rounded">- 尚未設定 -</span>';

                html += `
                <tr class="group bg-white hover:bg-blue-50/40 transition-all duration-150 ${!data.is_active ? 'opacity-60 grayscale-[20%] bg-slate-50/50' : ''}">
                    <td class="px-6 py-4 align-middle text-center"><span class="text-slate-700 font-bold text-sm">${data.college}</span></td>
                    <td class="px-6 py-4 align-middle text-center"><div class="text-sm font-bold text-slate-800 break-words leading-tight">${data.shortName || data.name}</div></td>
                    <td class="px-6 py-4 align-middle text-center"><div class="inline-block px-2.5 py-1 rounded-md bg-slate-100 border border-slate-300 font-mono text-xs font-bold text-slate-600 tracking-widest shadow-inner">${data.code}</div></td>
                    <td class="px-6 py-4 align-middle"><div class="flex flex-col items-start pl-4">${contactsHtml}</div></td>
                    <td class="px-6 py-4 align-middle text-center">
                        <div class="flex items-center justify-center">
                            <label class="relative inline-flex items-center cursor-pointer group/toggle">
                                <input type="checkbox" class="sr-only peer" ${data.is_active ? 'checked' : ''} onchange="window.toggleStatus('${data.id}', ${data.is_active})">
                                <div class="relative w-11 h-6 bg-slate-200 rounded-full peer peer-checked:after:translate-x-[20px] peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-500 shadow-inner shrink-0 min-w-[44px]"></div>
                                <span class="ml-3 text-sm font-bold ${data.is_active ? 'text-emerald-600' : 'text-slate-400'}">${data.is_active ? '啟用' : '停用'}</span>
                            </label>
                        </div>
                    </td>
                    <td class="px-6 py-4 align-middle text-center">
                        <div class="flex items-center justify-center gap-2 opacity-100 transition-opacity">
                            <button onclick="window.moveOrder('${data.id}', 'up')" class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-slate-600 hover:bg-slate-100 transition-all disabled:opacity-20" ${globalIndex === 0 ? 'disabled' : ''}><i class="fa-solid fa-chevron-up text-xs"></i></button>
                            <button onclick="window.moveOrder('${data.id}', 'down')" class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-slate-600 hover:bg-slate-100 transition-all disabled:opacity-20" ${globalIndex === filtered.length - 1 ? 'disabled' : ''}><i class="fa-solid fa-chevron-down text-xs"></i></button>
                            <button onclick="window.editDept('${data.id}')" class="w-8 h-8 rounded-lg flex items-center justify-center bg-blue-50 text-blue-600 hover:bg-blue-100 transition-all"><i class="fa-solid fa-pen text-sm"></i></button>
                            <button onclick="window.deleteDept('${data.id}', '${data.name}')" class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-rose-600 hover:bg-rose-50 transition-all"><i class="fa-solid fa-trash-can text-sm"></i></button>
                        </div>
                    </td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        window.exportToCSV = () => {
            if (allDepts.length === 0) { alert("沒有資料可供匯出！"); return; }
            let csv = '\uFEFF排序,系統狀態,學院,學系全名,學系簡稱,系所代碼,聯絡人資訊\n';
            let sorted = [...allDepts].sort((a, b) => (a.sortOrder || 999) - (b.sortOrder || 999));
            sorted.forEach(d => {
                let status = d.is_active ? '啟用' : '停用';
                let contactsStr = d.contacts ? d.contacts.map(c => `${c.name}(${c.email})`).join('; ') : '';
                csv += [d.sortOrder, status, d.college, d.name, d.shortName || '', d.code, contactsStr].map(v => `"${(v+'').replace(/"/g, '""')}"`).join(',') + '\n';
            });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
            link.download = `ISAC系所清單_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
        };

        window.handleImport = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const btn = document.getElementById('btn-import');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin text-base text-blue-600"></i> 匯入中...';
            btn.disabled = true;

            const reader = new FileReader();
            reader.onload = async (event) => {
                try {
                    const rows = event.target.result.split('\n').map(row => row.trim()).filter(row => row);
                    let maxOrder = allDepts.length > 0 ? Math.max(...allDepts.map(d => d.sortOrder || 0)) : 0;
                    let addedCount = 0;
                    for (let i = 1; i < rows.length; i++) {
                        const cols = rows[i].split(',').map(col => col.replace(/(^"|"$)/g, '').trim());
                        if (cols.length >= 4) {
                            const [college, name, shortName, code, cName, cEmail] = [cols[0], cols[1], cols[2], cols[3].toUpperCase(), cols[4] || '', cols[5] || ''];
                            const contacts = (cName || cEmail) ? [{ name: cName, email: cEmail }] : [];
                            maxOrder += 10;
                            await addDoc(deptCollection, { college, name, shortName, code, contacts, is_active: true, sortOrder: maxOrder, created_at: serverTimestamp() });
                            addedCount++;
                        }
                    }
                    alert(`✅ 成功匯入 ${addedCount} 筆系所資料！`);
                } catch (error) { alert("匯入失敗，請確認檔案格式是否正確。\n" + error.message); } 
                finally { btn.innerHTML = originalHtml; btn.disabled = false; e.target.value = ''; }
            };
            reader.readAsText(file);
        };

        window.submitDeptForm = async () => {
            const btn = document.getElementById('btn-submit');
            const contacts = Array.from(document.querySelectorAll('.contact-entry')).map(entry => ({
                name: entry.querySelector('.contact-name').value.trim(), email: entry.querySelector('.contact-email').value.trim()
            })).filter(c => c.name || c.email);

            const payload = {
                college: document.getElementById('input-college').value.trim(), code: document.getElementById('input-code').value.toUpperCase().trim(),
                name: document.getElementById('input-name').value.trim(), shortName: document.getElementById('input-short-name').value.trim(), contacts
            };

            if(!payload.college || !payload.code || !payload.name) { alert("請填寫必填欄位！"); return; }

            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> 儲存中...';

            try {
                if (editingId) await updateDoc(doc(db, "departments", editingId), { ...payload, updated_at: serverTimestamp() });
                else {
                    const maxOrder = allDepts.length > 0 ? Math.max(...allDepts.map(d => d.sortOrder || 0)) : 0;
                    await addDoc(deptCollection, { ...payload, sortOrder: maxOrder + 10, is_active: true, created_at: serverTimestamp() });
                }
                closeDeptModal();
            } catch (err) { alert(err.message); }
            finally { btn.disabled = false; btn.innerText = '儲存系所'; }
        };

        window.editDept = (id) => {
            const dept = allDepts.find(d => d.id === id);
            if (!dept) return;
            editingId = id;
            document.getElementById('input-college').value = dept.college; document.getElementById('input-code').value = dept.code;
            document.getElementById('input-name').value = dept.name; document.getElementById('input-short-name').value = dept.shortName || '';
            document.getElementById('contacts-container').innerHTML = '';
            if (dept.contacts && dept.contacts.length > 0) dept.contacts.forEach(c => addContactField(c.name, c.email));
            else addContactField();
            document.getElementById('modal-title').innerHTML = '<i class="fa-solid fa-pen text-blue-600"></i> 編輯系所單位';
            document.getElementById('dept-modal').classList.remove('hidden');
        };

        window.moveOrder = async (id, direction) => {
            let sorted = [...allDepts].sort((a, b) => (a.sortOrder || 999) - (b.sortOrder || 999));
            const currentIndex = sorted.findIndex(d => d.id === id);
            if (direction === 'up' && currentIndex > 0) {
                await updateDoc(doc(db, "departments", sorted[currentIndex].id), { sortOrder: sorted[currentIndex - 1].sortOrder || (currentIndex-1)*10 });
                await updateDoc(doc(db, "departments", sorted[currentIndex - 1].id), { sortOrder: sorted[currentIndex].sortOrder || currentIndex*10 });
            } else if (direction === 'down' && currentIndex < sorted.length - 1) {
                await updateDoc(doc(db, "departments", sorted[currentIndex].id), { sortOrder: sorted[currentIndex + 1].sortOrder || (currentIndex+1)*10 });
                await updateDoc(doc(db, "departments", sorted[currentIndex + 1].id), { sortOrder: sorted[currentIndex].sortOrder || currentIndex*10 });
            }
        };

        window.toggleStatus = async (id, status) => await updateDoc(doc(db, "departments", id), { is_active: !status });
        window.deleteDept = async (id, name) => {
            if (confirm(`確定要刪除「${name}」嗎？此操作無法復原。`)) {
                await deleteDoc(doc(db, "departments", id));
                const totalPages = Math.ceil((allDepts.length - 1) / itemsPerPage) || 1;
                if (currentPage > totalPages) currentPage = totalPages;
                renderTable();
            }
        };
        
        document.getElementById('search-input').addEventListener('input', renderTable);
        document.getElementById('filter-college').addEventListener('change', renderTable);
        document.getElementById('filter-status').addEventListener('change', renderTable);
    </script>
</body>
</html>
