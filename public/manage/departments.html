<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系所清單管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f0f5fa', 500: '#2c75b3', 600: '#1a5c96', 700: '#004785' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f8fafc; margin: 0; padding: 2rem; overflow-x: hidden; }
        * { font-family: "SF Pro TC", "Noto Sans TC", sans-serif; -webkit-font-smoothing: antialiased; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* 彈窗動畫 */
        .modal-enter { animation: modalFadeIn 0.3s ease-out forwards; }
        @keyframes modalFadeIn { 
            from { opacity: 0; transform: scale(0.95) translateY(-10px); } 
            to { opacity: 1; transform: scale(1) translateY(0); } 
        }

        /* 讓表格欄寬嚴格固定 */
        table { table-layout: fixed; width: 100%; }
        td { word-break: break-word; }
    </style>
</head>
<body class="custom-scrollbar">

    <div class="max-w-[1200px] mx-auto space-y-6">
        
        <!-- 區塊 1：頂部標題與動作按鈕 -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center">
                    <i class="ph-fill ph-buildings text-2xl"></i>
                </div>
                <div>
                    <h2 class="text-xl font-bold text-slate-800 tracking-tight">系所清單管理</h2>
                    <p class="text-sm text-slate-500 mt-1">管理參與實習查核的學院與學系清單，並設定各系所的承辦窗口與開放狀態。</p>
                </div>
            </div>
            <div class="flex gap-3">
                <button class="bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 font-bold py-2.5 px-4 rounded-xl text-sm transition-all flex items-center gap-2 shadow-sm">
                    <i class="ph-bold ph-file-arrow-down text-lg"></i> 批次匯入
                </button>
                <button onclick="openCollegeModal()" class="bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 font-bold py-2.5 px-4 rounded-xl text-sm transition-all flex items-center gap-2 shadow-sm">
                    <i class="ph-bold ph-list-dashes text-lg"></i> 學院設定
                </button>
                <button onclick="openDeptModal()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-5 rounded-xl text-sm transition-all flex items-center gap-2 shadow-md shadow-blue-500/20">
                    <i class="ph-bold ph-plus text-lg"></i> 新增系所
                </button>
            </div>
        </div>

        <!-- 區塊 2：篩選與搜尋列 -->
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex gap-3 w-full md:w-auto">
                <select id="filter-college" class="bg-white border border-slate-200 text-slate-700 text-sm font-bold rounded-xl px-4 py-2.5 outline-none focus:ring-2 focus:ring-blue-500 transition-all cursor-pointer">
                    <option value="all">全部學院</option>
                    <!-- 動態生成 -->
                </select>
                <select id="filter-status" class="bg-white border border-slate-200 text-slate-700 text-sm font-bold rounded-xl px-4 py-2.5 outline-none focus:ring-2 focus:ring-blue-500 transition-all cursor-pointer">
                    <option value="all">狀態：全部</option>
                    <option value="active">狀態：啟用中</option>
                    <option value="inactive">狀態：已停用</option>
                </select>
            </div>
            <div class="relative w-full md:w-72">
                <i class="ph-bold ph-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="search-input" placeholder="搜尋學系或代碼..." class="w-full bg-white border border-slate-200 rounded-xl pl-10 pr-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            </div>
        </div>

        <!-- 區塊 3：固定欄寬資料表格 -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
            <table class="w-full text-left">
                <thead>
                    <tr class="border-b border-slate-100 bg-white">
                        <th class="px-4 py-5 text-sm font-bold text-slate-500 w-12 text-center"></th> <!-- 排序 -->
                        <th class="px-6 py-5 text-sm font-bold text-slate-500 w-[15%]">學院</th>
                        <th class="px-6 py-5 text-sm font-bold text-slate-500 w-[20%]">學系名稱</th>
                        <th class="px-6 py-5 text-sm font-bold text-slate-500 w-[12%]">系所代碼</th>
                        <th class="px-6 py-5 text-sm font-bold text-slate-500 w-[25%]">承辦窗口</th>
                        <th class="px-6 py-5 text-sm font-bold text-slate-500 w-[15%]">系統狀態</th>
                        <th class="px-6 py-5 text-sm font-bold text-slate-500 w-[13%] text-right">操作</th>
                    </tr>
                </thead>
                <tbody id="dept-table-body" class="divide-y divide-slate-50 text-sm">
                    <tr>
                        <td colspan="7" class="px-6 py-16 text-center text-slate-400">
                            <i class="ph-bold ph-spinner animate-spin text-3xl mb-3 text-blue-500"></i>
                            <p class="font-bold">連線至資料庫中...</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- ==========================================
         彈跳視窗 1：設定學院管理 (College Settings Modal)
         ========================================== -->
    <div id="college-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeCollegeModal()"></div>
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden modal-enter relative flex flex-col max-h-[80vh]">
            <div class="px-6 py-5 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                <h3 class="font-bold text-slate-800 text-lg flex items-center gap-2">
                    <i class="ph-bold ph-list-dashes text-blue-600"></i> 學院選單設定
                </h3>
                <button onclick="closeCollegeModal()" class="text-slate-400 hover:text-slate-600"><i class="ph-bold ph-x text-lg"></i></button>
            </div>
            
            <div class="p-6 overflow-y-auto custom-scrollbar flex-1">
                <div class="flex gap-2 mb-6">
                    <input type="text" id="new-college-input" placeholder="輸入新學院名稱" class="flex-1 border border-slate-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                    <button onclick="addCollege()" class="bg-slate-800 hover:bg-slate-900 text-white px-4 py-2 rounded-lg text-sm font-bold transition-colors whitespace-nowrap">
                        新增
                    </button>
                </div>
                <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">現有學院清單</div>
                <ul id="college-list-container" class="space-y-2">
                    <!-- 動態載入學院 -->
                </ul>
            </div>
        </div>
    </div>

    <!-- ==========================================
         彈跳視窗 2：新增/編輯系所 (Dept Modal)
         ========================================== -->
    <div id="dept-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeDeptModal()"></div>
        <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-lg overflow-hidden modal-enter relative max-h-[90vh] flex flex-col">
            <div class="px-8 py-6 border-b border-slate-100 flex justify-between items-center shrink-0 bg-slate-50/50">
                <h3 id="modal-title" class="font-black text-slate-800 text-lg flex items-center gap-2">
                    <i class="ph-bold ph-buildings text-blue-600"></i> 新增系所單位
                </h3>
                <button onclick="closeDeptModal()" class="text-slate-400 hover:text-slate-600 bg-white p-2 rounded-full shadow-sm border border-slate-100"><i class="ph-bold ph-x text-lg"></i></button>
            </div>
            
            <form id="dept-form" class="p-8 space-y-6 overflow-y-auto custom-scrollbar flex-1">
                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-2">所屬學院 <span class="text-rose-500">*</span></label>
                        <!-- 改為 select 綁定學院設定 -->
                        <select id="input-college" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none font-bold text-slate-700 cursor-pointer">
                            <option value="">請選擇學院...</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-2">系所代碼 <span class="text-rose-500">*</span></label>
                        <input type="text" id="input-code" required placeholder="例如：IM" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none uppercase font-mono font-bold text-slate-700">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-2">學系名稱 <span class="text-rose-500">*</span></label>
                    <input type="text" id="input-name" required placeholder="例如：資訊管理學系" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none font-bold text-slate-700">
                </div>
                
                <div class="pt-6 border-t border-slate-100">
                    <div class="flex justify-between items-center mb-4">
                        <label class="block text-xs font-bold text-slate-600">承辦窗口 (可多位)</label>
                        <button type="button" onclick="addContactField()" class="text-xs font-bold text-blue-600 hover:text-blue-800 bg-blue-50 px-3 py-1.5 rounded-lg flex items-center gap-1 transition-colors">
                            <i class="ph-bold ph-plus"></i> 新增助教
                        </button>
                    </div>
                    <div id="contacts-container" class="space-y-3">
                        <!-- 動態生成多窗口 -->
                    </div>
                </div>
            </form>
            
            <div class="p-6 border-t border-slate-100 shrink-0 flex gap-4 bg-slate-50/50">
                <button type="button" onclick="closeDeptModal()" class="flex-1 py-3 text-sm font-bold text-slate-500 bg-white border border-slate-200 hover:bg-slate-50 rounded-xl transition-all shadow-sm">取消</button>
                <button type="button" id="btn-submit" onclick="submitDeptForm()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-blue-500/30 transition-all flex items-center justify-center gap-2">
                    儲存系所
                </button>
            </div>
        </div>
    </div>

    <!-- Firebase 與邏輯 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, doc, updateDoc, deleteDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDcsGfvVKnGmCzWfK5F03saydFpNc1ReYY",
            authDomain: "thu-isac-review.firebaseapp.com",
            projectId: "thu-isac-review",
            storageBucket: "thu-isac-review.firebasestorage.app",
            messagingSenderId: "453299876735",
            appId: "1:453299876735:web:1d8babca3315423161a04a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        const deptCollection = collection(db, "departments");
        const collegeDocRef = doc(db, "settings", "colleges");

        let allDepts = [];
        let collegeList = [];
        let editingId = null;

        // =====================================
        // 學院設定邏輯 (Colleges)
        // =====================================
        onSnapshot(collegeDocRef, (docSnap) => {
            if (docSnap.exists()) {
                collegeList = docSnap.data().list || [];
            } else {
                collegeList = ["文學院", "理學院", "工學院", "管理學院", "農學院"];
                setDoc(collegeDocRef, { list: collegeList }); // 初始化預設值
            }
            renderCollegeUI();
            renderTable(); // 重新渲染表格過濾器
        });

        window.openCollegeModal = () => document.getElementById('college-modal').classList.remove('hidden');
        window.closeCollegeModal = () => {
            document.getElementById('college-modal').classList.add('hidden');
            document.getElementById('new-college-input').value = '';
        };

        function renderCollegeUI() {
            // 渲染彈窗內的列表
            const listContainer = document.getElementById('college-list-container');
            listContainer.innerHTML = collegeList.map((c, index) => `
                <li class="flex justify-between items-center bg-slate-50 border border-slate-100 rounded-lg p-3 text-sm">
                    <span class="font-bold text-slate-700">${c}</span>
                    <button onclick="removeCollege(${index})" class="text-slate-400 hover:text-rose-500 transition-colors"><i class="ph-bold ph-trash"></i></button>
                </li>
            `).join('');

            // 渲染下拉選單 (篩選器與新增表單)
            const optionsHtml = collegeList.map(c => `<option value="${c}">${c}</option>`).join('');
            
            const filterSelect = document.getElementById('filter-college');
            const currentFilter = filterSelect.value;
            filterSelect.innerHTML = `<option value="all">全部學院</option>` + optionsHtml;
            filterSelect.value = collegeList.includes(currentFilter) ? currentFilter : 'all';

            const inputSelect = document.getElementById('input-college');
            const currentInput = inputSelect.value;
            inputSelect.innerHTML = `<option value="">請選擇學院...</option>` + optionsHtml;
            inputSelect.value = collegeList.includes(currentInput) ? currentInput : '';
        }

        window.addCollege = async () => {
            const input = document.getElementById('new-college-input');
            const val = input.value.trim();
            if (!val) return;
            if (collegeList.includes(val)) { alert("此學院已存在！"); return; }
            
            const newList = [...collegeList, val].sort();
            await updateDoc(collegeDocRef, { list: newList });
            input.value = '';
        };

        window.removeCollege = async (index) => {
            if (confirm(`確定移除「${collegeList[index]}」嗎？\n(注意：不會刪除已套用此學院的系所)`)) {
                const newList = collegeList.filter((_, i) => i !== index);
                await updateDoc(collegeDocRef, { list: newList });
            }
        };

        // =====================================
        // 系所操作邏輯 (Departments)
        // =====================================
        window.openDeptModal = () => {
            if (!editingId) { 
                document.getElementById('dept-form').reset();
                document.getElementById('contacts-container').innerHTML = '';
                addContactField();
                document.getElementById('modal-title').innerHTML = '<i class="ph-bold ph-buildings text-blue-600"></i> 新增系所單位';
            }
            document.getElementById('dept-modal').classList.remove('hidden');
        };

        window.closeDeptModal = () => {
            document.getElementById('dept-modal').classList.add('hidden');
            editingId = null;
        };

        // 動態聯絡人欄位 (支援多位)
        window.addContactField = (name = '', email = '') => {
            const container = document.getElementById('contacts-container');
            const div = document.createElement('div');
            div.className = 'contact-entry flex gap-3 items-start animate-[fadeIn_0.3s_ease-out]';
            div.innerHTML = `
                <div class="flex-1 space-y-2 bg-white p-3 rounded-xl border border-slate-200 shadow-sm">
                    <div class="flex items-center gap-2">
                        <i class="ph-bold ph-user text-slate-400"></i>
                        <input type="text" placeholder="助教姓名 (例如：陳助教)" value="${name}" class="contact-name w-full bg-transparent text-sm focus:outline-none font-bold text-slate-700">
                    </div>
                    <div class="h-px bg-slate-100"></div>
                    <div class="flex items-center gap-2">
                        <i class="ph-bold ph-envelope-simple text-slate-400"></i>
                        <input type="email" placeholder="Email (選填)" value="${email}" class="contact-email w-full bg-transparent text-sm focus:outline-none text-slate-500 font-mono">
                    </div>
                </div>
                <button type="button" onclick="this.parentElement.remove()" class="p-2.5 text-slate-400 hover:text-rose-500 hover:bg-rose-50 border border-transparent hover:border-rose-100 rounded-xl transition-all h-fit mt-1">
                    <i class="ph-bold ph-trash text-lg"></i>
                </button>
            `;
            container.appendChild(div);
        };

        // =====================================
        // 資料表格渲染
        // =====================================
        onSnapshot(deptCollection, (snapshot) => {
            allDepts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderTable();
        });

        function renderTable() {
            const tbody = document.getElementById('dept-table-body');
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const filterCollege = document.getElementById('filter-college').value;
            const filterStatus = document.getElementById('filter-status').value;

            let filtered = allDepts.filter(d => {
                const matchSearch = d.name.toLowerCase().includes(searchTerm) || 
                                    d.code.toLowerCase().includes(searchTerm) ||
                                    (d.contacts && d.contacts.some(c => c.name.includes(searchTerm)));
                const matchCollege = filterCollege === 'all' || d.college === filterCollege;
                const matchStatus = filterStatus === 'all' || (filterStatus === 'active' ? d.is_active : !d.is_active);
                return matchSearch && matchCollege && matchStatus;
            });

            // 排序 (依據 sortOrder)
            filtered.sort((a, b) => (a.sortOrder || 999) - (b.sortOrder || 999));

            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="px-6 py-16 text-center text-slate-400 font-bold bg-white">找不到符合條件的系所。</td></tr>`;
                return;
            }

            let html = '';
            filtered.forEach((data, index) => {
                
                // 多位聯絡人排版
                let contactsHtml = '';
                if (data.contacts && data.contacts.length > 0) {
                    contactsHtml = data.contacts.map(c => `
                        <div class="py-1">
                            <div class="text-sm font-bold text-slate-700 truncate" title="${c.name}">${c.name || '未填寫'}</div>
                            <div class="text-xs text-slate-400 font-mono truncate" title="${c.email}">${c.email || ''}</div>
                        </div>
                    `).join('');
                } else {
                    contactsHtml = '<span class="text-slate-400 text-xs font-bold">- 尚未設定 -</span>';
                }

                html += `
                <tr class="group bg-white hover:bg-slate-50 transition-all duration-200 ${!data.is_active ? 'opacity-60 grayscale-[30%]' : ''}">
                    <!-- 隱藏式排序箭頭 -->
                    <td class="px-4 py-4 align-middle text-center border-r border-transparent group-hover:border-slate-100">
                        <div class="flex flex-col items-center opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="window.moveOrder('${data.id}', 'up')" class="text-slate-400 hover:text-blue-600 disabled:opacity-0 transition-colors" ${index === 0 ? 'disabled' : ''}><i class="ph-fill ph-caret-up text-base"></i></button>
                            <button onclick="window.moveOrder('${data.id}', 'down')" class="text-slate-400 hover:text-blue-600 disabled:opacity-0 transition-colors" ${index === filtered.length - 1 ? 'disabled' : ''}><i class="ph-fill ph-caret-down text-base"></i></button>
                        </div>
                    </td>
                    <td class="px-6 py-4 align-middle truncate">
                        <span class="text-slate-500 font-medium text-sm">${data.college}</span>
                    </td>
                    <td class="px-6 py-4 align-middle">
                        <span class="text-base font-bold text-slate-800 break-words">${data.name}</span>
                    </td>
                    <td class="px-6 py-4 align-middle">
                        <!-- 還原截圖的代碼 Badge 設計 (淡灰邊框) -->
                        <div class="inline-flex items-center justify-center px-3 py-1.5 rounded bg-slate-50 border border-slate-200 font-mono text-xs font-bold text-slate-500 tracking-wider">
                            ${data.code}
                        </div>
                    </td>
                    <td class="px-6 py-4 align-middle">
                        <div class="flex flex-col gap-1 overflow-hidden">
                            ${contactsHtml}
                        </div>
                    </td>
                    <td class="px-6 py-4 align-middle text-center">
                        <!-- iOS 風格 Toggle 開關 -->
                        <label class="relative inline-flex items-center justify-center cursor-pointer group/toggle">
                            <input type="checkbox" class="sr-only peer" ${data.is_active ? 'checked' : ''} onchange="window.toggleStatus('${data.id}', ${data.is_active})">
                            <div class="w-10 h-5 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-emerald-500"></div>
                            <span class="ml-2 text-sm font-bold ${data.is_active ? 'text-emerald-600' : 'text-slate-400'}">${data.is_active ? '啟用' : '停用'}</span>
                        </label>
                    </td>
                    <td class="px-6 py-4 align-middle text-right">
                        <div class="flex items-center justify-end gap-1">
                            <button onclick="window.editDept('${data.id}')" class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-blue-600 hover:bg-blue-50 transition-colors" title="編輯">
                                <i class="ph-bold ph-pencil-simple text-lg"></i>
                            </button>
                            <button onclick="window.deleteDept('${data.id}', '${data.name}')" class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-rose-600 hover:bg-rose-50 transition-colors" title="刪除">
                                <i class="ph-bold ph-trash text-lg"></i>
                            </button>
                        </div>
                    </td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        // 綁定搜尋與過濾事件
        document.getElementById('search-input').addEventListener('input', renderTable);
        document.getElementById('filter-college').addEventListener('change', renderTable);
        document.getElementById('filter-status').addEventListener('change', renderTable);

        // =====================================
        // Firebase 增刪改查
        // =====================================
        window.submitDeptForm = async () => {
            const btn = document.getElementById('btn-submit');
            
            // 收集助教資料
            const contacts = Array.from(document.querySelectorAll('.contact-entry')).map(entry => ({
                name: entry.querySelector('.contact-name').value.trim(),
                email: entry.querySelector('.contact-email').value.trim()
            })).filter(c => c.name || c.email);

            const payload = {
                college: document.getElementById('input-college').value.trim(),
                code: document.getElementById('input-code').value.toUpperCase().trim(),
                name: document.getElementById('input-name').value.trim(),
                contacts: contacts
            };

            if(!payload.college || !payload.code || !payload.name) {
                alert("請填寫必填欄位！");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="ph-bold ph-spinner animate-spin"></i> 儲存中...';

            try {
                if (editingId) {
                    await updateDoc(doc(db, "departments", editingId), { ...payload, updated_at: serverTimestamp() });
                } else {
                    const maxOrder = allDepts.length > 0 ? Math.max(...allDepts.map(d => d.sortOrder || 0)) : 0;
                    await addDoc(deptCollection, { ...payload, sortOrder: maxOrder + 10, is_active: true, created_at: serverTimestamp() });
                }
                closeDeptModal();
            } catch (err) { alert(err.message); }
            finally { btn.disabled = false; btn.innerText = '儲存系所'; }
        };

        window.editDept = (id) => {
            const dept = allDepts.find(d => d.id === id);
            if (!dept) return;
            editingId = id;

            document.getElementById('input-college').value = dept.college;
            document.getElementById('input-code').value = dept.code;
            document.getElementById('input-name').value = dept.name;

            document.getElementById('contacts-container').innerHTML = '';
            if (dept.contacts && dept.contacts.length > 0) {
                dept.contacts.forEach(c => addContactField(c.name, c.email));
            } else {
                addContactField(); // 給空的輸入框
            }

            document.getElementById('modal-title').innerHTML = '<i class="ph-bold ph-pencil-simple text-blue-600"></i> 編輯系所單位';
            document.getElementById('dept-modal').classList.remove('hidden');
        };

        // 排序上/下移
        window.moveOrder = async (id, direction) => {
            let sorted = [...allDepts].sort((a, b) => (a.sortOrder || 999) - (b.sortOrder || 999));
            const currentIndex = sorted.findIndex(d => d.id === id);
            
            if (direction === 'up' && currentIndex > 0) {
                const current = sorted[currentIndex];
                const target = sorted[currentIndex - 1];
                await updateDoc(doc(db, "departments", current.id), { sortOrder: target.sortOrder || (currentIndex-1)*10 });
                await updateDoc(doc(db, "departments", target.id), { sortOrder: current.sortOrder || currentIndex*10 });
            } else if (direction === 'down' && currentIndex < sorted.length - 1) {
                const current = sorted[currentIndex];
                const target = sorted[currentIndex + 1];
                await updateDoc(doc(db, "departments", current.id), { sortOrder: target.sortOrder || (currentIndex+1)*10 });
                await updateDoc(doc(db, "departments", target.id), { sortOrder: current.sortOrder || currentIndex*10 });
            }
        };

        window.toggleStatus = async (id, status) => {
            await updateDoc(doc(db, "departments", id), { is_active: !status });
        };

        window.deleteDept = async (id, name) => {
            if (confirm(`確定要刪除「${name}」嗎？此操作無法復原。`)) {
                await deleteDoc(doc(db, "departments", id));
            }
        };
    </script>
</body>
</html>
