<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系所清單管理 - 內容頁</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f0f5fa', 500: '#2c75b3', 600: '#1a5c96', 700: '#004785' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f8fafc; margin: 0; padding: 2rem; overflow-x: hidden; }
        * { font-family: "SF Pro TC", "Noto Sans TC", sans-serif; -webkit-font-smoothing: antialiased; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .modal-enter { animation: modalFadeIn 0.3s ease-out forwards; }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.95) translateY(-10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    </style>
</head>
<body class="custom-scrollbar">

    <div class="max-w-[1400px] mx-auto space-y-6">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200/60 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                    <i class="ph-fill ph-buildings text-blue-600 text-2xl"></i> 系所清單管理
                </h2>
                <p class="text-sm text-slate-500 mt-1">管理各院系承辦窗口，支援多窗口設定與自訂顯示排序。</p>
            </div>
            <div class="flex gap-3">
                <button class="bg-white hover:bg-slate-50 text-slate-700 border border-slate-300 font-bold py-2.5 px-5 rounded-xl text-sm transition-all flex items-center gap-2 shadow-sm">
                    <i class="ph-bold ph-download-simple"></i> 匯出清單
                </button>
                <button onclick="openModal()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-5 rounded-xl text-sm transition-all flex items-center gap-2 shadow-md shadow-blue-200">
                    <i class="ph-bold ph-plus"></i> 新增系所
                </button>
            </div>
        </div>

        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200/60 flex flex-col md:flex-row justify-between gap-4">
            <div class="flex gap-3">
                <select id="filter-college" class="bg-slate-50 border border-slate-200 text-slate-700 text-sm font-bold rounded-xl px-4 py-2 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                    <option value="all">全部學院</option>
                    </select>
                <select id="filter-status" class="bg-slate-50 border border-slate-200 text-slate-700 text-sm font-bold rounded-xl px-4 py-2 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                    <option value="all">全部狀態</option>
                    <option value="active">啟用中</option>
                    <option value="inactive">已停用</option>
                </select>
            </div>
            <div class="relative w-full md:w-72">
                <i class="ph-bold ph-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="search-input" placeholder="搜尋代碼、名稱或窗口..." class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-4 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all font-medium">
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200/60 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50/80 border-b border-slate-100">
                            <th class="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest w-16 text-center">排序</th>
                            <th class="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">學院 / 學系</th>
                            <th class="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">代碼</th>
                            <th class="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">承辦窗口</th>
                            <th class="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center">系統狀態</th>
                            <th class="px-6 py-4 text-right">操作</th>
                        </tr>
                    </thead>
                    <tbody id="dept-table-body" class="divide-y divide-slate-50 text-sm">
                        <tr>
                            <td colspan="6" class="px-6 py-16 text-center text-slate-400">
                                <i class="ph-bold ph-spinner animate-spin text-3xl mb-3 text-blue-500"></i>
                                <p class="font-bold">連線至資料庫中...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="dept-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-lg overflow-hidden modal-enter relative max-h-[90vh] flex flex-col">
            <div class="px-8 py-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50 shrink-0">
                <h3 id="modal-title" class="font-black text-slate-800 text-lg flex items-center gap-2">
                    <i class="ph-bold ph-buildings text-blue-600"></i> 新增系所單位
                </h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 transition-colors bg-white p-2 rounded-full shadow-sm border border-slate-100"><i class="ph-bold ph-x text-lg"></i></button>
            </div>
            
            <form id="dept-form" class="p-8 space-y-6 overflow-y-auto custom-scrollbar flex-1">
                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 px-1 tracking-widest">所屬學院</label>
                        <input list="college-list" id="input-college" required placeholder="例如：管理學院" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none font-bold text-slate-700">
                        <datalist id="college-list"></datalist>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 px-1 tracking-widest">系所代碼</label>
                        <input type="text" id="input-code" required placeholder="例如：IM" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none uppercase font-mono font-bold text-blue-600">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 px-1 tracking-widest">學系名稱</label>
                    <input type="text" id="input-name" required placeholder="例如：資訊管理學系" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none font-bold text-slate-700">
                </div>
                
                <div class="pt-6 border-t border-slate-100">
                    <div class="flex justify-between items-center mb-4">
                        <label class="block text-[10px] font-black text-slate-400 uppercase px-1 tracking-widest">承辦窗口設定</label>
                        <button type="button" onclick="addContactField()" class="text-xs font-bold text-blue-600 hover:text-blue-800 bg-blue-50 px-3 py-1.5 rounded-lg flex items-center gap-1 transition-colors">
                            <i class="ph-bold ph-plus"></i> 新增窗口
                        </button>
                    </div>
                    <div id="contacts-container" class="space-y-3">
                        </div>
                </div>
            </form>
            
            <div class="p-6 bg-slate-50 border-t border-slate-100 shrink-0 flex gap-4">
                <button type="button" onclick="closeModal()" class="flex-1 py-3.5 text-sm font-bold text-slate-500 bg-white border border-slate-200 hover:bg-slate-100 rounded-xl transition-all shadow-sm">取消</button>
                <button type="button" id="btn-submit" onclick="submitForm()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-blue-200 transition-all flex items-center justify-center gap-2">
                    <i class="ph-bold ph-check"></i> 儲存設定
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, doc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDcsGfvVKnGmCzWfK5F03saydFpNc1ReYY",
            authDomain: "thu-isac-review.firebaseapp.com",
            projectId: "thu-isac-review",
            storageBucket: "thu-isac-review.firebasestorage.app",
            messagingSenderId: "453299876735",
            appId: "1:453299876735:web:1d8babca3315423161a04a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const deptCollection = collection(db, "departments");

        // 全域變數
        let allDepts = [];
        let editingId = null;

        // =====================================
        // UI 控制邏輯
        // =====================================
        window.openModal = () => {
            if (!editingId) { // 如果是新增，清空欄位並預設一個窗口
                document.getElementById('dept-form').reset();
                document.getElementById('contacts-container').innerHTML = '';
                addContactField();
                document.getElementById('modal-title').innerHTML = '<i class="ph-bold ph-buildings text-blue-600"></i> 新增系所單位';
            }
            document.getElementById('dept-modal').classList.remove('hidden');
        };

        window.closeModal = () => {
            document.getElementById('dept-modal').classList.add('hidden');
            editingId = null; // 重置編輯狀態
        };

        // 動態新增聯絡人欄位
        window.addContactField = (name = '', email = '') => {
            const container = document.getElementById('contacts-container');
            const div = document.createElement('div');
            div.className = 'contact-entry flex gap-3 items-start animate-fade';
            div.innerHTML = `
                <div class="flex-1 space-y-2">
                    <input type="text" placeholder="姓名 (選填)" value="${name}" class="contact-name w-full bg-white border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    <input type="email" placeholder="Email (選填)" value="${email}" class="contact-email w-full bg-white border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none font-mono">
                </div>
                <button type="button" onclick="this.parentElement.remove()" class="p-3 text-slate-300 hover:text-rose-500 bg-white border border-slate-200 hover:border-rose-200 hover:bg-rose-50 rounded-xl transition-all h-fit mt-0.5">
                    <i class="ph-bold ph-trash text-lg"></i>
                </button>
            `;
            container.appendChild(div);
        };

        // =====================================
        // 資料渲染與篩選邏輯
        // =====================================
        function renderTable() {
            const tbody = document.getElementById('dept-table-body');
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const filterCollege = document.getElementById('filter-college').value;
            const filterStatus = document.getElementById('filter-status').value;

            // 1. 篩選
            let filtered = allDepts.filter(d => {
                const matchSearch = d.name.toLowerCase().includes(searchTerm) || 
                                    d.code.toLowerCase().includes(searchTerm) ||
                                    (d.contacts && d.contacts.some(c => c.name.includes(searchTerm)));
                const matchCollege = filterCollege === 'all' || d.college === filterCollege;
                const matchStatus = filterStatus === 'all' || (filterStatus === 'active' ? d.is_active : !d.is_active);
                return matchSearch && matchCollege && matchStatus;
            });

            // 2. 排序 (依據 sortOrder，數字越小越上面)
            filtered.sort((a, b) => (a.sortOrder || 999) - (b.sortOrder || 999));

            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-16 text-center text-slate-400 font-bold bg-white">找不到符合條件的系所。</td></tr>`;
                return;
            }

            let html = '';
            filtered.forEach((data, index) => {
                // 處理多聯絡人顯示，若無則顯示橫線
                let contactsHtml = '';
                if (data.contacts && data.contacts.length > 0) {
                    contactsHtml = data.contacts.map(c => `
                        <div class="mb-2 last:mb-0">
                            <div class="text-sm font-bold text-slate-700 flex items-center gap-1.5"><i class="ph-fill ph-user text-slate-400"></i> ${c.name || '未設定姓名'}</div>
                            <div class="text-[10px] text-slate-400 font-medium pl-5">${c.email || '未設定 Email'}</div>
                        </div>
                    `).join('');
                } else {
                    contactsHtml = '<span class="text-slate-400 font-bold text-xs">- 尚未設定 -</span>';
                }

                html += `
                <tr class="hover:bg-slate-50/80 transition-colors ${!data.is_active ? 'opacity-50 grayscale-[50%]' : ''}">
                    <td class="px-6 py-5 text-center border-r border-slate-50">
                        <div class="flex flex-col items-center justify-center gap-1">
                            <button onclick="window.moveOrder('${data.id}', 'up')" class="text-slate-300 hover:text-blue-500 hover:bg-blue-50 rounded p-0.5 transition-colors disabled:opacity-0" ${index === 0 ? 'disabled' : ''}><i class="ph-bold ph-caret-up text-lg"></i></button>
                            <span class="text-[10px] font-black text-slate-400">${data.sortOrder || 999}</span>
                            <button onclick="window.moveOrder('${data.id}', 'down')" class="text-slate-300 hover:text-blue-500 hover:bg-blue-50 rounded p-0.5 transition-colors disabled:opacity-0" ${index === filtered.length - 1 ? 'disabled' : ''}><i class="ph-bold ph-caret-down text-lg"></i></button>
                        </div>
                    </td>
                    <td class="px-6 py-5">
                        <div class="text-[10px] font-black text-blue-600 mb-1.5 uppercase tracking-widest">${data.college}</div>
                        <div class="font-black text-slate-800 text-base">${data.name}</div>
                    </td>
                    <td class="px-6 py-5">
                        <div class="inline-flex items-center justify-center px-3 py-1.5 rounded-lg bg-blue-50 text-blue-700 border border-blue-200 font-mono text-xs font-black tracking-widest shadow-sm">
                            ${data.code}
                        </div>
                    </td>
                    <td class="px-6 py-5 align-top pt-6">
                        ${contactsHtml}
                    </td>
                    <td class="px-6 py-5 text-center">
                        <button onclick="window.toggleStatus('${data.id}', ${data.is_active})" class="px-4 py-1.5 rounded-full text-[10px] font-black tracking-widest transition-all border shadow-sm ${data.is_active ? 'bg-emerald-50 text-emerald-600 border-emerald-200 hover:bg-rose-50 hover:text-rose-600 hover:border-rose-200' : 'bg-slate-100 text-slate-400 border-slate-200 hover:bg-emerald-50 hover:text-emerald-600 hover:border-emerald-200'}">
                            ${data.is_active ? '啟用中' : '已停用'}
                        </button>
                    </td>
                    <td class="px-6 py-5 text-right">
                        <button onclick="window.editDept('${data.id}')" class="text-slate-400 hover:text-blue-600 transition-colors p-2 bg-white border border-slate-100 shadow-sm rounded-lg mr-1" title="編輯">
                            <i class="ph-bold ph-pencil-simple text-lg"></i>
                        </button>
                        <button onclick="window.deleteDept('${data.id}', '${data.name}')" class="text-slate-400 hover:text-rose-600 transition-colors p-2 bg-white border border-slate-100 shadow-sm rounded-lg" title="刪除">
                            <i class="ph-bold ph-trash text-lg"></i>
                        </button>
                    </td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        // 動態更新學院選單
        function updateCollegeOptions() {
            const colleges = [...new Set(allDepts.map(d => d.college))].filter(Boolean).sort();
            
            // 1. 更新 datalist (供新增表單自動完成)
            document.getElementById('college-list').innerHTML = colleges.map(c => `<option value="${c}">`).join('');
            
            // 2. 更新上方篩選器
            const filterSelect = document.getElementById('filter-college');
            const currentVal = filterSelect.value;
            filterSelect.innerHTML = `<option value="all">全部學院</option>` + colleges.map(c => `<option value="${c}">${c}</option>`).join('');
            filterSelect.value = colleges.includes(currentVal) ? currentVal : 'all';
        }

        // 綁定篩選器事件
        document.getElementById('search-input').addEventListener('input', renderTable);
        document.getElementById('filter-college').addEventListener('change', renderTable);
        document.getElementById('filter-status').addEventListener('change', renderTable);


        // =====================================
        // Firebase CRUD 操作
        // =====================================

        // 讀取資料 (Real-time)
        onSnapshot(deptCollection, (snapshot) => {
            allDepts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            updateCollegeOptions();
            renderTable();
        });

        // 提交表單 (支援新增與編輯)
        window.submitForm = async () => {
            const btn = document.getElementById('btn-submit');
            
            // 收集多個聯絡人資料
            const contacts = Array.from(document.querySelectorAll('.contact-entry')).map(entry => ({
                name: entry.querySelector('.contact-name').value.trim(),
                email: entry.querySelector('.contact-email').value.trim()
            })).filter(c => c.name || c.email); // 過濾掉完全空白的

            const payload = {
                college: document.getElementById('input-college').value.trim(),
                code: document.getElementById('input-code').value.toUpperCase().trim(),
                name: document.getElementById('input-name').value.trim(),
                contacts: contacts
            };

            if(!payload.college || !payload.code || !payload.name) {
                alert("請填寫學院、代碼與學系名稱！");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="ph-bold ph-spinner animate-spin"></i> 儲存中...';

            try {
                if (editingId) {
                    await updateDoc(doc(db, "departments", editingId), { ...payload, updated_at: serverTimestamp() });
                } else {
                    // 自動計算新項目的 sortOrder 放最後面
                    const maxOrder = allDepts.length > 0 ? Math.max(...allDepts.map(d => d.sortOrder || 0)) : 0;
                    await addDoc(deptCollection, { ...payload, sortOrder: maxOrder + 10, is_active: true, created_at: serverTimestamp() });
                }
                closeModal();
            } catch (err) { alert(err.message); }
            finally { 
                btn.disabled = false; 
                btn.innerHTML = '<i class="ph-bold ph-check"></i> 儲存設定'; 
            }
        };

        // 進入編輯模式
        window.editDept = (id) => {
            const dept = allDepts.find(d => d.id === id);
            if (!dept) return;
            editingId = id;

            document.getElementById('input-college').value = dept.college;
            document.getElementById('input-code').value = dept.code;
            document.getElementById('input-name').value = dept.name;

            // 載入多個聯絡人
            document.getElementById('contacts-container').innerHTML = '';
            if (dept.contacts && dept.contacts.length > 0) {
                dept.contacts.forEach(c => addContactField(c.name, c.email));
            } else {
                // 相容舊資料，若無 contacts 陣列，嘗試讀取舊欄位
                addContactField(dept.contactName || '', dept.contactEmail || '');
            }

            document.getElementById('modal-title').innerHTML = '<i class="ph-bold ph-pencil-simple text-blue-600"></i> 編輯系所單位';
            document.getElementById('dept-modal').classList.remove('hidden');
        };

        // 改變排序 (透過替換 SortOrder)
        window.moveOrder = async (id, direction) => {
            let sorted = [...allDepts].sort((a, b) => (a.sortOrder || 999) - (b.sortOrder || 999));
            const currentIndex = sorted.findIndex(d => d.id === id);
            
            if (direction === 'up' && currentIndex > 0) {
                const current = sorted[currentIndex];
                const target = sorted[currentIndex - 1];
                await updateDoc(doc(db, "departments", current.id), { sortOrder: target.sortOrder || (currentIndex-1)*10 });
                await updateDoc(doc(db, "departments", target.id), { sortOrder: current.sortOrder || currentIndex*10 });
            } else if (direction === 'down' && currentIndex < sorted.length - 1) {
                const current = sorted[currentIndex];
                const target = sorted[currentIndex + 1];
                await updateDoc(doc(db, "departments", current.id), { sortOrder: target.sortOrder || (currentIndex+1)*10 });
                await updateDoc(doc(db, "departments", target.id), { sortOrder: current.sortOrder || currentIndex*10 });
            }
        };

        // 更新狀態
        window.toggleStatus = async (id, status) => {
            await updateDoc(doc(db, "departments", id), { is_active: !status });
        };

        // 刪除
        window.deleteDept = async (id, name) => {
            if (confirm(`確定要刪除「${name}」嗎？這會同時移除其關聯設定。`)) {
                await deleteDoc(doc(db, "departments", id));
            }
        };
    </script>
</body>
</html>
