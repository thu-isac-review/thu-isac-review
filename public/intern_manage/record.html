<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>實習記錄管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { 50: '#f0f5fa', 500: '#2c75b3', 600: '#1a5c96', 700: '#004785' } } } } }
    </script>
    <style>
        body { background-color: transparent; margin: 0; padding: 0; font-family: "SF Pro TC", "Noto Sans TC", sans-serif; -webkit-font-smoothing: antialiased; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .page-enter { animation: pageFadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes pageFadeIn { from { opacity: 0; transform: scale(0.99); } to { opacity: 1; transform: scale(1); } }
        table { table-layout: fixed; width: 100%; } td { word-break: break-word; }
        tr { transition: background-color 0.2s; }
        th, td { padding-top: 1rem !important; padding-bottom: 1rem !important; }
        
        /* 移除 input number 原生箭頭 */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; margin: 0; 
        }
        input[type=number] { -moz-appearance: textfield; }
        .search-item-hover:hover { background-color: #f1f5f9; cursor: pointer; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen flex flex-col overflow-hidden font-bold">

    <!-- 主列表頁面 -->
    <div id="main-list-view" class="flex flex-col h-full w-full">
        <div class="shrink-0 px-6 pt-6 pb-2 space-y-4 animate-fade">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center border border-blue-100 shrink-0">
                        <i class="fa-solid fa-clipboard-check text-xl"></i>
                    </div>
                    <div>
                        <h2 class="text-lg font-bold text-slate-800 tracking-tight">實習記錄管理</h2>
                        <p class="text-xs text-slate-500 mt-1">串連學生、機構與課程之查核主檔。</p>
                    </div>
                </div>
                
                <div class="flex flex-wrap gap-2">
                    <button onclick="window.exportToCSV()" class="h-9 bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 font-bold px-3 rounded-lg text-sm transition-all flex items-center gap-1.5 shadow-sm">
                        <i class="fa-solid fa-file-export text-emerald-600"></i> 匯出紀錄
                    </button>
                    <div class="w-px h-6 bg-slate-200 self-center mx-1"></div>
                    <button onclick="window.openModal()" class="h-9 bg-blue-600 hover:bg-blue-700 text-white font-bold px-4 rounded-lg text-sm transition-all shadow-sm shadow-blue-500/20 active:scale-95">
                        <i class="fa-solid fa-plus mr-1"></i> 新增實習紀錄
                    </button>
                </div>
            </div>

            <!-- 進階篩選與搜尋列 -->
            <div class="flex flex-col md:flex-row justify-between items-center gap-4 w-full relative z-20">
                
                <!-- Notion 風格多重篩選器容器 -->
                <div id="advanced-filters-container" class="flex gap-2 overflow-x-auto custom-scrollbar pb-1 w-full md:w-auto flex-1 items-center">
                    <!-- Javascript 動態載入篩選標籤 -->
                </div>

                <div id="batch-action-bar" class="hidden absolute -inset-3 bg-slate-50 px-3 flex items-center justify-between z-30 animate-fade rounded-xl">
                    <div class="flex items-center text-blue-700">
                        <span class="text-sm font-bold">已選擇 <span id="selected-count" class="text-lg mx-1 font-black text-blue-600">0</span> 筆紀錄</span>
                        <button id="btn-select-all-filtered" onclick="window.selectAllFiltered()" class="hidden ml-4 text-xs font-bold text-blue-600 hover:text-white bg-blue-50 hover:bg-blue-600 border border-blue-200 px-3 py-1.5 rounded-lg transition-all shadow-sm">選取全部符合條件</button>
                        <button onclick="window.clearSelection()" class="ml-2 text-xs font-bold text-slate-500 hover:text-white bg-slate-100 hover:bg-slate-500 border border-slate-200 px-3 py-1.5 rounded-lg transition-all shadow-sm">取消選取</button>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="window.batchDelete()" class="bg-rose-500 hover:bg-rose-600 text-white px-4 py-2 rounded-lg text-xs font-bold transition-all shadow-sm"><i class="fa-solid fa-trash-can mr-1.5"></i>批次刪除</button>
                    </div>
                </div>

                <div class="relative w-full md:w-72 shadow-sm rounded-lg shrink-0">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                    <input type="text" id="search-input" oninput="window.renderTable()" placeholder="搜尋姓名、學號或機構..." class="w-full bg-white border border-slate-200 rounded-lg pl-9 pr-3 h-10 text-sm outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                </div>
            </div>
        </div>

        <!-- 總表格區 -->
        <div class="flex-1 overflow-hidden px-6 pb-6 flex flex-col animate-fade">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col flex-1 overflow-hidden">
                <div class="flex-1 overflow-auto custom-scrollbar relative">
                    <table class="w-full text-left border-collapse min-w-[1300px]">
                        <thead class="bg-slate-50 border-b border-slate-200 sticky top-0 z-10 shadow-sm">
                            <tr>
                                <th class="px-3 py-3.5 text-center w-[50px]"><input type="checkbox" id="selectAll" onchange="window.toggleSelectPage(event)" class="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500 cursor-pointer shadow-sm transition-all"></th>
                                <th class="px-4 py-3.5 text-left text-xs font-bold text-slate-500 w-[200px]">實習學生</th>
                                <th class="px-4 py-3.5 text-left text-xs font-bold text-slate-500 w-[260px]">實習機構</th>
                                <th class="px-4 py-3.5 text-left text-xs font-bold text-slate-500 min-w-[280px]">實習課程</th>
                                <th class="px-4 py-3.5 text-left text-xs font-bold text-slate-500 w-[200px]">實習時間</th>
                                <th class="px-4 py-3.5 text-left text-xs font-bold text-slate-500 w-[200px]">其他</th>
                                <th class="px-3 py-3.5 text-center text-xs font-bold text-slate-500 w-[100px]">操作</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="text-sm">
                            <tr><td colspan="7" class="px-6 py-16 text-center text-slate-400 font-bold bg-white"><i class="fa-solid fa-circle-notch fa-spin text-3xl mb-3 text-blue-500"></i><p>資料庫連線中...</p></td></tr>
                        </tbody>
                    </table>
                </div>
                <div class="bg-slate-50 border-t border-slate-200 px-6 py-3 flex justify-between items-center shrink-0">
                    <div id="pagination-info" class="text-xs font-bold text-slate-500">顯示 0 到 0 筆，共 0 筆</div>
                    <div id="pagination-buttons" class="flex gap-1"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ==========================================
         全幅沉浸式滿版表單 (No-Scroll Full-screen)
         ========================================== -->
    <div id="data-modal" class="fixed inset-0 z-50 hidden bg-slate-50 flex-col h-screen w-screen overflow-hidden page-enter">
        
        <div class="h-14 bg-white border-b border-slate-200 flex justify-between items-center px-6 shrink-0 shadow-sm z-20">
            <div class="flex items-center gap-3">
                <button type="button" onclick="window.closeModal()" class="w-8 h-8 rounded-full flex items-center justify-center text-slate-500 hover:text-slate-800 hover:bg-slate-100 transition-all"><i class="fa-solid fa-arrow-left"></i></button>
                <h3 id="modal-title" class="font-black text-slate-800 text-base tracking-tight">建立實習紀錄</h3>
            </div>
            <button type="button" id="btn-submit" onclick="window.submitForm()" class="px-5 py-1.5 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg shadow-sm transition-all flex items-center justify-center gap-1.5 text-xs active:scale-[0.98]">
                <i class="fa-solid fa-check"></i> 儲存紀錄主檔
            </button>
        </div>
        
        <form id="data-form" class="flex-1 w-full max-w-[1600px] mx-auto p-4 flex flex-col gap-4 overflow-visible min-h-0">
            
            <!-- 上半部 Row 1 (三格均分 1:1:1) -->
            <div id="row-1" class="flex-[1.3] grid grid-cols-1 lg:grid-cols-3 gap-4 min-h-0 relative z-10">
                
                <!-- 1. 實習學生綁定 -->
                <div class="bg-white p-4 border border-slate-200 rounded-xl shadow-sm flex flex-col min-h-0 relative group-search" id="student-search-container">
                    <h4 class="text-sm font-black text-slate-800 border-b border-slate-100 pb-2 mb-3 shrink-0 flex items-center"><i class="fa-solid fa-user text-blue-500 mr-1.5"></i>實習學生綁定</h4>
                    <div class="flex flex-col gap-2.5 flex-1 min-h-0">
                        <div class="flex gap-3 shrink-0">
                            <div class="flex-[2] relative">
                                <label class="block text-[11px] font-bold text-slate-500 mb-1">搜尋學生主檔 <span class="text-rose-500">*</span></label>
                                <input type="text" id="input-student" required placeholder="學號或姓名..." class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none font-bold text-slate-700 shadow-sm" autocomplete="off">
                                <div id="student-dropdown" class="hidden absolute top-full left-0 mt-1 z-[100] w-full bg-white border border-slate-200 rounded-xl shadow-xl max-h-48 overflow-y-auto custom-scrollbar"></div>
                            </div>
                            <div class="flex-1 shrink-0 relative custom-select">
                                <label class="block text-[11px] font-bold text-slate-500 mb-1">當學年年級 <span class="text-rose-500">*</span></label>
                                <input type="hidden" id="input-grade" required>
                                <div class="select-box w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm font-bold text-slate-700 shadow-sm flex justify-between items-center cursor-pointer">
                                    <span class="select-text text-slate-400">請選擇</span><i class="fa-solid fa-chevron-down text-slate-400 text-xs"></i>
                                </div>
                                <div class="select-options hidden absolute top-full left-0 mt-1 z-[100] w-full bg-white border border-slate-200 rounded-lg shadow-xl"><div class="px-3 py-2 hover:bg-blue-50 cursor-pointer font-bold text-sm" data-value="1">1</div><div class="px-3 py-2 hover:bg-blue-50 cursor-pointer font-bold text-sm" data-value="2">2</div><div class="px-3 py-2 hover:bg-blue-50 cursor-pointer font-bold text-sm" data-value="3">3</div><div class="px-3 py-2 hover:bg-blue-50 cursor-pointer font-bold text-sm" data-value="4">4</div><div class="px-3 py-2 hover:bg-blue-50 cursor-pointer font-bold text-sm" data-value="5">5</div></div>
                            </div>
                        </div>
                        <div id="student-info-card" class="hidden flex-1 bg-slate-50 border border-slate-200 rounded-lg p-3 overflow-y-auto custom-scrollbar"></div>
                    </div>
                </div>

                <!-- 2. 實習機構綁定 -->
                <div class="bg-white p-4 border border-slate-200 rounded-xl shadow-sm flex flex-col min-h-0 relative group-search" id="inst-search-container">
                    <h4 class="text-sm font-black text-slate-800 border-b border-slate-100 pb-2 mb-3 shrink-0 flex items-center"><i class="fa-solid fa-building text-emerald-500 mr-1.5"></i>實習機構綁定</h4>
                    <div class="flex flex-col gap-2.5 flex-1 min-h-0">
                        <div class="relative shrink-0">
                            <label class="block text-[11px] font-bold text-slate-500 mb-1">搜尋並選擇機構 <span class="text-rose-500">*</span></label>
                            <input type="text" id="input-institution" required placeholder="機構名稱或統編..." class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-emerald-500 outline-none font-bold text-slate-700 shadow-sm" autocomplete="off">
                            <div id="institution-dropdown" class="hidden absolute top-full left-0 mt-1 z-[100] w-full bg-white border border-slate-200 rounded-xl shadow-xl max-h-48 overflow-y-auto custom-scrollbar"></div>
                        </div>
                        <div id="inst-info-card" class="hidden flex-1 bg-slate-50 border border-slate-200 rounded-lg p-3 overflow-y-auto custom-scrollbar"></div>
                    </div>
                </div>

                <!-- 3. 關聯實習課程 -->
                <div class="bg-white p-4 border border-slate-200 rounded-xl shadow-sm flex flex-col min-h-0 relative group-search" id="course-search-container">
                    <div class="border-b border-slate-100 pb-2 mb-3 flex justify-between items-end shrink-0">
                        <h4 class="text-sm font-black text-slate-800"><i class="fa-solid fa-layer-group text-indigo-500 mr-1.5"></i>關聯實習課程</h4>
                        <span id="selected-course-count" class="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded">已選中 0 門</span>
                    </div>
                    <div class="flex flex-col gap-3 flex-1 min-h-0">
                        <div class="relative shrink-0">
                            <label class="block text-[11px] font-bold text-slate-500 mb-1">搜尋並選擇實習課程 <span class="text-rose-500">*</span></label>
                            <input type="text" id="input-course-search" placeholder="名稱、代號或系所..." class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none font-bold text-slate-700" autocomplete="off">
                            <div id="course-dropdown" class="hidden absolute top-full left-0 mt-1 z-[100] w-full bg-white border border-slate-200 rounded-xl shadow-xl max-h-48 overflow-y-auto custom-scrollbar"></div>
                        </div>
                        <div id="selected-courses-container" class="flex-1 bg-slate-50 border border-slate-200 rounded-lg p-2 overflow-y-auto custom-scrollbar flex flex-col gap-1.5 min-h-[120px]"></div>
                    </div>
                </div>
            </div>

            <!-- 下半部 Row 2 (均分 2 格) -->
            <div id="row-2" class="flex-[0.8] grid grid-cols-1 lg:grid-cols-2 gap-4 min-h-0 border-t-2 border-slate-200 pt-4 relative z-10">
                <div class="bg-white p-4 border border-slate-200 rounded-xl shadow-sm flex flex-col min-h-0 justify-center">
                    <h4 class="text-sm font-black text-slate-800 border-b border-slate-100 pb-2 mb-3 shrink-0 flex items-center"><i class="fa-solid fa-clock text-amber-500 w-5"></i> 實習條件與保障</h4>
                    <div class="grid grid-cols-2 lg:grid-cols-3 gap-3 flex-1 items-center">
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 mb-1">起訖時間 <span class="text-rose-500">*</span></label>
                            <input type="text" id="input-duration" required placeholder="YYY/MM/DD-YYY/MM/DD" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm font-bold text-center text-slate-700 shadow-sm outline-none focus:ring-2 focus:ring-amber-500">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 mb-1">核定時數 <span class="text-rose-500">*</span></label>
                            <input type="number" id="input-hours" required min="1" placeholder="小時" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm font-bold text-center text-slate-700 shadow-sm outline-none focus:ring-2 focus:ring-amber-500">
                        </div>
                        <div class="relative custom-select">
                            <label class="block text-[11px] font-bold text-slate-500 mb-1">實習時間 <span class="text-rose-500">*</span></label>
                            <input type="hidden" id="input-period-type" required>
                            <div class="select-box w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm font-bold text-slate-700 flex justify-between items-center cursor-pointer">
                                <span class="select-text text-slate-400">請選擇</span><i class="fa-solid fa-chevron-down text-slate-400 text-xs"></i>
                            </div>
                            <div class="select-options hidden absolute bottom-full mb-1 z-[100] w-full bg-white border border-slate-200 rounded-lg shadow-xl">
                                <div class="px-3 py-2 hover:bg-blue-50 cursor-pointer text-sm" data-value="寒假實習">寒假實習</div><div class="px-3 py-2 hover:bg-blue-50 cursor-pointer text-sm" data-value="暑假實習">暑假實習</div><div class="px-3 py-2 hover:bg-blue-50 cursor-pointer text-sm" data-value="學期期間實習">學期期間實習</div><div class="px-3 py-2 hover:bg-blue-50 cursor-pointer text-sm" data-value="單一學期實習">單一學期實習</div><div class="px-3 py-2 hover:bg-blue-50 cursor-pointer text-sm" data-value="全學年">全學年</div>
                            </div>
                        </div>
                        <div class="relative custom-select">
                            <label class="block text-[11px] font-bold text-slate-500 mb-1">證明文件類型 <span class="text-rose-500">*</span></label>
                            <input type="hidden" id="input-proof-type" required>
                            <div class="select-box w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm font-bold text-slate-700 flex justify-between items-center cursor-pointer">
                                <span class="select-text text-slate-400">請選擇</span><i class="fa-solid fa-chevron-down text-slate-400 text-xs"></i>
                            </div>
                            <div class="select-options hidden absolute bottom-full mb-1 z-[100] w-full bg-white border border-slate-200 rounded-lg shadow-xl">
                                <div class="px-3 py-2 hover:bg-blue-50 cursor-pointer text-sm" data-value="合約">合約</div><div class="px-3 py-2 hover:bg-blue-50 cursor-pointer text-sm" data-value="公函">公函</div><div class="px-3 py-2 hover:bg-blue-50 cursor-pointer text-sm" data-value="其他證明文件">其他證明文件</div>
                            </div>
                        </div>
                        <div class="relative custom-select">
                            <label class="block text-[11px] font-bold text-slate-500 mb-1">投保情形 <span class="text-rose-500">*</span></label>
                            <input type="hidden" id="input-insurance" required>
                            <div class="select-box w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm font-bold text-slate-700 flex justify-between items-center cursor-pointer">
                                <span class="select-text text-slate-400">請選擇</span><i class="fa-solid fa-chevron-down text-slate-400 text-xs"></i>
                            </div>
                            <div class="select-options hidden absolute bottom-full mb-1 z-[100] w-full bg-white border border-slate-200 rounded-lg shadow-xl">
                                <div class="px-3 py-2 hover:bg-blue-50 cursor-pointer text-sm" data-value="僅校外實習保險">僅校外實習保險</div><div class="px-3 py-2 hover:bg-blue-50 cursor-pointer text-sm" data-value="僅勞保">僅勞保</div><div class="px-3 py-2 hover:bg-blue-50 cursor-pointer text-sm" data-value="兩者皆有">兩者皆有</div><div class="px-3 py-2 hover:bg-blue-50 cursor-pointer text-sm" data-value="兩者皆無">兩者皆無</div>
                            </div>
                        </div>
                        <div class="relative custom-select">
                            <label class="block text-[11px] font-bold text-slate-500 mb-1">勞雇關係 <span class="text-rose-500">*</span></label>
                            <input type="hidden" id="input-employment" required>
                            <div class="select-box w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm font-bold text-slate-700 flex justify-between items-center cursor-pointer">
                                <span class="select-text text-slate-400">請選擇</span><i class="fa-solid fa-chevron-down text-slate-400 text-xs"></i>
                            </div>
                            <div class="select-options hidden absolute bottom-full mb-1 z-[100] w-full bg-white border border-slate-200 rounded-lg shadow-xl">
                                <div class="px-3 py-2 hover:bg-blue-50 cursor-pointer text-sm" data-value="是">是</div><div class="px-3 py-2 hover:bg-blue-50 cursor-pointer text-sm" data-value="否">否</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="bg-white p-4 border border-slate-200 rounded-xl shadow-sm flex flex-col min-h-0">
                    <h4 class="text-sm font-black text-slate-800 border-b border-slate-100 pb-2 mb-3 shrink-0 flex items-center"><i class="fa-solid fa-comment-dots text-slate-400 w-5"></i> 實習記錄備註</h4>
                    <textarea id="input-notes" placeholder="可選填相關備註說明..." class="w-full flex-1 bg-slate-50 border border-slate-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-slate-500 outline-none font-medium text-slate-700 shadow-sm resize-none"></textarea>
                </div>
            </div>
        </form>
    </div>

    <!-- Firebase 邏輯 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, addDoc, serverTimestamp, getDocs, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDcsGfvVKnGmCzWfK5F03saydFpNc1ReYY", authDomain: "thu-isac-review.firebaseapp.com", projectId: "thu-isac-review", storageBucket: "thu-isac-review.firebasestorage.app", messagingSenderId: "453299876735", appId: "1:453299876735:web:1d8babca3315423161a04a" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app); 
        const db = getFirestore(app);
        
        const recordsCol = collection(db, "internship_records");
        const studentsCol = collection(db, "internship_students");
        const instsCol = collection(db, "internship_institutions");
        const coursesCol = collection(db, "internship_courses");
        
        let allRecords = [], allStudents = [], allInsts = [], allCourses = [], editingId = null, currentPage = 1, itemsPerPage = 10, selectedIds = [], filteredRecords = [], selectedCourseIds = [];
        let globalDepts = [], orderedColleges = [];

        // 💡 建立進階多選篩選的狀態中心
        const filterSelections = {
            semester: new Set(), college: new Set(), dept: new Set(), course: new Set(), inst: new Set(),
            period: new Set(), proof: new Set(), insurance: new Set(), employment: new Set()
        };
        const filterDefinitions = [
            { key: 'semester', label: '學期', searchable: false },
            { key: 'college', label: '學院', searchable: false },
            { key: 'dept', label: '學系', searchable: true },
            { key: 'course', label: '關聯課程', searchable: true },
            { key: 'inst', label: '實習機構', searchable: true },
            { key: 'period', label: '實習時間', searchable: false },
            { key: 'proof', label: '證明文件', searchable: false },
            { key: 'insurance', label: '投保情形', searchable: false },
            { key: 'employment', label: '勞雇關係', searchable: false }
        ];
        let isFiltersInitialized = false;

        const getTime = (ts) => ts ? (ts.toMillis ? ts.toMillis() : (ts.seconds ? ts.seconds * 1000 : new Date(ts).getTime() || 0)) : 0;
        const getColShort = (n) => { const c = orderedColleges.find(x => x.name === n); return c && c.shortName ? c.shortName : (n || '未知學院'); };
        const getDeptShort = (n) => { const d = globalDepts.find(x => x.name === n); return d && d.shortName ? d.shortName : (n || '未知學系'); };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                const p1 = getDoc(doc(db, "settings", "colleges")).then(snap => { if (snap.exists()) orderedColleges = snap.data().list.map(c => typeof c === 'string' ? { name: c, shortName: c } : c); });
                const p2 = getDocs(collection(db, "departments")).then(snap => globalDepts = snap.docs.map(d => d.data()));
                const p3 = getDocs(studentsCol).then(s => allStudents = s.docs.map(d => ({id: d.id, ...d.data()})));
                const p4 = getDocs(instsCol).then(s => allInsts = s.docs.map(d => ({id: d.id, ...d.data()})));
                const p5 = getDocs(coursesCol).then(s => { allCourses = s.docs.map(d => ({id: d.id, ...d.data()})); allCourses.sort((a,b) => (b.academic_year+b.term).localeCompare(a.academic_year+a.term)); });

                Promise.all([p1, p2, p3, p4, p5]).then(() => {
                    setupGlobalListeners();
                    onSnapshot(recordsCol, (snapshot) => {
                        allRecords = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        if (!isFiltersInitialized) {
                            initializeFilters();
                            isFiltersInitialized = true;
                        }
                        selectedIds = []; window.updateBatchActionBar(); window.renderTable();
                    });
                });
            }
        });

        // 💡 初始化 Notion 風格篩選器選單
        function initializeFilters() {
            const container = document.getElementById('advanced-filters-container');
            container.innerHTML = '';
            
            const filterOptions = {
                semester: [...new Set(allCourses.map(c=>c.semester))].filter(Boolean).sort().reverse().map(v=>({value:v, label:v})),
                college: orderedColleges.map(c=>({value:c.name, label:c.shortName || c.name})),
                dept: [...new Set(globalDepts.map(d=>d.name))].map(v=>({value:v, label: getDeptShort(v)})),
                course: allCourses.map(c=>({value:c.id, label:`${c.academic_year}-${c.term}_${c.course_code}：${c.course_name}`})),
                inst: [...new Set(allRecords.map(r=>r.inst_raw))].filter(Boolean).map(v=>({value:v, label:v})),
                period: ['寒假實習', '暑假實習', '學期期間實習', '單一學期實習', '全學年'].map(v=>({value:v, label:v})),
                proof: ['合約', '公函', '其他證明文件'].map(v=>({value:v, label:v})),
                insurance: ['僅校外實習保險', '僅勞保', '兩者皆有', '兩者皆無'].map(v=>({value:v, label:v})),
                employment: ['是', '否'].map(v=>({value:v, label:v}))
            };

            filterDefinitions.forEach(def => {
                const options = filterOptions[def.key] || [];
                const wrap = document.createElement('div');
                wrap.className = 'relative group-filter shrink-0';
                wrap.innerHTML = `
                    <button type="button" class="filter-btn border border-slate-200 bg-white text-slate-700 text-[13px] font-bold rounded-lg px-3 py-1.5 shadow-sm flex items-center hover:bg-slate-50 transition-colors" data-key="${def.key}">
                        ${def.label} <span class="filter-count hidden bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded text-[10px] ml-1.5">0</span> <i class="fa-solid fa-chevron-down text-[10px] text-slate-400 ml-1.5"></i>
                    </button>
                    <div class="filter-panel hidden absolute top-full left-0 mt-1 bg-white border border-slate-200 rounded-xl shadow-xl w-64 max-h-72 flex-col overflow-hidden z-[100]">
                        ${def.searchable ? `
                        <div class="p-2 border-b border-slate-100 shrink-0 bg-slate-50/50">
                            <div class="relative">
                                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[11px]"></i>
                                <input type="text" placeholder="搜尋選項..." class="filter-search w-full bg-white border border-slate-200 rounded-lg pl-8 pr-3 py-1.5 text-xs font-bold outline-none focus:ring-2 focus:ring-blue-500" data-key="${def.key}">
                            </div>
                        </div>` : ''}
                        <div class="filter-options flex-1 overflow-y-auto p-1 custom-scrollbar space-y-0.5">
                            ${options.map(opt => `
                                <label class="flex items-start gap-2.5 p-2 hover:bg-slate-50 rounded-lg cursor-pointer option-label transition-colors">
                                    <input type="checkbox" class="mt-0.5 w-3.5 h-3.5 rounded border-slate-300 text-blue-600 focus:ring-blue-500 cursor-pointer" value="${opt.value}" data-key="${def.key}">
                                    <span class="text-xs font-bold text-slate-700 select-none flex-1 leading-tight">${opt.label}</span>
                                </label>
                            `).join('')}
                        </div>
                        <div class="p-2 border-t border-slate-100 shrink-0 bg-slate-50 flex justify-between clear-btn-wrap hidden">
                            <button type="button" class="text-xs font-bold text-slate-500 hover:text-rose-600 transition-colors w-full text-center" onclick="window.clearFilter('${def.key}')">清除此條件</button>
                        </div>
                    </div>
                `;
                container.appendChild(wrap);
            });

            // 綁定篩選選單事件
            container.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const panel = btn.nextElementSibling;
                    const wasHidden = panel.classList.contains('hidden');
                    document.querySelectorAll('.filter-panel').forEach(p => { p.classList.add('hidden'); p.classList.remove('flex'); });
                    if (wasHidden) { panel.classList.remove('hidden'); panel.classList.add('flex'); }
                });
            });

            container.querySelectorAll('.filter-search').forEach(input => {
                input.addEventListener('click', e => e.stopPropagation());
                input.addEventListener('input', (e) => {
                    const term = e.target.value.toLowerCase().trim();
                    const panel = e.target.closest('.filter-panel');
                    panel.querySelectorAll('.option-label').forEach(label => {
                        const text = label.querySelector('span').innerText.toLowerCase();
                        label.style.display = text.includes(term) ? 'flex' : 'none';
                    });
                });
            });

            container.querySelectorAll('input[type="checkbox"]').forEach(chk => {
                chk.addEventListener('change', (e) => {
                    const key = e.target.getAttribute('data-key');
                    if (e.target.checked) filterSelections[key].add(e.target.value);
                    else filterSelections[key].delete(e.target.value);
                    window.updateFilterPillUI(key);
                    currentPage = 1;
                    window.renderTable();
                });
            });
        }

        window.updateFilterPillUI = (key) => {
            const wrap = document.querySelector(`.group-filter .filter-btn[data-key="${key}"]`).closest('.group-filter');
            const badge = wrap.querySelector('.filter-count');
            const btn = wrap.querySelector('.filter-btn');
            const clearWrap = wrap.querySelector('.clear-btn-wrap');
            const set = filterSelections[key];
            if(set.size > 0) {
                badge.textContent = set.size; badge.classList.remove('hidden');
                btn.classList.add('border-blue-500', 'bg-blue-50', 'text-blue-700'); btn.classList.remove('border-slate-200', 'bg-white', 'text-slate-700');
                clearWrap.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
                btn.classList.remove('border-blue-500', 'bg-blue-50', 'text-blue-700'); btn.classList.add('border-slate-200', 'bg-white', 'text-slate-700');
                clearWrap.classList.add('hidden');
            }
        };

        window.clearFilter = (key) => {
            filterSelections[key].clear();
            const panel = document.querySelector(`button.filter-btn[data-key="${key}"]`).nextElementSibling;
            panel.querySelectorAll('input[type="checkbox"]').forEach(chk => chk.checked = false);
            window.updateFilterPillUI(key);
            currentPage = 1;
            window.renderTable();
        };

        // 💡 智慧層級推升與點擊收合控制
        function setupGlobalListeners() {
            const stuInput = document.getElementById('input-student'); const stuDropdown = document.getElementById('student-dropdown');
            const instInput = document.getElementById('input-institution'); const instDropdown = document.getElementById('institution-dropdown');
            const courseInput = document.getElementById('input-course-search'); const courseDropdown = document.getElementById('course-dropdown');

            const handleFocus = (containerId, dropdown) => {
                document.querySelectorAll('.group-search').forEach(el => el.style.zIndex = '20');
                const container = document.getElementById(containerId);
                if (container) {
                    container.style.zIndex = '100';
                    document.getElementById('row-1').style.zIndex = '30';
                    document.getElementById('row-2').style.zIndex = '10';
                }
                dropdown.classList.remove('hidden');
            };

            stuInput?.addEventListener('focus', () => { handleFocus('student-search-container', stuDropdown); renderStudentDropdown(allStudents, stuInput.value); });
            stuInput?.addEventListener('input', () => { handleFocus('student-search-container', stuDropdown); renderStudentDropdown(allStudents, stuInput.value); window.autoFillStudentInfo(); });
            
            instInput?.addEventListener('focus', () => { handleFocus('inst-search-container', instDropdown); renderInstDropdown(allInsts, instInput.value); });
            instInput?.addEventListener('input', () => { handleFocus('inst-search-container', instDropdown); renderInstDropdown(allInsts, instInput.value); window.autoFillInstInfo(); });
            
            courseInput?.addEventListener('focus', () => { handleFocus('course-search-container', courseDropdown); renderCourseDropdown(allCourses, courseInput.value); });
            courseInput?.addEventListener('input', () => { handleFocus('course-search-container', courseDropdown); renderCourseDropdown(allCourses, courseInput.value); });

            document.addEventListener('click', (e) => {
                // 進階篩選器點擊外部收起
                if (!e.target.closest('.group-filter')) {
                    document.querySelectorAll('.filter-panel').forEach(p => { p.classList.add('hidden'); p.classList.remove('flex'); });
                }

                // 表單內的自動完成點擊外部收起
                if (!document.getElementById('student-search-container')?.contains(e.target)) { stuDropdown.classList.add('hidden'); document.getElementById('student-search-container').style.zIndex = ''; }
                if (!document.getElementById('inst-search-container')?.contains(e.target)) { instDropdown.classList.add('hidden'); document.getElementById('inst-search-container').style.zIndex = ''; }
                if (!document.getElementById('course-search-container')?.contains(e.target)) { courseDropdown.classList.add('hidden'); document.getElementById('course-search-container').style.zIndex = ''; }
                
                const selectBox = e.target.closest('.select-box');
                if (selectBox) {
                    const wrap = selectBox.closest('.custom-select');
                    const opt = wrap.querySelector('.select-options');
                    document.querySelectorAll('.select-options').forEach(o => o !== opt && o.classList.add('hidden'));
                    opt.classList.toggle('hidden');
                    
                    wrap.style.zIndex = opt.classList.contains('hidden') ? '10' : '100';
                    document.getElementById('row-2').style.zIndex = opt.classList.contains('hidden') ? '10' : '30';
                    document.getElementById('row-1').style.zIndex = '10';
                    return;
                }
                const option = e.target.closest('.select-options div[data-value]');
                if (option) {
                    const wrapper = option.closest('.custom-select');
                    const hiddenInput = wrapper.querySelector('input[type="hidden"]');
                    const textDisplay = wrapper.querySelector('.select-text');
                    hiddenInput.value = option.dataset.value;
                    textDisplay.textContent = option.innerText;
                    textDisplay.classList.remove('text-slate-400'); textDisplay.classList.add('text-slate-700');
                    wrapper.querySelector('.select-options').classList.add('hidden');
                    
                    wrapper.style.zIndex = '10';
                    document.getElementById('row-2').style.zIndex = '10';
                    return;
                }
                
                document.querySelectorAll('.select-options').forEach(opt => opt.classList.add('hidden'));
                document.querySelectorAll('.custom-select').forEach(wrap => wrap.style.zIndex = '10');
                const r1 = document.getElementById('row-1'); if(r1) r1.style.zIndex = '10';
                const r2 = document.getElementById('row-2'); if(r2) r2.style.zIndex = '10';
            });
        }

        window.setCustomSelectVal = (id, val) => {
            const el = document.getElementById(id); if (!el) return;
            const wrap = el.closest('.custom-select'); const txt = wrap.querySelector('.select-text');
            el.value = val;
            if (val) { const opt = wrap.querySelector(`[data-value="${val}"]`); txt.textContent = opt ? opt.innerText : val; txt.classList.replace('text-slate-400', 'text-slate-700'); }
            else { txt.textContent = '請選擇'; txt.classList.replace('text-slate-700', 'text-slate-400'); }
        };

        function renderStudentDropdown(list, term) {
            const dropdown = document.getElementById('student-dropdown'); 
            const val = term.split(' - ')[0].trim().toLowerCase(); 
            const filtered = list.filter(s => s.student_id.toLowerCase().includes(val) || s.name.toLowerCase().includes(val));
            if (filtered.length === 0) { dropdown.innerHTML = '<div class="p-3 text-xs text-slate-400 text-center font-bold">查無相符學生</div>'; return; }
            dropdown.innerHTML = filtered.slice(0, 30).map(s => `
                <div class="px-4 py-3 search-item-hover border-b border-slate-50 transition-colors" onclick="window.selectStudent('${s.student_id}', '${s.name}')">
                    <div class="text-sm font-black text-slate-800">${s.student_id} - ${s.name}</div>
                    <div class="text-[11px] font-bold text-slate-500 mt-1">${getColShort(s.college)} / ${getDeptShort(s.department)}</div>
                </div>`).join('');
        }
        window.selectStudent = (id, name) => { 
            document.getElementById('input-student').value = `${id} - ${name}`; 
            document.getElementById('student-dropdown').classList.add('hidden');
            window.autoFillStudentInfo(); 
        };

        function renderInstDropdown(list, term) {
            const dropdown = document.getElementById('institution-dropdown'); 
            const val = term.trim().toLowerCase();
            const filtered = list.filter(i => i.name.toLowerCase().includes(val) || (i.tax_id && i.tax_id.toLowerCase().includes(val)));
            if (filtered.length === 0) { dropdown.innerHTML = '<div class="p-3 text-xs text-slate-400 text-center font-bold">查無相符機構</div>'; return; }
            dropdown.innerHTML = filtered.slice(0, 30).map(i => `
                <div class="px-4 py-3 search-item-hover border-b border-slate-50 transition-colors" onclick="window.selectInst('${i.name}')">
                    <div class="text-sm font-black text-slate-800 break-words">${i.name}</div>
                    <div class="text-[11px] font-bold text-slate-500 mt-1 break-words">${i.tax_id || '統編：無統一編號'} | ${i.address || ''}</div>
                </div>`).join('');
        }
        window.selectInst = (name) => { 
            document.getElementById('input-institution').value = name; 
            document.getElementById('institution-dropdown').classList.add('hidden');
            window.autoFillInstInfo(); 
        };

        function renderCourseDropdown(list, term) {
            const dropdown = document.getElementById('course-dropdown'); 
            const val = term.trim().toLowerCase();
            const filtered = list.filter(c => !selectedCourseIds.includes(c.id) && (c.course_name.toLowerCase().includes(val) || c.course_code.toLowerCase().includes(val)));
            if (filtered.length === 0) { dropdown.innerHTML = '<div class="p-3 text-xs text-slate-400 text-center font-bold">查無相符課程</div>'; return; }
            dropdown.innerHTML = filtered.slice(0, 30).map(c => `
                <div class="px-4 py-2.5 hover:bg-indigo-50 cursor-pointer border-b border-slate-50 transition-colors" onclick="window.selectCourse('${c.id}')">
                    <div class="flex items-center gap-1.5 flex-wrap mb-1">
                        <span class="text-sm font-black text-slate-800">${c.academic_year}-${c.term}</span>
                        <span class="text-[10px] font-black bg-blue-50 text-blue-600 px-1.5 py-0.5 rounded border border-blue-100">${c.course_code}</span>
                        <span class="text-sm font-black text-slate-800">${c.course_name}</span>
                    </div>
                    <div class="text-[11px] font-bold text-slate-500">開課院系：${getColShort(c.college)} / ${getDeptShort(c.department)} | ${c.credits}學分</div>
                </div>`).join('');
        }
        window.selectCourse = (id) => { 
            if (!selectedCourseIds.includes(id)) selectedCourseIds.push(id); 
            document.getElementById('input-course-search').value = ''; 
            document.getElementById('course-dropdown').classList.add('hidden');
            window.renderSelectedCourseChips(); 
        };

        window.renderSelectedCourseChips = () => {
            const container = document.getElementById('selected-courses-container'); const counter = document.getElementById('selected-course-count');
            if(counter) counter.innerText = `已選中 ${selectedCourseIds.length} 門`;
            if (selectedCourseIds.length === 0) { container.innerHTML = '<div class="flex flex-col items-center justify-center h-full text-slate-300 gap-2 mt-12 text-xs">尚未加入課程</div>'; return; }
            container.innerHTML = selectedCourseIds.map(id => {
                const c = allCourses.find(x => x.id === id); if (!c) return '';
                return `
                <div class="flex items-center justify-between p-2.5 bg-white border border-slate-200 rounded-lg shadow-sm group hover:border-indigo-300 transition-colors shrink-0">
                    <div class="flex flex-col">
                        <div class="flex items-center gap-1.5 mb-1"><span class="text-sm font-black text-slate-800">${c.academic_year}-${c.term}</span><span class="text-[10px] font-black bg-blue-50 text-blue-600 px-1 py-0.5 rounded">${c.course_code}</span><span class="text-sm font-black text-slate-800">${c.course_name}</span></div>
                        <div class="text-[11px] font-bold text-slate-500">開課院系：${getColShort(c.college)} / ${getDeptShort(c.department)} | ${c.credits}學分</div>
                    </div>
                    <button type="button" onclick="window.removeCourse('${c.id}')" class="w-8 h-8 text-slate-400 hover:text-rose-500 transition-colors"><i class="fa-solid fa-xmark"></i></button>
                </div>`;
            }).join('');
        };
        
        window.removeCourse = (id) => { selectedCourseIds = selectedCourseIds.filter(cid => cid !== id); window.renderSelectedCourseChips(); };

        window.autoFillStudentInfo = () => {
            const inputVal = document.getElementById('input-student').value; const card = document.getElementById('student-info-card');
            const studentIdMatch = inputVal.split(' - ')[0]; const stu = allStudents.find(s => s.student_id === studentIdMatch);
            if (stu) {
                card.innerHTML = `<div class="flex items-start gap-3 h-full"><div class="w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center shrink-0"><i class="fa-solid fa-user-circle"></i></div><div class="flex flex-col justify-center flex-1 min-w-0"><div class="text-sm font-black text-slate-800 break-words leading-tight">${stu.name} (${stu.student_id})</div><div class="text-[11px] font-bold text-slate-500 mt-1 break-words">${getColShort(stu.college)} / ${getDeptShort(stu.department)}</div></div></div>`;
                card.classList.remove('hidden');
            } else { card.innerHTML = `<div class="text-rose-600 text-[11px] font-bold py-1">查無主檔，將建立獨立紀錄</div>`; card.classList.remove('hidden'); }
        };

        window.autoFillInstInfo = () => {
            const inputVal = document.getElementById('input-institution').value; const card = document.getElementById('inst-info-card');
            const inst = allInsts.find(i => i.name === inputVal);
            if (inst) {
                card.innerHTML = `<div class="flex items-start gap-3 h-full"><div class="w-10 h-10 rounded-xl bg-emerald-100 text-emerald-600 flex items-center justify-center shrink-0"><i class="fa-solid fa-building"></i></div><div class="flex flex-col justify-center flex-1 min-w-0"><div class="text-sm font-black text-slate-800 break-words leading-tight">${inst.name}</div><div class="text-[11px] font-bold text-slate-500 mt-1.5 break-words leading-relaxed">${inst.tax_id || '無統編'} | ${inst.address || ''}</div></div></div>`;
                card.classList.remove('hidden');
            } else { card.innerHTML = `<div class="text-rose-600 text-[11px] font-bold py-1">查無主檔，將建立獨立紀錄</div>`; card.classList.remove('hidden'); }
        };

        window.toggleSelectPage = (e) => {
            const isChecked = e.target.checked; const startIndex = (currentPage - 1) * itemsPerPage;
            const paginatedIds = filteredRecords.slice(startIndex, startIndex + itemsPerPage).map(d => d.id);
            if (isChecked) paginatedIds.forEach(id => { if (!selectedIds.includes(id)) selectedIds.push(id); });
            else selectedIds = selectedIds.filter(id => !paginatedIds.includes(id));
            window.updateBatchActionBar(); window.renderTable();
        };

        window.toggleSelect = (id) => { const idx = selectedIds.indexOf(id); if (idx === -1) selectedIds.push(id); else selectedIds.splice(idx, 1); window.updateBatchActionBar(); window.renderTable(); };
        window.selectAllFiltered = () => { selectedIds = filteredRecords.map(d => d.id); window.updateBatchActionBar(); window.renderTable(); };
        window.clearSelection = () => { selectedIds = []; window.updateBatchActionBar(); window.renderTable(); };
        window.updateBatchActionBar = () => { const bar = document.getElementById('batch-action-bar'); const count = document.getElementById('selected-count'); const btn = document.getElementById('btn-select-all-filtered'); if (selectedIds.length > 0) { bar.classList.remove('hidden'); count.innerText = selectedIds.length; if (selectedIds.length < filteredRecords.length) { btn.classList.remove('hidden'); document.getElementById('filtered-total-count').innerText = filteredRecords.length; } else btn.classList.add('hidden'); } else bar.classList.add('hidden'); };

        window.batchDelete = async () => { if (!confirm(`確定刪除 ${selectedIds.length} 筆紀錄？`)) return; try { for (let id of selectedIds) await deleteDoc(doc(db, "internship_records", id)); selectedIds = []; window.updateBatchActionBar(); } catch (e) { alert(e.message); } };

        window.openModal = () => {
            if (!editingId) { 
                document.getElementById('data-form').reset(); document.getElementById('student-info-card').classList.add('hidden'); document.getElementById('inst-info-card').classList.add('hidden');
                ['input-grade', 'input-period-type', 'input-proof-type', 'input-insurance', 'input-employment'].forEach(id => window.setCustomSelectVal(id, ''));
                selectedCourseIds = []; window.renderSelectedCourseChips();
            }
            document.getElementById('main-list-view').classList.add('hidden'); document.getElementById('data-modal').classList.remove('hidden'); document.getElementById('data-modal').classList.add('flex');
        };

        window.closeModal = () => { document.getElementById('data-modal').classList.add('hidden'); document.getElementById('data-modal').classList.remove('flex'); document.getElementById('main-list-view').classList.remove('hidden'); editingId = null; };
        window.changePage = (p) => { currentPage = p; window.renderTable(); };

        // 💡 總表格排版對齊優化
        window.renderTable = () => {
            const tbody = document.getElementById('table-body'); 
            const searchTerm = document.getElementById('search-input').value.toLowerCase().trim();

            filteredRecords = allRecords.filter(d => {
                const matchSearch = (d.student_raw || '').toLowerCase().includes(searchTerm) || (d.inst_raw || '').toLowerCase().includes(searchTerm);
                
                // 💡 判斷所有進階多選篩選器
                const stuIdMatch = (d.student_raw || '').split(' - ')[0];
                const stuDoc = allStudents.find(s => s.student_id === stuIdMatch);
                
                let ok = matchSearch;
                if (ok && filterSelections.semester.size > 0) {
                    const matchedSems = (d.courses || []).map(cid => { const c = allCourses.find(x => x.id === cid); return c ? c.semester : null; });
                    ok = matchedSems.some(s => filterSelections.semester.has(s));
                }
                if (ok && filterSelections.college.size > 0) ok = stuDoc && filterSelections.college.has(stuDoc.college);
                if (ok && filterSelections.dept.size > 0) ok = stuDoc && filterSelections.dept.has(stuDoc.department);
                if (ok && filterSelections.course.size > 0) ok = (d.courses || []).some(cid => filterSelections.course.has(cid));
                if (ok && filterSelections.inst.size > 0) ok = filterSelections.inst.has(d.inst_raw);
                if (ok && filterSelections.period.size > 0) ok = filterSelections.period.has(d.period_type);
                if (ok && filterSelections.proof.size > 0) ok = filterSelections.proof.has(d.proof_type);
                if (ok && filterSelections.insurance.size > 0) ok = filterSelections.insurance.has(d.insurance);
                if (ok && filterSelections.employment.size > 0) ok = filterSelections.employment.has(d.employment);
                
                return ok;
            });

            filteredRecords.sort((a, b) => getTime(b.created_at) - getTime(a.created_at));
            const total = filteredRecords.length; const tPages = Math.ceil(total / itemsPerPage) || 1;
            if (currentPage > tPages) currentPage = tPages;
            const start = (currentPage - 1) * itemsPerPage; const items = filteredRecords.slice(start, start + itemsPerPage);

            document.getElementById('pagination-info').innerText = total > 0 ? `顯示 ${start + 1} 到 ${Math.min(start + itemsPerPage, total)} 筆，共 ${total} 筆` : '尚無資料';
            let bHtml = `<button onclick="window.changePage(${currentPage-1})" class="px-3 py-1 border border-slate-200 rounded-md text-sm font-bold" ${currentPage===1?'disabled':''}>上一頁</button>`;
            bHtml += `<span class="px-4 py-1 text-sm font-bold text-blue-600 bg-blue-50 rounded-md mx-1">${currentPage} / ${tPages}</span>`;
            bHtml += `<button onclick="window.changePage(${currentPage+1})" class="px-3 py-1 border border-slate-200 rounded-md text-sm font-bold" ${currentPage===tPages?'disabled':''}>下一頁</button>`;
            document.getElementById('pagination-buttons').innerHTML = bHtml;
            document.getElementById('selectAll').checked = items.length > 0 && items.every(i => selectedIds.includes(i.id));

            if (total === 0) { tbody.innerHTML = `<tr><td colspan="7" class="px-6 py-16 text-center text-slate-400 font-bold bg-white">找不到符合條件的紀錄。</td></tr>`; return; }

            tbody.innerHTML = items.map(data => {
                const stuId = (data.student_raw || '').split(' - ')[0]; const stu = allStudents.find(s => s.student_id === stuId);
                const stuCol = stu ? getColShort(stu.college) : '未知學院';
                const stuDept = stu ? getDeptShort(stu.department) : '未綁定學系';
                
                const inst = allInsts.find(i => i.name === data.inst_raw);
                const instTax = inst?.tax_id || '無統編';
                const instCountry = inst?.country || '中華民國';
                const instAddr = inst?.address || '無地址';

                let coursesHtml = '<span class="text-slate-400 font-bold text-xs">無關聯課程</span>';
                if (Array.isArray(data.courses) && data.courses.length > 0) {
                    const cList = data.courses.map(cid => {
                        const c = allCourses.find(x => x.id === cid);
                        return c ? `${c.academic_year}-${c.term}_${c.course_code}：${c.course_name}` : '';
                    }).filter(Boolean);
                    coursesHtml = `<div class="text-sm font-black text-slate-800 leading-relaxed">${cList.join('、')}</div>`;
                }

                return `
                <tr class="group bg-white hover:bg-blue-50/40 transition-all duration-150 border-b border-slate-100 last:border-0">
                    <td class="px-3 py-4 align-middle text-center">
                        <input type="checkbox" class="row-checkbox w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500 cursor-pointer shadow-sm transition-all" value="${data.id}" onchange="window.toggleSelect('${data.id}')" ${selectedIds.includes(data.id)?'checked':''}>
                    </td>
                    <td class="px-4 py-4 align-middle text-left">
                        <div class="text-sm font-black text-slate-800 leading-tight">${stu?stu.name:data.student_raw} (${stuId})</div>
                        <div class="text-[11px] font-bold text-slate-500 mt-1.5 tracking-tight">${stuCol} / ${stuDept} <span class="mx-1 opacity-40">|</span> ${data.grade || '-'}年級</div>
                    </td>
                    <td class="px-4 py-4 align-middle text-left">
                        <div class="text-sm font-black text-slate-800 leading-tight break-words">${data.inst_raw}</div>
                        <div class="text-[11px] font-bold text-slate-500 mt-1.5 break-words">${instTax} | ${instCountry} | ${instAddr}</div>
                    </td>
                    <td class="px-4 py-4 align-middle text-left">
                        ${coursesHtml}
                    </td>
                    <td class="px-4 py-4 align-middle text-left">
                        <div class="text-sm font-black text-slate-800 leading-tight">${data.duration || '無起訖時間'} (${data.hours || 0}小時)</div>
                        <div class="text-[11px] font-bold text-slate-500 mt-1.5">${data.period_type || '-'}</div>
                    </td>
                    <td class="px-4 py-4 align-middle text-left">
                        <div class="text-sm font-black text-slate-800 leading-tight">${data.proof_type || '-'}</div>
                        <div class="text-[11px] font-bold text-slate-500 mt-1.5">勞雇關係：${data.employment || '-'} | 投保情形：${data.insurance || '-'}</div>
                    </td>
                    <td class="px-3 py-4 align-middle text-center whitespace-nowrap">
                        <div class="flex items-center justify-center gap-1.5 opacity-100">
                            <button onclick="window.editData('${data.id}')" class="w-8 h-8 rounded-lg flex items-center justify-center bg-blue-50 text-blue-600 hover:bg-blue-100 transition-all shrink-0" title="編輯紀錄"><i class="fa-solid fa-pen text-[11px]"></i></button>
                            <button onclick="window.deleteData('${data.id}', '${stu?stu.name:data.student_raw}')" class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-300 hover:text-rose-600 hover:bg-rose-50 transition-all shrink-0" title="刪除"><i class="fa-solid fa-trash-can text-[11px]"></i></button>
                        </div>
                    </td>
                </tr>`;
            }).join('');
        };

        window.exportToCSV = () => {
            if (filteredRecords.length === 0) { alert("沒有資料可供匯出！"); return; }
            let csv = '\uFEFF實習學生,學院,學系,實習機構,實習課程,實習起訖時間,實習時數,時間分類,證明文件類型,投保情形,勞雇關係,備註\n';
            filteredRecords.forEach(d => {
                const stuIdMatch = (d.student_raw || '').split(' - ')[0];
                const stuDoc = allStudents.find(s => s.student_id === stuIdMatch);
                let courseNames = (Array.isArray(d.courses) ? d.courses : []).map(cid => { const c = allCourses.find(x => x.id === cid); return c ? `${c.academic_year}-${c.term}_${c.course_code}：${c.course_name}` : '未知'; }).join('、');
                csv += [d.student_raw, stuDoc ? stuDoc.college : '', stuDoc ? stuDoc.department : '', d.inst_raw, courseNames, d.duration, d.hours, d.period_type, d.proof_type, d.insurance, d.employment, d.notes || ''].map(v => `"${(v||'').toString().replace(/"/g, '""')}"`).join(',') + '\n';
            });
            const link = document.createElement('a'); link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
            link.download = `實習紀錄總表_${new Date().toISOString().split('T')[0]}.csv`; link.click();
        };

        window.submitForm = async () => {
            const btn = document.getElementById('btn-submit');
            const durationInput = document.getElementById('input-duration').value.trim();
            const regex = /^\d{2,3}\/\d{2}\/\d{2}-\d{2,3}\/\d{2}\/\d{2}$/;
            if (!regex.test(durationInput)) { alert("時間格式錯誤！格式應為：YYY/MM/DD-YYY/MM/DD"); return; }
            if (selectedCourseIds.length === 0) { alert("請至少選擇一門關聯實習課程！"); return; }

            const payload = { 
                student_raw: document.getElementById('input-student').value.trim(), 
                grade: document.getElementById('input-grade').value,
                inst_raw: document.getElementById('input-institution').value.trim(), 
                period_type: document.getElementById('input-period-type').value,
                duration: durationInput, 
                insurance: document.getElementById('input-insurance').value,
                employment: document.getElementById('input-employment').value, 
                proof_type: document.getElementById('input-proof-type').value,
                hours: Number(document.getElementById('input-hours').value), 
                notes: document.getElementById('input-notes').value.trim(),
                courses: selectedCourseIds
            };

            if(!payload.student_raw || !payload.inst_raw || !payload.duration || !payload.hours || !payload.grade || !payload.period_type || !payload.proof_type || !payload.insurance || !payload.employment) { 
                alert("請完成所有包含 * 號之必填選單與欄位設定！"); return; 
            }
            
            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> 儲存中...';
            try {
                if (editingId) await updateDoc(doc(db, "internship_records", editingId), { ...payload, updated_at: serverTimestamp() });
                else await addDoc(recordsCol, { ...payload, created_at: serverTimestamp() });
                window.closeModal();
            } catch (err) { alert("儲存發生錯誤：" + err.message); } 
            finally { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-check text-sm"></i> 儲存紀錄主檔'; }
        };

        window.editData = (id) => {
            const data = allRecords.find(d => d.id === id); if (!data) return;
            editingId = id;
            document.getElementById('input-student').value = data.student_raw || '';
            document.getElementById('input-institution').value = data.inst_raw || '';
            document.getElementById('input-duration').value = data.duration || '';
            document.getElementById('input-hours').value = data.hours || '';
            document.getElementById('input-notes').value = data.notes || '';
            
            window.setCustomSelectVal('input-grade', data.grade || '');
            window.setCustomSelectVal('input-period-type', data.period_type || '');
            window.setCustomSelectVal('input-proof-type', data.proof_type || '');
            window.setCustomSelectVal('input-insurance', data.insurance || '');
            window.setCustomSelectVal('input-employment', data.employment || '');

            window.autoFillStudentInfo();
            window.autoFillInstInfo();

            selectedCourseIds = Array.isArray(data.courses) ? [...data.courses] : [];
            window.renderSelectedCourseChips();

            document.getElementById('modal-title').innerText = '編輯實習紀錄';
            
            document.getElementById('main-list-view').classList.add('hidden');
            document.getElementById('data-modal').classList.remove('hidden');
            document.getElementById('data-modal').classList.add('flex');
        };

        window.deleteData = async (id, name) => {
            if (confirm(`警告：確定要刪除學生「${name}」的這筆實習紀錄嗎？\n此操作無法復原。`)) {
                await deleteDoc(doc(db, "internship_records", id));
                window.renderTable();
            }
        };

    </script>
</body>
</html>
