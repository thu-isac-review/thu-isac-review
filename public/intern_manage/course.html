<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>實習課程管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { 50: '#f0f5fa', 500: '#2c75b3', 600: '#1a5c96', 700: '#004785' } } } } }
    </script>
    <style>
        body { background-color: transparent; margin: 0; padding: 0; font-family: "SF Pro TC", "Noto Sans TC", sans-serif; -webkit-font-smoothing: antialiased; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .modal-enter { animation: modalFadeIn 0.2s ease-out forwards; }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.97) translateY(-5px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        table { table-layout: fixed; width: 100%; } td { word-break: break-word; }
        /* 💡 增加表格列的最小高度與呼吸感 */
        tr { transition: background-color 0.2s; }
        th, td { padding-top: 1rem !important; padding-bottom: 1rem !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen flex flex-col overflow-hidden">

    <div class="shrink-0 px-6 pt-6 pb-4 space-y-4 animate-fade">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center border border-blue-100 shrink-0">
                    <i class="fa-solid fa-book text-2xl"></i>
                </div>
                <div>
                    <h2 class="text-xl font-bold text-slate-800 tracking-tight" id="page-title">實習課程管理</h2>
                    <p class="text-xs text-slate-500 mt-1">管理各系所歷年開設之實習課程資訊。標題與內容皆已統一為標準黑體並置中顯示。</p>
                </div>
            </div>
            
            <div class="flex flex-wrap gap-2">
                <button onclick="exportToCSV()" class="h-10 bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 font-bold px-4 rounded-xl text-sm transition-all flex items-center gap-1.5 shadow-sm">
                    <i class="fa-solid fa-file-export text-emerald-600"></i> 匯出清單
                </button>
                <button id="btn-import" onclick="document.getElementById('import-file').click()" class="h-10 bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 font-bold px-4 rounded-xl text-sm transition-all flex items-center gap-1.5 shadow-sm">
                    <i class="fa-solid fa-file-import text-blue-600"></i> 批次匯入
                </button>
                <input type="file" id="import-file" accept=".csv" class="hidden" onchange="handleImport(event)">
                <div class="w-px h-6 bg-slate-200 self-center mx-1"></div>
                <button onclick="openModal()" class="h-10 bg-blue-600 hover:bg-blue-700 text-white font-bold px-5 rounded-xl text-sm transition-all flex items-center gap-1.5 shadow-md shadow-blue-500/20 active:scale-95">
                    <i class="fa-solid fa-plus text-base"></i> 新增課程
                </button>
            </div>
        </div>

        <div class="flex flex-col md:flex-row justify-between items-center gap-4 w-full relative">
            <div class="flex gap-2 w-full md:w-auto">
                <select id="filter-semester" onchange="window.renderTable()" class="bg-white border border-slate-200 text-slate-700 text-sm font-bold rounded-xl px-4 h-11 outline-none focus:ring-2 focus:ring-blue-500 transition-all cursor-pointer shadow-sm">
                    <option value="all">學年/期：全部</option>
                </select>
                <select id="filter-college" onchange="window.updateFilterDepts(); window.renderTable();" class="bg-white border border-slate-200 text-slate-700 text-sm font-bold rounded-xl px-4 h-11 outline-none focus:ring-2 focus:ring-blue-500 transition-all cursor-pointer shadow-sm">
                    <option value="all">開課學院：全部</option>
                </select>
                <select id="filter-dept" onchange="window.renderTable()" class="bg-white border border-slate-200 text-slate-700 text-sm font-bold rounded-xl px-4 h-11 outline-none focus:ring-2 focus:ring-blue-500 transition-all cursor-pointer shadow-sm">
                    <option value="all">開課學系：全部</option>
                </select>
            </div>

            <!-- 批次操作懸浮列 -->
            <div id="batch-action-bar" class="hidden absolute -inset-3 bg-slate-50 px-3 flex items-center justify-between z-20 animate-fade">
                <div class="flex items-center text-blue-700">
                    <div class="w-9 h-9 rounded-full bg-blue-100 flex items-center justify-center mr-3">
                        <i class="fa-solid fa-check-double text-blue-600"></i>
                    </div>
                    <span class="text-sm font-bold">已選擇 <span id="selected-count" class="text-lg mx-1 font-black text-blue-600">0</span> 筆課程</span>
                    
                    <button id="btn-select-all-filtered" onclick="selectAllFiltered()" class="hidden ml-4 text-xs font-bold text-blue-600 hover:text-white bg-blue-50 hover:bg-blue-600 border border-blue-200 hover:border-blue-600 px-3 py-2 rounded-lg transition-all shadow-sm">
                        選取全部符合條件的 <span id="filtered-total-count">0</span> 筆
                    </button>
                    <button id="btn-clear-selection" onclick="clearSelection()" class="ml-2 text-xs font-bold text-slate-500 hover:text-white bg-slate-100 hover:bg-slate-500 border border-slate-200 hover:border-slate-500 px-3 py-2 rounded-lg transition-all shadow-sm">
                        取消選取
                    </button>
                </div>
                <div class="flex gap-2">
                    <button onclick="batchDelete()" class="bg-rose-500 hover:bg-rose-600 text-white px-5 py-2 rounded-xl text-xs font-bold transition-all shadow-sm flex items-center gap-1.5"><i class="fa-solid fa-trash-can"></i> 批次刪除選取</button>
                </div>
            </div>

            <div class="relative w-full md:w-80 shadow-sm rounded-xl overflow-hidden border border-slate-200 bg-white">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                <input type="text" id="search-input" oninput="window.renderTable()" placeholder="搜尋選課代號或課程名稱..." class="w-full pl-11 pr-4 h-11 text-sm outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            </div>
        </div>
    </div>

    <!-- 表格滾動區 -->
    <div class="flex-1 overflow-hidden px-6 pb-6 flex flex-col animate-fade">
        <div class="bg-white rounded-[1.5rem] shadow-sm border border-slate-200 flex flex-col flex-1 overflow-hidden">
            <div class="flex-1 overflow-auto custom-scrollbar relative">
                <table class="w-full text-left table-fixed">
                    <thead class="bg-slate-50 border-b border-slate-200 sticky top-0 z-10 shadow-sm">
                        <tr>
                            <!-- 💡 優化：重新校準寬度比例，給予課程名稱最大空間 -->
                            <th class="px-2 py-4 text-center w-[40px]">
                                <input type="checkbox" id="selectAll" onchange="toggleSelectPage(event)" class="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500 cursor-pointer shadow-sm transition-all">
                            </th>
                            <th class="px-2 py-4 text-center text-xs font-bold text-slate-500 w-[65px]">學年-學期</th>
                            <th class="px-2 py-4 text-center text-xs font-bold text-slate-500 w-[85px]">開課學制</th>
                            <th class="px-2 py-4 text-center text-xs font-bold text-slate-500 w-[75px]">開課學院</th>
                            <th class="px-2 py-4 text-center text-xs font-bold text-slate-500 w-[85px]">開課學系</th>
                            <th class="px-2 py-4 text-center text-xs font-bold text-slate-500 w-[75px]">選課代號</th>
                            <th class="px-4 py-4 text-center text-xs font-bold text-slate-500 w-[auto]">課程名稱</th>
                            <th class="px-2 py-4 text-center text-xs font-bold text-slate-500 w-[95px]">實習課程屬性</th>
                            <th class="px-2 py-4 text-center text-xs font-bold text-slate-500 w-[80px]">實習學分數</th>
                            <th class="px-2 py-4 text-center text-xs font-bold text-slate-500 w-[125px]">操作</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-100 text-sm">
                        <tr><td colspan="10" class="px-6 py-16 text-center text-slate-400"><i class="fa-solid fa-circle-notch fa-spin text-3xl mb-3 text-blue-500"></i><p class="font-bold">資料載入與驗證中...</p></td></tr>
                    </tbody>
                </table>
            </div>
            
            <div class="bg-slate-50 border-t border-slate-200 px-6 py-4 flex justify-between items-center shrink-0">
                <div id="pagination-info" class="text-xs font-bold text-slate-500">顯示 0 到 0 筆，共 0 筆</div>
                <div id="pagination-buttons" class="flex gap-1.5"></div>
            </div>
        </div>
    </div>

    <!-- 彈跳視窗：新增/編輯課程 -->
    <div id="data-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-2xl overflow-hidden modal-enter relative max-h-[90vh] flex flex-col">
            <div class="px-10 py-7 border-b border-slate-100 flex justify-between items-center shrink-0 bg-slate-50">
                <h3 id="modal-title" class="font-black text-slate-800 text-xl flex items-center gap-3">
                    <i class="fa-solid fa-book-medical text-blue-600"></i> 新增實習課程
                </h3>
                <button onclick="closeModal()" class="w-10 h-10 rounded-xl flex items-center justify-center text-slate-400 hover:text-slate-600 bg-white shadow-sm border border-slate-200 hover:bg-slate-50 transition-all"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            
            <form id="data-form" class="p-10 space-y-7 overflow-y-auto custom-scrollbar flex-1 bg-white">
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-2">學年度 <span class="text-rose-500">*</span></label>
                        <input type="text" id="input-academic-year" required placeholder="例如：114" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3 text-sm font-bold text-slate-700 shadow-sm text-center focus:ring-4 focus:ring-blue-100 focus:bg-white outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-2">學期 <span class="text-rose-500">*</span></label>
                        <input type="text" id="input-term" required placeholder="如: 1, 2, 暑期" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3 text-sm font-bold text-slate-700 shadow-sm text-center focus:ring-4 focus:ring-blue-100 focus:bg-white outline-none transition-all">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-6 border-t border-slate-100 pt-7">
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-2">開課學院 <span class="text-rose-500">*</span></label>
                        <select id="input-college" required onchange="updateFormDepts()" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3 text-sm focus:ring-4 focus:ring-blue-100 focus:bg-white transition-all outline-none font-bold text-slate-700 cursor-pointer shadow-sm">
                            <option value="">請選擇學院...</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-2">開課學系 <span class="text-rose-500">*</span></label>
                        <select id="input-department" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3 text-sm focus:ring-4 focus:ring-blue-100 focus:bg-white transition-all outline-none font-bold text-slate-700 cursor-pointer shadow-sm">
                            <option value="">請先選擇學院...</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-6">
                    <div class="col-span-1">
                        <label class="block text-xs font-bold text-slate-600 mb-2">選課代號 <span class="text-rose-500">*</span></label>
                        <input type="text" id="input-course-code" required placeholder="如: 1234" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3 text-sm focus:ring-4 focus:ring-blue-100 focus:bg-white transition-all outline-none font-mono font-bold text-slate-700 shadow-sm text-center">
                    </div>
                    <div class="col-span-2">
                        <label class="block text-xs font-bold text-slate-600 mb-2">課程名稱 <span class="text-rose-500">*</span></label>
                        <input type="text" id="input-course-name" required placeholder="例如：企業實習(一)" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3 text-sm focus:ring-4 focus:ring-blue-100 focus:bg-white transition-all outline-none font-bold text-slate-700 shadow-sm">
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-6">
                    <div class="col-span-1">
                        <label class="block text-xs font-bold text-slate-600 mb-2">開課學制 <span class="text-rose-500">*</span></label>
                        <select id="input-edu-system" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3 text-sm focus:ring-4 focus:ring-blue-100 focus:bg-white transition-all outline-none font-bold text-slate-700 cursor-pointer shadow-sm">
                            <option value="日間學士班" selected>日間學士班</option>
                            <option value="研究所">研究所</option>
                            <option value="進修學士班">進修學士班</option>
                        </select>
                    </div>
                    <div class="col-span-1">
                        <label class="block text-xs font-bold text-slate-600 mb-2">實習課程屬性 <span class="text-rose-500">*</span></label>
                        <select id="input-course-type" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3 text-sm focus:ring-4 focus:ring-blue-100 focus:bg-white transition-all outline-none font-bold text-slate-700 cursor-pointer shadow-sm">
                            <option value="必修" selected>必修</option>
                            <option value="選修">選修</option>
                            <option value="必選">必選</option>
                            <option value="畢業條件">畢業條件</option>
                        </select>
                    </div>
                    <div class="col-span-1">
                        <label class="block text-xs font-bold text-slate-600 mb-2">實習學分數 <span class="text-rose-500">*</span></label>
                        <input type="number" id="input-credits" min="0" step="0.5" required placeholder="如: 3" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3 text-sm focus:ring-4 focus:ring-blue-100 focus:bg-white transition-all outline-none font-mono font-bold text-slate-700 shadow-sm text-center">
                    </div>
                </div>
            </form>
            
            <div class="p-8 border-t border-slate-100 shrink-0 flex gap-4 bg-slate-50">
                <button type="button" onclick="closeModal()" class="flex-1 py-4 text-sm font-bold text-slate-600 bg-white border border-slate-200 hover:bg-slate-100 rounded-2xl transition-all shadow-sm">取消返回</button>
                <button type="button" id="btn-submit" onclick="submitForm()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-500/20 transition-all flex items-center justify-center gap-2 active:scale-[0.98]">
                    儲存課程主檔資料
                </button>
            </div>
        </div>
    </div>

    <!-- Firebase 邏輯 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, addDoc, serverTimestamp, getDocs, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDcsGfvVKnGmCzWfK5F03saydFpNc1ReYY", authDomain: "thu-isac-review.firebaseapp.com", projectId: "thu-isac-review", storageBucket: "thu-isac-review.firebasestorage.app", messagingSenderId: "453299876735", appId: "1:453299876735:web:1d8babca3315423161a04a" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app); 
        const db = getFirestore(app);
        
        const urlParams = new URLSearchParams(window.location.search);
        const shellSemester = urlParams.get('semester') || '114-1';

        const dataCollection = collection(db, "internship_courses");
        
        let allData = []; 
        let globalDepts = []; 
        let orderedColleges = []; 
        let editingId = null; 
        let currentPage = 1; 
        const itemsPerPage = 10;
        
        let selectedIds = [];
        let filteredCourses = []; 

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const collegeSnap = await getDoc(doc(db, "settings", "colleges"));
                if (collegeSnap.exists()) {
                    const rawList = collegeSnap.data().list || [];
                    orderedColleges = rawList.map(c => typeof c === 'string' ? { name: c, shortName: c } : c);
                }

                const deptSnap = await getDocs(collection(db, "departments"));
                globalDepts = deptSnap.docs.map(d => d.data());
                globalDepts.sort((a, b) => (a.sortOrder || 999) - (b.sortOrder || 999));
                populateColleges();

                onSnapshot(dataCollection, (snapshot) => {
                    allData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    populateSemesterFilter(); 
                    selectedIds = [];
                    updateBatchActionBar();
                    window.renderTable();
                }, (error) => {
                    document.getElementById('table-body').innerHTML = `<tr><td colspan="10" class="px-6 py-16 text-center text-rose-500 font-bold"><i class="fa-solid fa-lock text-3xl mb-3"></i><p>資料讀取失敗，權限不足。</p></td></tr>`;
                });
            } else {
                document.getElementById('table-body').innerHTML = `<tr><td colspan="10" class="px-6 py-16 text-center text-slate-400 font-bold"><i class="fa-solid fa-shield-halved text-3xl mb-3 text-slate-300"></i><p>請先登入系統以存取資料。</p></td></tr>`;
            }
        });

        window.toggleSelectPage = (e) => {
            const isChecked = e.target.checked;
            const startIndex = (currentPage - 1) * itemsPerPage;
            const currentPaginatedIds = filteredCourses.slice(startIndex, startIndex + itemsPerPage).map(d => d.id);
            if (isChecked) {
                currentPaginatedIds.forEach(id => { if (!selectedIds.includes(id)) selectedIds.push(id); });
            } else {
                selectedIds = selectedIds.filter(id => !currentPaginatedIds.includes(id));
            }
            updateBatchActionBar();
            window.renderTable();
        };

        window.toggleSelect = (id) => {
            const index = selectedIds.indexOf(id);
            if (index === -1) selectedIds.push(id);
            else selectedIds.splice(index, 1);
            updateBatchActionBar();
            window.renderTable();
        };

        window.selectAllFiltered = () => {
            selectedIds = filteredCourses.map(d => d.id);
            updateBatchActionBar();
            window.renderTable();
        };

        window.clearSelection = () => {
            selectedIds = [];
            updateBatchActionBar();
            window.renderTable();
        };

        function updateBatchActionBar() {
            const bar = document.getElementById('batch-action-bar');
            const count = document.getElementById('selected-count');
            const btnSelectAll = document.getElementById('btn-select-all-filtered');
            if (selectedIds.length > 0) {
                bar.classList.remove('hidden');
                count.innerText = selectedIds.length;
                if (selectedIds.length < filteredCourses.length) {
                    btnSelectAll.classList.remove('hidden');
                    document.getElementById('filtered-total-count').innerText = filteredCourses.length;
                } else {
                    btnSelectAll.classList.add('hidden');
                }
            } else {
                bar.classList.add('hidden');
            }
        }

        window.batchDelete = async () => {
            if (!confirm(`警告：確定要刪除選取的 ${selectedIds.length} 筆課程嗎？\n此操作無法復原！`)) return;
            try {
                for (let id of selectedIds) { await deleteDoc(doc(db, "internship_courses", id)); }
                selectedIds = [];
                updateBatchActionBar();
            } catch (e) { alert("批次刪除發生錯誤: " + e.message); }
        };

        function populateColleges() {
            const colleges = orderedColleges.length > 0 
                ? orderedColleges 
                : [...new Set(globalDepts.map(d => d.college))].filter(Boolean).map(c => ({name: c, shortName: c}));
            const filterCol = document.getElementById('filter-college');
            const inputCol = document.getElementById('input-college');
            let html = '<option value="all">開課學院：全部</option>';
            let inputHtml = '<option value="">請選擇學院...</option>';
            colleges.forEach(c => {
                html += `<option value="${c.name}">${c.shortName || c.name}</option>`;
                inputHtml += `<option value="${c.name}">${c.shortName || c.name}</option>`;
            });
            filterCol.innerHTML = html;
            inputCol.innerHTML = inputHtml;
        }

        function populateSemesterFilter() {
            const sems = [...new Set(allData.map(d => d.semester))].filter(Boolean).sort().reverse();
            const filterSem = document.getElementById('filter-semester');
            const currentVal = filterSem.value;
            let html = '<option value="all">學年/期：全部</option>';
            sems.forEach(s => html += `<option value="${s}">${s}</option>`);
            filterSem.innerHTML = html;
            if (sems.includes(currentVal)) { filterSem.value = currentVal; } 
            else if (sems.includes(shellSemester)) { filterSem.value = shellSemester; }
        }

        window.updateFilterDepts = () => {
            const selectedCol = document.getElementById('filter-college').value;
            const filterDept = document.getElementById('filter-dept');
            let html = '<option value="all">開課學系：全部</option>';
            if (selectedCol !== 'all') {
                const depts = globalDepts.filter(d => d.college === selectedCol);
                depts.forEach(d => { html += `<option value="${d.name}">${d.shortName || d.name}</option>`; });
            }
            filterDept.innerHTML = html;
        };

        window.updateFormDepts = (preselectedValue = '') => {
            const selectedCol = document.getElementById('input-college').value;
            const inputDept = document.getElementById('input-department');
            let html = '<option value="">請選擇學系...</option>';
            if (selectedCol) {
                const depts = globalDepts.filter(d => d.college === selectedCol);
                depts.forEach(d => { html += `<option value="${d.name}">${d.shortName || d.name}</option>`; });
            } else {
                html = '<option value="">請先選擇學院...</option>';
            }
            inputDept.innerHTML = html;
            if (preselectedValue) inputDept.value = preselectedValue;
        };

        window.openModal = () => {
            if (!editingId) { 
                document.getElementById('data-form').reset();
                document.getElementById('input-department').innerHTML = '<option value="">請先選擇學院...</option>';
                document.getElementById('modal-title').innerHTML = '<i class="fa-solid fa-book-medical text-blue-600"></i> 新增實習課程';
            }
            document.getElementById('data-modal').classList.remove('hidden');
        };

        window.closeModal = () => { document.getElementById('data-modal').classList.add('hidden'); editingId = null; };
        
        window.changePage = (page) => { currentPage = page; window.renderTable(); };

        window.moveOrder = async (id, direction) => {
            let sortedVis = [...filteredCourses].sort((a, b) => (a.sortOrder || 999) - (b.sortOrder || 999));
            const currentIndex = sortedVis.findIndex(d => d.id === id);
            if (direction === 'up' && currentIndex > 0) {
                let currentOrder = sortedVis[currentIndex].sortOrder || currentIndex * 10;
                let prevOrder = sortedVis[currentIndex - 1].sortOrder || (currentIndex - 1) * 10;
                if (currentOrder === prevOrder) { currentOrder += 1; prevOrder -= 1; }
                await updateDoc(doc(db, "internship_courses", sortedVis[currentIndex].id), { sortOrder: prevOrder });
                await updateDoc(doc(db, "internship_courses", sortedVis[currentIndex - 1].id), { sortOrder: currentOrder });
            } else if (direction === 'down' && currentIndex < sortedVis.length - 1) {
                let currentOrder = sortedVis[currentIndex].sortOrder || currentIndex * 10;
                let nextOrder = sortedVis[currentIndex + 1].sortOrder || (currentIndex + 1) * 10;
                if (currentOrder === nextOrder) { currentOrder -= 1; nextOrder += 1; }
                await updateDoc(doc(db, "internship_courses", sortedVis[currentIndex].id), { sortOrder: nextOrder });
                await updateDoc(doc(db, "internship_courses", sortedVis[currentIndex + 1].id), { sortOrder: currentOrder });
            }
        };

        window.renderTable = () => {
            const tbody = document.getElementById('table-body');
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const filterSem = document.getElementById('filter-semester').value;
            const filterCol = document.getElementById('filter-college').value;
            const filterDept = document.getElementById('filter-dept').value;

            filteredCourses = allData.filter(d => {
                const matchSearch = (d.course_name || '').toLowerCase().includes(searchTerm) || (d.course_code || '').toLowerCase().includes(searchTerm);
                const matchSem = filterSem === 'all' || d.semester === filterSem;
                const matchCol = filterCol === 'all' || d.college === filterCol;
                const matchDept = filterDept === 'all' || d.department === filterDept;
                return matchSearch && matchSem && matchCol && matchDept;
            });

            filteredCourses.sort((a, b) => (a.sortOrder || 999) - (b.sortOrder || 999));

            const totalItems = filteredCourses.length;
            const totalPages = Math.ceil(totalItems / itemsPerPage) || 1;
            if (currentPage > totalPages) currentPage = totalPages || 1;

            const startIndex = (currentPage - 1) * itemsPerPage;
            const paginatedItems = filteredCourses.slice(startIndex, startIndex + itemsPerPage);

            document.getElementById('pagination-info').innerText = totalItems > 0 ? `顯示 ${startIndex + 1} 到 ${Math.min(startIndex + itemsPerPage, totalItems)} 筆，共 ${totalItems} 筆` : '尚無資料';
            
            let btnHtml = '';
            btnHtml += `<button onclick="changePage(${currentPage - 1})" class="px-3 py-1 border border-slate-200 rounded-md text-sm font-bold text-slate-600 hover:bg-slate-100 disabled:opacity-40 transition-colors" ${currentPage === 1 ? 'disabled' : ''}>上一頁</button>`;
            btnHtml += `<span class="px-4 py-1 text-sm font-bold text-blue-600 bg-blue-50 rounded-md mx-1">${currentPage} / ${totalPages}</span>`;
            btnHtml += `<button onclick="changePage(${currentPage + 1})" class="px-3 py-1 border border-slate-200 rounded-md text-sm font-bold text-slate-600 hover:bg-slate-100 disabled:opacity-40 transition-colors" ${currentPage === totalPages ? 'disabled' : ''}>下一頁</button>`;
            document.getElementById('pagination-buttons').innerHTML = btnHtml;

            const currentPaginatedIds = paginatedItems.map(d => d.id);
            const isAllVisibleSelected = currentPaginatedIds.length > 0 && currentPaginatedIds.every(id => selectedIds.includes(id));
            document.getElementById('selectAll').checked = isAllVisibleSelected;

            if (totalItems === 0) {
                tbody.innerHTML = `<tr><td colspan="10" class="px-6 py-16 text-center text-slate-400 font-bold bg-white">找不到符合條件的課程資料。</td></tr>`;
                return;
            }

            let html = '';
            paginatedItems.forEach((data, idx) => {
                const globalIndex = startIndex + idx; 
                const colObj = orderedColleges.find(c => c.name === data.college);
                const colDispName = colObj && colObj.shortName ? colObj.shortName : data.college;
                const deptObj = globalDepts.find(d => d.name === data.department);
                const deptDispName = deptObj && deptObj.shortName ? deptObj.shortName : data.department;
                const isChecked = selectedIds.includes(data.id) ? 'checked' : '';

                html += `
                <tr class="group bg-white hover:bg-blue-50/40 transition-all duration-150 text-center">
                    <td class="px-2 py-3 align-middle">
                        <input type="checkbox" class="row-checkbox w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500 cursor-pointer shadow-sm transition-all" value="${data.id}" onchange="toggleSelect('${data.id}')" ${isChecked}>
                    </td>
                    <td class="px-2 py-3 align-middle text-sm font-bold text-slate-800 leading-tight">${data.academic_year}-${data.term}</td>
                    <td class="px-2 py-3 align-middle text-sm font-bold text-slate-800 leading-tight">${data.edu_system}</td>
                    <td class="px-2 py-3 align-middle text-sm font-bold text-slate-800 leading-tight">${colDispName}</td>
                    <td class="px-2 py-3 align-middle text-sm font-bold text-slate-800 leading-tight">${deptDispName}</td>
                    <td class="px-2 py-3 align-middle text-sm font-bold text-slate-800 leading-tight uppercase font-mono">${data.course_code}</td>
                    <td class="px-4 py-3 align-middle text-sm font-bold text-slate-800 leading-tight text-center">
                        <div class="inline-block text-left w-full max-w-full truncate" title="${data.course_name}">${data.course_name}</div>
                    </td>
                    <td class="px-2 py-3 align-middle text-sm font-bold text-slate-800 leading-tight">${data.course_type}</td>
                    <td class="px-2 py-3 align-middle text-sm font-bold text-slate-800 leading-tight">${data.credits}</td>
                    <td class="px-2 py-3 align-middle">
                        <div class="flex items-center justify-center gap-1 opacity-100">
                            <button onclick="window.moveOrder('${data.id}', 'up')" class="w-7 h-7 rounded-lg flex items-center justify-center text-slate-300 hover:text-blue-600 hover:bg-blue-50 transition-all disabled:opacity-0" ${globalIndex === 0 ? 'disabled' : ''}><i class="fa-solid fa-chevron-up text-[10px]"></i></button>
                            <button onclick="window.moveOrder('${data.id}', 'down')" class="w-7 h-7 rounded-lg flex items-center justify-center text-slate-300 hover:text-blue-600 hover:bg-blue-50 transition-all disabled:opacity-0" ${globalIndex === filteredCourses.length - 1 ? 'disabled' : ''}><i class="fa-solid fa-chevron-down text-[10px]"></i></button>
                            <button onclick="window.editData('${data.id}')" class="w-7 h-7 rounded-lg flex items-center justify-center bg-blue-50 text-blue-600 hover:bg-blue-100 transition-all shrink-0" title="編輯"><i class="fa-solid fa-pen text-[10px]"></i></button>
                            <button onclick="window.deleteData('${data.id}', '${data.course_name}')" class="w-7 h-7 rounded-lg flex items-center justify-center text-slate-300 hover:text-rose-600 hover:bg-rose-50 transition-all shrink-0" title="刪除"><i class="fa-solid fa-trash-can text-[10px]"></i></button>
                        </div>
                    </td>
                </tr>`;
            });
            tbody.innerHTML = html;
        };

        window.exportToCSV = () => {
            if (filteredCourses.length === 0) { alert("沒有資料可供匯出！"); return; }
            let csv = '\uFEFF學年,學期,開課學制,開課學院,開課學系,選課代號,課程名稱,實習課程屬性,實習學分數\n';
            filteredCourses.forEach(d => {
                csv += [d.academic_year, d.term, d.edu_system, d.college, d.department, d.course_code, d.course_name, d.course_type, d.credits].map(v => `"${(v||'').toString().replace(/"/g, '""')}"`).join(',') + '\n';
            });
            const link = document.createElement('a'); link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
            link.download = `實習課程清單_${new Date().toISOString().split('T')[0]}.csv`; link.click();
        };

        window.handleImport = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const btn = document.getElementById('btn-import');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin text-blue-600"></i> 匯入中...';
            btn.disabled = true;
            const reader = new FileReader();
            reader.onload = async (event) => {
                try {
                    const rows = event.target.result.split('\n').map(row => row.trim()).filter(row => row);
                    let parsedRows = [];
                    for (let i = 1; i < rows.length; i++) {
                        let cols = []; let inQuotes = false; let currentVal = '';
                        for (let char of rows[i]) {
                            if (char === '"') { inQuotes = !inQuotes; }
                            else if (char === ',' && !inQuotes) { cols.push(currentVal.trim()); currentVal = ''; }
                            else { currentVal += char; }
                        }
                        cols.push(currentVal.trim());
                        if (cols.length >= 9) {
                            const payload = {
                                academic_year: cols[0], term: cols[1], semester: `${cols[0]}-${cols[1]}`,
                                edu_system: cols[2] === '學士班' ? '日間學士班' : cols[2], 
                                college: cols[3], department: cols[4], course_code: cols[5],
                                course_name: cols[6], course_type: cols[7], credits: Number(cols[8]) || 0,
                                created_at: serverTimestamp()
                            };
                            if (!payload.academic_year || !payload.term || !payload.course_code || !payload.course_name) continue;
                            parsedRows.push(payload);
                        }
                    }
                    parsedRows.sort((a, b) => {
                        const yearA = parseInt(a.academic_year) || 0; const yearB = parseInt(b.academic_year) || 0;
                        if (yearA !== yearB) return yearB - yearA;
                        const termA = parseInt(a.term) || 0; const termB = parseInt(b.term) || 0;
                        if (termA !== termB) return termB - termA;
                        const colIdxA = orderedColleges.findIndex(c => c.name === a.college);
                        const colIdxB = orderedColleges.findIndex(c => c.name === b.college);
                        if (colIdxA !== colIdxB) return (colIdxA === -1 ? 999 : colIdxA) - (colIdxB === -1 ? 999 : colIdxB);
                        const deptA = globalDepts.find(d => d.name === a.department);
                        const deptB = globalDepts.find(d => d.name === b.department);
                        const orderDeptA = deptA ? (deptA.sortOrder || 999) : 999;
                        const orderDeptB = deptB ? (deptB.sortOrder || 999) : 999;
                        if (orderDeptA !== orderDeptB) return orderDeptA - orderDeptB;
                        return (a.course_code || '').localeCompare(b.course_code || '');
                    });
                    let maxOrder = allData.length > 0 ? Math.max(...allData.map(d => d.sortOrder || 0)) : 0;
                    let addedCount = 0;
                    for (let payload of parsedRows) { maxOrder += 10; payload.sortOrder = maxOrder; await addDoc(dataCollection, payload); addedCount++; }
                    alert(`✅ 成功匯入 ${addedCount} 筆課程資料！`);
                } catch (error) { alert("匯入失敗，請確認 CSV 檔案格式是否正確。\n" + error.message); } 
                finally { btn.innerHTML = originalHtml; btn.disabled = false; e.target.value = ''; }
            };
            reader.readAsText(file);
        };

        window.submitForm = async () => {
            const btn = document.getElementById('btn-submit');
            const year = document.getElementById('input-academic-year').value.trim();
            const term = document.getElementById('input-term').value.trim();
            const payload = { 
                academic_year: year, term: term, semester: `${year}-${term}`,
                college: document.getElementById('input-college').value,
                department: document.getElementById('input-department').value,
                course_code: document.getElementById('input-course-code').value.trim(),
                course_name: document.getElementById('input-course-name').value.trim(),
                edu_system: document.getElementById('input-edu-system').value,
                course_type: document.getElementById('input-course-type').value,
                credits: Number(document.getElementById('input-credits').value)
            };
            if(!payload.academic_year || !payload.term || !payload.college || !payload.department || !payload.course_code || !payload.course_name) { 
                alert("請填寫所有必填欄位！"); return; 
            }
            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> 儲存中...';
            try {
                if (editingId) { await updateDoc(doc(db, "internship_courses", editingId), { ...payload, updated_at: serverTimestamp() }); } 
                else {
                    let maxOrder = allData.length > 0 ? Math.max(...allData.map(d => d.sortOrder || 0)) : 0;
                    await addDoc(dataCollection, { ...payload, sortOrder: maxOrder + 10, created_at: serverTimestamp() });
                }
                closeModal();
            } catch (err) { alert("儲存發生錯誤：" + err.message); } 
            finally { btn.disabled = false; btn.innerText = '儲存課程主檔資料'; }
        };

        window.editData = (id) => {
            const docData = allData.find(d => d.id === id); if (!docData) return;
            editingId = id;
            document.getElementById('input-academic-year').value = docData.academic_year || '';
            document.getElementById('input-term').value = docData.term || '';
            document.getElementById('input-college').value = docData.college || '';
            window.updateFormDepts(docData.department); 
            document.getElementById('input-course-code').value = docData.course_code || '';
            document.getElementById('input-course-name').value = docData.course_name || ''; 
            document.getElementById('input-edu-system').value = docData.edu_system || '日間學士班'; 
            document.getElementById('input-course-type').value = docData.course_type || '必修'; 
            document.getElementById('input-credits').value = docData.credits || 0; 
            document.getElementById('modal-title').innerHTML = '<i class="fa-solid fa-pen text-blue-600"></i> 編輯實習課程';
            document.getElementById('data-modal').classList.remove('hidden');
        };

        window.deleteData = async (id, name) => {
            if (confirm(`警告：確定要刪除課程「${name}」嗎？`)) {
                await deleteDoc(doc(db, "internship_courses", id));
                window.renderTable();
            }
        };

        document.getElementById('search-input').addEventListener('input', () => { currentPage = 1; window.renderTable(); });
        document.getElementById('filter-semester').addEventListener('change', () => { currentPage = 1; window.renderTable(); });
        document.getElementById('filter-college').addEventListener('change', () => { currentPage = 1; window.updateFilterDepts(); window.renderTable(); });
        document.getElementById('filter-dept').addEventListener('change', () => { currentPage = 1; window.renderTable(); });

    </script>
</body>
</html>
