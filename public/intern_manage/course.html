<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>實習課程管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { 50: '#f0f5fa', 500: '#2c75b3', 600: '#1a5c96', 700: '#004785' } } } } }
    </script>
    <style>
        body { background-color: transparent; margin: 0; padding: 0; font-family: "SF Pro TC", "Noto Sans TC", sans-serif; -webkit-font-smoothing: antialiased; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .modal-enter { animation: modalFadeIn 0.2s ease-out forwards; }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.97) translateY(-5px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        table { table-layout: fixed; width: 100%; } td { word-break: break-word; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen flex flex-col overflow-hidden">

    <div class="shrink-0 px-6 pt-6 pb-4 space-y-4 animate-fade">
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center border border-blue-100 shrink-0">
                    <i class="fa-solid fa-book text-xl"></i>
                </div>
                <div>
                    <h2 class="text-xl font-bold text-slate-800 tracking-tight" id="page-title">實習課程管理</h2>
                    <p class="text-xs text-slate-500 mt-1">管理各系所歷年開設之實習課程資訊，作為學生綁定實習紀錄之基礎主檔。</p>
                </div>
            </div>
            
            <div class="flex flex-wrap gap-2">
                <button onclick="exportToCSV()" class="h-9 bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 font-bold px-3 rounded-lg text-sm transition-all flex items-center gap-1.5 shadow-sm">
                    <i class="fa-solid fa-file-export text-emerald-600"></i> 匯出清單
                </button>
                <button id="btn-import" onclick="document.getElementById('import-file').click()" class="h-9 bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 font-bold px-3 rounded-lg text-sm transition-all flex items-center gap-1.5 shadow-sm">
                    <i class="fa-solid fa-file-import text-blue-600"></i> 批次匯入
                </button>
                <input type="file" id="import-file" accept=".csv" class="hidden" onchange="handleImport(event)">
                <div class="w-px h-6 bg-slate-200 self-center mx-1"></div>
                <button onclick="openModal()" class="h-9 bg-blue-600 hover:bg-blue-700 text-white font-bold px-4 rounded-lg text-sm transition-all flex items-center gap-1.5 shadow-sm shadow-blue-500/20">
                    <i class="fa-solid fa-plus text-base"></i> 新增課程
                </button>
            </div>
        </div>

        <div class="flex flex-col md:flex-row justify-between items-center gap-4 w-full">
            <div class="flex gap-2 w-full md:w-auto">
                <select id="filter-semester" onchange="renderTable()" class="bg-white border border-slate-200 text-slate-700 text-sm font-bold rounded-lg px-3 h-10 outline-none focus:ring-2 focus:ring-blue-500 transition-all cursor-pointer shadow-sm">
                    <option value="all">學年/期：全部</option>
                    <!-- 動態生成 -->
                </select>
                <select id="filter-college" onchange="updateFilterDepts(); renderTable();" class="bg-white border border-slate-200 text-slate-700 text-sm font-bold rounded-lg px-3 h-10 outline-none focus:ring-2 focus:ring-blue-500 transition-all cursor-pointer shadow-sm">
                    <option value="all">開課學院：全部</option>
                </select>
                <select id="filter-dept" onchange="renderTable()" class="bg-white border border-slate-200 text-slate-700 text-sm font-bold rounded-lg px-3 h-10 outline-none focus:ring-2 focus:ring-blue-500 transition-all cursor-pointer shadow-sm">
                    <option value="all">開課學系：全部</option>
                </select>
            </div>
            <div class="relative w-full md:w-72 shadow-sm rounded-lg">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                <input type="text" id="search-input" oninput="renderTable()" placeholder="搜尋選課代號或課程名稱..." class="w-full bg-white border border-slate-200 rounded-lg pl-9 pr-3 h-10 text-sm outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            </div>
        </div>
    </div>

    <!-- 表格滾動區 -->
    <div class="flex-1 overflow-hidden px-6 pb-6 flex flex-col animate-fade">
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col flex-1 overflow-hidden">
            <div class="flex-1 overflow-auto custom-scrollbar relative">
                <table class="w-full text-left table-fixed">
                    <thead class="bg-slate-50 border-b border-slate-200 sticky top-0 z-10">
                        <tr>
                            <th class="px-4 py-3.5 text-center text-xs font-bold text-slate-500 w-[8%] whitespace-nowrap">學年/期</th>
                            <th class="px-4 py-3.5 text-center text-xs font-bold text-slate-500 w-[12%]">開課單位</th>
                            <th class="px-4 py-3.5 text-center text-xs font-bold text-slate-500 w-[10%]">選課代號</th>
                            <th class="px-4 py-3.5 text-left text-xs font-bold text-slate-500 w-[25%]">課程名稱</th>
                            <th class="px-4 py-3.5 text-center text-xs font-bold text-slate-500 w-[12%]">實習課程屬性</th>
                            <th class="px-4 py-3.5 text-center text-xs font-bold text-slate-500 w-[8%]">學分數</th>
                            <th class="px-4 py-3.5 text-center text-xs font-bold text-slate-500 w-[10%]">學制</th>
                            <th class="px-4 py-3.5 text-center text-xs font-bold text-slate-500 w-[15%]">操作</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-100 text-sm">
                        <tr><td colspan="8" class="px-6 py-16 text-center text-slate-400"><i class="fa-solid fa-circle-notch fa-spin text-3xl mb-3 text-blue-500"></i><p class="font-bold">資料載入與驗證中...</p></td></tr>
                    </tbody>
                </table>
            </div>
            
            <div class="bg-slate-50 border-t border-slate-200 px-6 py-3 flex justify-between items-center shrink-0">
                <div id="pagination-info" class="text-xs font-bold text-slate-500">顯示 0 到 0 筆，共 0 筆</div>
                <div id="pagination-buttons" class="flex gap-1"></div>
            </div>
        </div>
    </div>

    <!-- 彈跳視窗：新增/編輯課程 -->
    <div id="data-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-2xl overflow-hidden modal-enter relative max-h-[90vh] flex flex-col">
            <div class="px-8 py-5 border-b border-slate-100 flex justify-between items-center shrink-0 bg-slate-50">
                <h3 id="modal-title" class="font-black text-slate-800 text-lg flex items-center gap-2">
                    <i class="fa-solid fa-book-medical text-blue-600"></i> 新增實習課程
                </h3>
                <button onclick="closeModal()" class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-slate-600 bg-white shadow-sm border border-slate-200 hover:bg-slate-50 transition-colors shrink-0"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            
            <form id="data-form" class="p-8 space-y-6 overflow-y-auto custom-scrollbar flex-1 bg-white">
                
                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-2">學年度 <span class="text-rose-500">*</span></label>
                        <input type="text" id="input-academic-year" required placeholder="例如：114" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm font-bold text-slate-700 shadow-sm text-center focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-2">學期 <span class="text-rose-500">*</span></label>
                        <input type="text" id="input-term" required placeholder="如: 1, 2, 暑期" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm font-bold text-slate-700 shadow-sm text-center focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-5 border-t border-slate-100 pt-5">
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-2">開課學院 <span class="text-rose-500">*</span></label>
                        <select id="input-college" required onchange="updateFormDepts()" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none font-bold text-slate-700 cursor-pointer shadow-sm">
                            <option value="">請選擇學院...</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-2">開課學系 <span class="text-rose-500">*</span></label>
                        <select id="input-department" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none font-bold text-slate-700 cursor-pointer shadow-sm">
                            <option value="">請先選擇學院...</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-5">
                    <div class="col-span-1">
                        <label class="block text-xs font-bold text-slate-600 mb-2">選課代號 <span class="text-rose-500">*</span></label>
                        <input type="text" id="input-course-code" required placeholder="如: 1234" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none font-mono font-bold text-slate-700 shadow-sm text-center">
                    </div>
                    <div class="col-span-2">
                        <label class="block text-xs font-bold text-slate-600 mb-2">課程名稱 <span class="text-rose-500">*</span></label>
                        <input type="text" id="input-course-name" required placeholder="例如：企業實習(一)" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none font-bold text-slate-700 shadow-sm">
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-5">
                    <div class="col-span-1">
                        <label class="block text-xs font-bold text-slate-600 mb-2">開課學制 <span class="text-rose-500">*</span></label>
                        <select id="input-edu-system" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none font-bold text-slate-700 cursor-pointer shadow-sm">
                            <option value="學士班" selected>學士班</option>
                            <option value="研究所">研究所</option>
                            <option value="進修學士班">進修學士班</option>
                        </select>
                    </div>
                    <div class="col-span-1">
                        <label class="block text-xs font-bold text-slate-600 mb-2">實習課程屬性 <span class="text-rose-500">*</span></label>
                        <select id="input-course-type" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none font-bold text-slate-700 cursor-pointer shadow-sm">
                            <option value="必修" selected>必修</option>
                            <option value="選修">選修</option>
                            <option value="必選">必選</option>
                            <option value="畢業條件">畢業條件</option>
                        </select>
                    </div>
                    <div class="col-span-1">
                        <label class="block text-xs font-bold text-slate-600 mb-2">學分數 <span class="text-rose-500">*</span></label>
                        <input type="number" id="input-credits" min="0" step="0.5" required placeholder="如: 3" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none font-mono font-bold text-slate-700 shadow-sm text-center">
                    </div>
                </div>

            </form>
            
            <div class="p-6 border-t border-slate-100 shrink-0 flex gap-4 bg-slate-50">
                <button type="button" onclick="closeModal()" class="flex-1 py-2.5 text-sm font-bold text-slate-600 bg-white border border-slate-200 hover:bg-slate-100 rounded-xl transition-all shadow-sm">取消</button>
                <button type="button" id="btn-submit" onclick="submitForm()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-xl shadow-md shadow-blue-500/20 transition-all flex items-center justify-center gap-2">
                    儲存課程
                </button>
            </div>
        </div>
    </div>

    <!-- Firebase 邏輯 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, addDoc, serverTimestamp, getDocs, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDcsGfvVKnGmCzWfK5F03saydFpNc1ReYY", authDomain: "thu-isac-review.firebaseapp.com", projectId: "thu-isac-review", storageBucket: "thu-isac-review.firebasestorage.app", messagingSenderId: "453299876735", appId: "1:453299876735:web:1d8babca3315423161a04a" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app); 
        const db = getFirestore(app);
        
        const urlParams = new URLSearchParams(window.location.search);
        const shellSemester = urlParams.get('semester') || '114-1';

        const dataCollection = collection(db, "internship_courses");
        
        let allData = []; 
        let globalDepts = []; // 存儲全域系所清單
        let orderedColleges = []; // 存儲系統設定好的學院順序
        let editingId = null; 
        let currentPage = 1; 
        const itemsPerPage = 10;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // 1. 載入學院順序設定 (依據系統設定)
                const collegeSnap = await getDoc(doc(db, "settings", "colleges"));
                if (collegeSnap.exists()) {
                    orderedColleges = collegeSnap.data().list || [];
                }

                // 2. 載入全域系所資料，並以系統的 sortOrder 排序
                const deptSnap = await getDocs(collection(db, "departments"));
                globalDepts = deptSnap.docs.map(d => d.data());
                globalDepts.sort((a, b) => (a.sortOrder || 999) - (b.sortOrder || 999));
                populateColleges();

                // 3. 載入「全部歷年」課程
                onSnapshot(dataCollection, (snapshot) => {
                    allData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    populateSemesterFilter(); // 動態萃取所有學期選項
                    renderTable();
                }, (error) => {
                    document.getElementById('table-body').innerHTML = `<tr><td colspan="8" class="px-6 py-16 text-center text-rose-500 font-bold"><i class="fa-solid fa-lock text-3xl mb-3"></i><p>資料讀取失敗，權限不足。</p></td></tr>`;
                });
            } else {
                document.getElementById('table-body').innerHTML = `<tr><td colspan="8" class="px-6 py-16 text-center text-slate-400 font-bold"><i class="fa-solid fa-shield-halved text-3xl mb-3 text-slate-300"></i><p>請先登入系統以存取資料。</p></td></tr>`;
            }
        });

        // 載入學院選項 (使用設定檔中的排序)
        function populateColleges() {
            const colleges = orderedColleges.length > 0 
                ? orderedColleges 
                : [...new Set(globalDepts.map(d => d.college))].filter(Boolean);
            
            const filterCol = document.getElementById('filter-college');
            const inputCol = document.getElementById('input-college');
            
            let html = '<option value="all">開課學院：全部</option>';
            let inputHtml = '<option value="">請選擇學院...</option>';
            colleges.forEach(c => {
                html += `<option value="${c}">${c}</option>`;
                inputHtml += `<option value="${c}">${c}</option>`;
            });
            filterCol.innerHTML = html;
            inputCol.innerHTML = inputHtml;
        }

        // 動態萃取歷年學期選項供篩選
        function populateSemesterFilter() {
            const sems = [...new Set(allData.map(d => d.semester))].filter(Boolean).sort().reverse();
            const filterSem = document.getElementById('filter-semester');
            const currentVal = filterSem.value;
            
            let html = '<option value="all">學年/期：全部</option>';
            sems.forEach(s => html += `<option value="${s}">${s}</option>`);
            filterSem.innerHTML = html;
            
            if (sems.includes(currentVal)) {
                filterSem.value = currentVal;
            } else if (sems.includes(shellSemester)) {
                // 預設篩選至外殼選定的學期
                filterSem.value = shellSemester;
            }
        }

        // 根據選擇的學院連動更新學系選項 (篩選列)
        window.updateFilterDepts = () => {
            const selectedCol = document.getElementById('filter-college').value;
            const filterDept = document.getElementById('filter-dept');
            let html = '<option value="all">開課學系：全部</option>';
            
            if (selectedCol !== 'all') {
                const depts = globalDepts.filter(d => d.college === selectedCol);
                depts.forEach(d => {
                    const dispName = d.shortName || d.name; // 優先使用簡稱
                    html += `<option value="${d.name}">${dispName}</option>`;
                });
            }
            filterDept.innerHTML = html;
        };

        // 根據選擇的學院連動更新學系選項 (表單內)
        window.updateFormDepts = (preselectedValue = '') => {
            const selectedCol = document.getElementById('input-college').value;
            const inputDept = document.getElementById('input-department');
            let html = '<option value="">請選擇學系...</option>';
            
            if (selectedCol) {
                const depts = globalDepts.filter(d => d.college === selectedCol);
                depts.forEach(d => {
                    const dispName = d.shortName || d.name; // 優先使用簡稱
                    html += `<option value="${d.name}">${dispName}</option>`;
                });
            } else {
                html = '<option value="">請先選擇學院...</option>';
            }
            inputDept.innerHTML = html;
            if (preselectedValue) inputDept.value = preselectedValue;
        };

        window.openModal = () => {
            if (!editingId) { 
                document.getElementById('data-form').reset();
                document.getElementById('input-academic-year').value = '';
                document.getElementById('input-term').value = '';
                document.getElementById('input-department').innerHTML = '<option value="">請先選擇學院...</option>';
                document.getElementById('modal-title').innerHTML = '<i class="fa-solid fa-book-medical text-blue-600"></i> 新增實習課程';
            }
            document.getElementById('data-modal').classList.remove('hidden');
        };

        window.closeModal = () => { document.getElementById('data-modal').classList.add('hidden'); editingId = null; };
        window.changePage = (page) => { currentPage = page; renderTable(); };

        function renderTable() {
            const tbody = document.getElementById('table-body');
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const filterSem = document.getElementById('filter-semester').value;
            const filterCol = document.getElementById('filter-college').value;
            const filterDept = document.getElementById('filter-dept').value;

            let filtered = allData.filter(d => {
                const matchSearch = (d.course_name || '').toLowerCase().includes(searchTerm) || (d.course_code || '').toLowerCase().includes(searchTerm);
                const matchSem = filterSem === 'all' || d.semester === filterSem;
                const matchCol = filterCol === 'all' || d.college === filterCol;
                const matchDept = filterDept === 'all' || d.department === filterDept;
                return matchSearch && matchSem && matchCol && matchDept;
            });

            // 依照學期降序，接著依照學系名稱與課程代號排序
            filtered.sort((a, b) => {
                const cmpSem = (b.semester || '').localeCompare(a.semester || '');
                if (cmpSem !== 0) return cmpSem;
                const cmpDept = (a.department || '').localeCompare(b.department || '');
                return cmpDept !== 0 ? cmpDept : (a.course_code || '').localeCompare(b.course_code || '');
            });

            const totalItems = filtered.length;
            const totalPages = Math.ceil(totalItems / itemsPerPage) || 1;
            if (currentPage > totalPages) currentPage = totalPages;

            const startIndex = (currentPage - 1) * itemsPerPage;
            const paginatedItems = filtered.slice(startIndex, startIndex + itemsPerPage);

            document.getElementById('pagination-info').innerText = totalItems > 0 ? `顯示 ${startIndex + 1} 到 ${Math.min(startIndex + itemsPerPage, totalItems)} 筆，共 ${totalItems} 筆` : '尚無資料';
            
            let btnHtml = '';
            btnHtml += `<button onclick="changePage(${currentPage - 1})" class="px-3 py-1 border border-slate-200 rounded-md text-sm font-bold text-slate-600 hover:bg-slate-100 disabled:opacity-40 transition-colors" ${currentPage === 1 ? 'disabled' : ''}>上一頁</button>`;
            btnHtml += `<span class="px-4 py-1 text-sm font-bold text-blue-600 bg-blue-50 rounded-md mx-1">${currentPage} / ${totalPages}</span>`;
            btnHtml += `<button onclick="changePage(${currentPage + 1})" class="px-3 py-1 border border-slate-200 rounded-md text-sm font-bold text-slate-600 hover:bg-slate-100 disabled:opacity-40 transition-colors" ${currentPage === totalPages ? 'disabled' : ''}>下一頁</button>`;
            document.getElementById('pagination-buttons').innerHTML = btnHtml;

            if (totalItems === 0) {
                tbody.innerHTML = `<tr><td colspan="8" class="px-6 py-16 text-center text-slate-400 font-bold bg-white">找不到符合條件的課程。</td></tr>`;
                return;
            }

            let html = '';
            paginatedItems.forEach((data) => {
                
                let typeColor = "bg-slate-100 text-slate-600 border-slate-200";
                if(data.course_type === '必修') typeColor = "bg-rose-50 text-rose-600 border-rose-200";
                if(data.course_type === '選修') typeColor = "bg-emerald-50 text-emerald-600 border-emerald-200";
                if(data.course_type === '必選') typeColor = "bg-indigo-50 text-indigo-600 border-indigo-200";
                if(data.course_type === '畢業條件') typeColor = "bg-amber-50 text-amber-600 border-amber-200";

                let attrBadge = `<span class="inline-flex items-center px-2 py-0.5 rounded border ${typeColor} text-[11px] font-bold whitespace-nowrap">${data.course_type}</span>`;
                
                // 尋找學系物件，以顯示簡稱
                const deptObj = globalDepts.find(d => d.name === data.department);
                const deptDispName = deptObj && deptObj.shortName ? deptObj.shortName : data.department;

                html += `
                <tr class="group bg-white hover:bg-blue-50/40 transition-all duration-150">
                    <td class="px-4 py-4 align-middle text-center">
                        <div class="text-xs font-bold text-slate-400">${data.academic_year}-${data.term}</div>
                    </td>
                    <td class="px-4 py-4 align-middle text-center">
                        <div class="text-[10px] font-bold text-slate-400 mb-0.5">${data.college}</div>
                        <div class="text-sm font-bold text-slate-700">${deptDispName}</div>
                    </td>
                    <td class="px-4 py-4 align-middle text-center">
                        <span class="inline-block bg-slate-100 border border-slate-300 text-slate-600 font-mono font-bold px-2 py-1 rounded shadow-inner text-xs whitespace-nowrap">${data.course_code}</span>
                    </td>
                    <td class="px-4 py-4 align-middle">
                        <span class="text-sm font-bold text-slate-800 leading-tight block">${data.course_name}</span>
                    </td>
                    <td class="px-4 py-4 align-middle text-center">${attrBadge}</td>
                    <td class="px-4 py-4 align-middle text-center">
                        <span class="font-bold text-slate-700">${data.credits}</span>
                    </td>
                    <td class="px-4 py-4 align-middle text-center">
                        <span class="text-xs text-slate-500 font-bold">${data.edu_system}</span>
                    </td>
                    <td class="px-4 py-4 align-middle text-center">
                        <div class="flex items-center justify-center gap-2 opacity-100 transition-opacity">
                            <button onclick="window.editData('${data.id}')" class="w-8 h-8 rounded-lg flex items-center justify-center bg-blue-50 text-blue-600 hover:bg-blue-100 transition-all shrink-0" title="編輯"><i class="fa-solid fa-pen text-sm"></i></button>
                            <button onclick="window.deleteData('${data.id}', '${data.course_name}')" class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-rose-600 hover:bg-rose-50 transition-all shrink-0" title="刪除"><i class="fa-solid fa-trash-can text-sm"></i></button>
                        </div>
                    </td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        window.exportToCSV = () => {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const filterSem = document.getElementById('filter-semester').value;
            const filterCol = document.getElementById('filter-college').value;
            const filterDept = document.getElementById('filter-dept').value;

            let filtered = allData.filter(d => {
                const matchSearch = (d.course_name || '').toLowerCase().includes(searchTerm) || (d.course_code || '').toLowerCase().includes(searchTerm);
                const matchSem = filterSem === 'all' || d.semester === filterSem;
                const matchCol = filterCol === 'all' || d.college === filterCol;
                const matchDept = filterDept === 'all' || d.department === filterDept;
                return matchSearch && matchSem && matchCol && matchDept;
            });

            if (filtered.length === 0) { alert("沒有資料可供匯出！"); return; }
            
            let csv = '\uFEFF學年,學期,開課學制,開課學院,開課學系,選課代號,課程名稱,實習課程屬性,實習學分數\n';
            
            filtered.sort((a, b) => {
                const cmpSem = (b.semester || '').localeCompare(a.semester || '');
                if (cmpSem !== 0) return cmpSem;
                const cmpDept = (a.department || '').localeCompare(b.department || '');
                return cmpDept !== 0 ? cmpDept : (a.course_code || '').localeCompare(b.course_code || '');
            });

            filtered.forEach(d => {
                // 匯出時如果需要顯示簡稱，可比照表格尋找簡稱，或保持存儲的全名。此處統一採用實際存入的資料
                csv += [d.academic_year, d.term, d.edu_system, d.college, d.department, d.course_code, d.course_name, d.course_type, d.credits].map(v => `"${(v||'').toString().replace(/"/g, '""')}"`).join(',') + '\n';
            });
            const link = document.createElement('a'); link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
            
            let filenameSem = filterSem === 'all' ? '歷年' : filterSem;
            link.download = `實習課程清單_${filenameSem}_${new Date().toISOString().split('T')[0]}.csv`; link.click();
        };

        window.handleImport = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const btn = document.getElementById('btn-import');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin text-blue-600"></i> 匯入中...';
            btn.disabled = true;

            const reader = new FileReader();
            reader.onload = async (event) => {
                try {
                    const rows = event.target.result.split('\n').map(row => row.trim()).filter(row => row);
                    let addedCount = 0;
                    
                    for (let i = 1; i < rows.length; i++) {
                        const cols = rows[i].split(',').map(col => col.replace(/(^"|"$)/g, '').trim());
                        if (cols.length >= 9) {
                            const payload = {
                                academic_year: cols[0],
                                term: cols[1],
                                semester: `${cols[0]}-${cols[1]}`, 
                                edu_system: cols[2],
                                college: cols[3],
                                department: cols[4],
                                course_code: cols[5],
                                course_name: cols[6],
                                course_type: cols[7],
                                credits: Number(cols[8]) || 0,
                                created_at: serverTimestamp()
                            };
                            
                            await addDoc(dataCollection, payload);
                            addedCount++;
                        }
                    }
                    alert(`✅ 成功匯入 ${addedCount} 筆課程資料！`);
                } catch (error) { alert("匯入失敗，請確認 CSV 檔案格式是否正確。\n" + error.message); } 
                finally { btn.innerHTML = originalHtml; btn.disabled = false; e.target.value = ''; }
            };
            reader.readAsText(file);
        };

        window.submitForm = async () => {
            const btn = document.getElementById('btn-submit');
            
            const year = document.getElementById('input-academic-year').value.trim();
            const term = document.getElementById('input-term').value.trim();

            const payload = { 
                academic_year: year,
                term: term,
                semester: `${year}-${term}`,
                college: document.getElementById('input-college').value,
                department: document.getElementById('input-department').value,
                course_code: document.getElementById('input-course-code').value.trim(),
                course_name: document.getElementById('input-course-name').value.trim(),
                edu_system: document.getElementById('input-edu-system').value,
                course_type: document.getElementById('input-course-type').value,
                credits: Number(document.getElementById('input-credits').value)
            };

            if(!payload.academic_year || !payload.term || !payload.college || !payload.department || !payload.course_code || !payload.course_name) { 
                alert("請填寫所有必填欄位！"); return; 
            }

            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> 儲存中...';
            try {
                if (editingId) { 
                    await updateDoc(doc(db, "internship_courses", editingId), { ...payload, updated_at: serverTimestamp() }); 
                } else {
                    await addDoc(dataCollection, { ...payload, created_at: serverTimestamp() });
                }
                closeModal();
            } catch (err) { alert("儲存發生錯誤：" + err.message); } 
            finally { btn.disabled = false; btn.innerText = '儲存課程'; }
        };

        window.editData = (id) => {
            const docData = allData.find(d => d.id === id);
            if (!docData) return;
            
            editingId = id;
            document.getElementById('input-academic-year').value = docData.academic_year || '';
            document.getElementById('input-term').value = docData.term || '';

            document.getElementById('input-college').value = docData.college || '';
            updateFormDepts(docData.department); 
            
            document.getElementById('input-course-code').value = docData.course_code || '';
            document.getElementById('input-course-name').value = docData.course_name || ''; 
            document.getElementById('input-edu-system').value = docData.edu_system || '學士班'; 
            document.getElementById('input-course-type').value = docData.course_type || '必修'; 
            document.getElementById('input-credits').value = docData.credits || 0; 

            document.getElementById('modal-title').innerHTML = '<i class="fa-solid fa-pen text-blue-600"></i> 編輯實習課程';
            document.getElementById('data-modal').classList.remove('hidden');
        };

        window.deleteData = async (id, name) => {
            if (confirm(`警告：確定要刪除課程「${name}」嗎？\n(注意：若已有學生選修此課程，刪除可能會導致紀錄無法對應)`)) {
                await deleteDoc(doc(db, "internship_courses", id));
                if (currentPage > Math.ceil((allData.length - 1) / itemsPerPage) || 1) currentPage = Math.ceil((allData.length - 1) / itemsPerPage) || 1;
                renderTable();
            }
        };

    </script>
</body>
</html>
