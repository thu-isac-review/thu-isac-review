<!DOCTYPE html>
<html lang="zh-TW" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISAC 實習文件書審查核系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 使用 Import Map 定義模組路徑，解決 Failed to resolve module specifier "react" 錯誤 -->
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom": "https://esm.sh/react-dom@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client"
        }
      }
    </script>
    
    <!-- 載入 Babel 翻譯機 -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        html, body, #root { height: 100%; margin: 0; background-color: #f8fafc; overflow: hidden; }
        * { font-family: "SF Pro TC", "PingFang TC", "Noto Sans TC", sans-serif !important; }
        iframe { border: none; width: 100%; height: 100%; }
        
        /* 自定義滾動條 */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import ReactDOM from 'react-dom/client';
        import { 
            LayoutDashboard, 
            Building2, 
            Users, 
            ShieldCheck, 
            LogOut, 
            Loader2 
        } from 'https://esm.sh/lucide-react@0.344.0?external=react';
        
        // 載入 Firebase 核心套件
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { 
            getAuth, 
            onAuthStateChanged, 
            signOut, 
            signInWithEmailAndPassword 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Firebase 設定資訊
        const firebaseConfig = {
            apiKey: "AIzaSyDcsGfvVKnGmCzWfK5F03saydFpNc1ReYY",
            authDomain: "thu-isac-review.firebaseapp.com",
            projectId: "thu-isac-review",
            storageBucket: "thu-isac-review.firebasestorage.app",
            messagingSenderId: "453299876735",
            appId: "1:453299876735:web:1d8babca3315423161a04a"
        };

        // 初始化 Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            // 預設內容網址
            const [contentUrl, setContentUrl] = useState('/dashboard-content.html'); 

            // 監聽登入狀態
            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            // 登出處理
            const handleLogout = () => {
                if (window.confirm("確定要登出系統嗎？")) {
                    signOut(auth);
                }
            };

            if (loading) {
                return (
                    <div className="h-full flex flex-col items-center justify-center bg-slate-50 gap-4">
                        <Loader2 className="animate-spin text-blue-600 w-10 h-10" />
                        <p className="text-slate-400 font-bold">系統安全載入中...</p>
                    </div>
                );
            }

            if (!user) return <LoginView />;

            return (
                <div className="flex h-full overflow-hidden">
                    {/* 統一的側邊導航欄 */}
                    <aside className="w-64 bg-[#0f172a] text-slate-400 flex flex-col shrink-0 shadow-2xl z-20">
                        <div className="h-20 flex items-center px-8 border-b border-slate-800/50">
                            <div className="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center mr-3 shadow-lg shadow-blue-500/20">
                                <ShieldCheck className="text-white" size={20} />
                            </div>
                            <span className="text-white font-black text-lg tracking-tight">ISAC 審查中心</span>
                        </div>
                        
                        <nav className="flex-1 p-4 space-y-2 mt-4">
                            <div className="px-4 mb-2 text-[10px] font-black text-slate-600 uppercase tracking-widest">業務主檔</div>
                            <MenuBtn 
                                active={contentUrl === '/dashboard-content.html'} 
                                label="總覽儀表板" 
                                icon={<LayoutDashboard size={18}/>} 
                                onClick={() => setContentUrl('/dashboard-content.html')} 
                            />
                            <MenuBtn 
                                active={contentUrl === '/list.html'} 
                                label="待查核名單" 
                                icon={<Users size={18}/>} 
                                onClick={() => setContentUrl('/list.html')} 
                            />
                            
                            <div className="px-4 mt-8 mb-2 text-[10px] font-black text-slate-600 uppercase tracking-widest">系統設定</div>
                            <MenuBtn 
                                active={contentUrl === '/manage/departments.html'} 
                                label="系所管理" 
                                icon={<Building2 size={18}/>} 
                                onClick={() => setContentUrl('/manage/departments.html')} 
                            />
                        </nav>

                        {/* 使用者資訊與登出 */}
                        <div className="p-4 border-t border-slate-800/50">
                            <div className="flex items-center gap-3 p-3 rounded-2xl bg-slate-800/30 border border-slate-700/30">
                                <div className="w-9 h-9 rounded-full bg-blue-500 flex items-center justify-center text-white font-black text-[10px]">AD</div>
                                <div className="flex-1 overflow-hidden">
                                    <div className="text-[11px] font-bold text-white truncate">管理者</div>
                                    <div className="text-[9px] text-slate-500 truncate font-mono">{user.email}</div>
                                </div>
                                <button onClick={handleLogout} className="text-slate-500 hover:text-rose-400 transition-colors">
                                    <LogOut size={16} />
                                </button>
                            </div>
                        </div>
                    </aside>

                    {/* 主要內容顯示區 (Iframe 模式) */}
                    <div className="flex-1 flex flex-col min-w-0">
                        <header className="h-20 bg-white border-b border-slate-200 flex items-center justify-between px-8 shrink-0 z-10">
                            <h2 className="font-black text-slate-800 text-lg">
                                {contentUrl === '/dashboard-content.html' ? '總覽儀表板' : 
                                 contentUrl === '/list.html' ? '學生待查核名單' : '系所清單管理'}
                            </h2>
                            <div className="flex items-center gap-4 text-slate-400">
                                <span className="text-xs font-bold bg-slate-100 px-3 py-1 rounded-full border border-slate-200">114-1 學年度</span>
                            </div>
                        </header>
                        
                        <div className="flex-1 bg-slate-50 relative">
                            {/* 根據選單切換 src，使用 key 強制重新渲染以確保頁面載入狀態 */}
                            <iframe 
                                src={contentUrl} 
                                key={contentUrl} 
                                className="w-full h-full"
                                title="Content View"
                            />
                        </div>
                    </div>
                </div>
            );
        }

        // 側邊欄按鈕元件
        function MenuBtn({ active, label, icon, onClick }) {
            return (
                <button 
                    onClick={onClick} 
                    className={`w-full flex items-center px-4 py-3 rounded-2xl text-sm font-bold transition-all duration-200 ${
                        active 
                        ? 'bg-blue-600 text-white shadow-lg shadow-blue-600/20' 
                        : 'text-slate-400 hover:bg-slate-800 hover:text-slate-200'
                    }`}
                >
                    <span className="mr-3 opacity-80">{icon}</span>
                    <span className="tracking-tight">{label}</span>
                </button>
            );
        }

        // 登入介面元件
        function LoginView() {
            const [isLoggingIn, setIsLoggingIn] = useState(false);

            const handleLogin = async (e) => {
                e.preventDefault();
                setIsLoggingIn(true);
                const email = e.target.email.value;
                const pw = e.target.password.value;
                
                try {
                    await signInWithEmailAndPassword(auth, email, pw);
                } catch (err) {
                    alert("登入失敗：帳號或密碼錯誤。");
                } finally {
                    setIsLoggingIn(false);
                }
            };

            return (
                <div className="h-full flex items-center justify-center bg-slate-50 p-4">
                    <form onSubmit={handleLogin} className="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-slate-100 space-y-6">
                        <div className="flex flex-col items-center mb-8">
                            <div className="w-16 h-16 rounded-[1.5rem] bg-blue-600 flex items-center justify-center mb-4 text-white shadow-xl shadow-blue-200">
                                <ShieldCheck size={32} />
                            </div>
                            <h1 className="text-2xl font-black text-slate-800">ISAC 審查管理系統</h1>
                            <p className="text-slate-400 text-sm mt-2 font-medium">請登入帳號以開始作業</p>
                        </div>
                        
                        <div className="space-y-4">
                            <div>
                                <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 px-1">Email</label>
                                <input name="email" type="email" placeholder="admin@example.com" className="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl outline-none focus:ring-4 focus:ring-blue-100 focus:bg-white transition-all text-sm" required />
                            </div>
                            <div>
                                <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 px-1">Password</label>
                                <input name="password" type="password" placeholder="••••••••" className="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl outline-none focus:ring-4 focus:ring-blue-100 focus:bg-white transition-all text-sm" required />
                            </div>
                        </div>

                        <button 
                            disabled={isLoggingIn}
                            className="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-black shadow-xl shadow-blue-100 transition-all active:scale-[0.98] disabled:opacity-50"
                        >
                            {isLoggingIn ? "身分驗證中..." : "進入系統"}
                        </button>
                    </form>
                </div>
            );
        }

        // 初始化渲染
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
