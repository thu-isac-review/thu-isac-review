<!DOCTYPE html>
<html lang="zh-TW" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ISAC 實習文件書審查核平台</title>
    
    <!-- 1. 核心套件載入 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom": "https://esm.sh/react-dom@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client"
        }
      }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f5fa',
                            100: '#e1ebf4',
                            500: '#2c75b3',
                            600: '#1a5c96',
                            700: '#004785', // 東海藍
                            800: '#003666',
                            900: '#002244',
                        },
                        sidebar: '#0f172a',
                    },
                    boxShadow: {
                        'card': '0 1px 3px 0 rgba(0, 0, 0, 0.05), 0 1px 2px -1px rgba(0, 0, 0, 0.03)',
                        'float': '0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -4px rgba(0, 0, 0, 0.05)',
                    }
                }
            }
        }
    </script>

    <style>
        html, body, #root { height: 100%; margin: 0; padding: 0; background-color: #f8fafc; overflow: hidden; }
        * {
            font-family: "SF Pro TC", "SF Pro Display", "PingFang TC", "Noto Sans TC", sans-serif !important;
            -webkit-font-smoothing: antialiased;
        }

        /* 側邊欄選中狀態還原 */
        .sidebar-item.active { background-color: rgba(255, 255, 255, 0.1); color: #ffffff; border-left: 3px solid #3b82f6; }
        .sidebar-item { border-left: 3px solid transparent; transition: all 0.2s ease; cursor: pointer; }
        .sidebar-item:hover:not(.active) { background-color: rgba(255, 255, 255, 0.05); color: #f8fafc; }

        iframe { border: none; width: 100%; height: 100%; background: transparent; }
        
        /* 滾動條美化 */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import ReactDOM from 'react-dom/client';
        
        // 載入 Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDcsGfvVKnGmCzWfK5F03saydFpNc1ReYY",
            authDomain: "thu-isac-review.firebaseapp.com",
            projectId: "thu-isac-review",
            storageBucket: "thu-isac-review.firebasestorage.app",
            messagingSenderId: "453299876735",
            appId: "1:453299876735:web:1d8babca3315423161a04a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [contentUrl, setContentUrl] = useState('/dashboard-content.html'); 

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            const handleLogout = () => {
                if (window.confirm("確定要登出系統嗎？")) {
                    signOut(auth);
                }
            };

            if (loading) return (
                <div className="h-full flex items-center justify-center bg-slate-50">
                    <div className="flex flex-col items-center gap-4">
                        <div className="w-12 h-12 border-4 border-blue-100 border-t-blue-600 rounded-full animate-spin"></div>
                        <p className="text-slate-400 font-bold text-sm">系統載入中...</p>
                    </div>
                </div>
            );

            if (!user) return <LoginView />;

            // 判斷當前標題
            const getPageTitle = () => {
                if (contentUrl.includes('dashboard')) return '總覽儀表板';
                if (contentUrl.includes('list')) return '學生待查核名單';
                if (contentUrl.includes('departments')) return '系所清單管理';
                return 'ISAC 審查中心';
            };

            return (
                <div className="flex h-full overflow-hidden text-slate-800">
                    {/* --- 還原：左側深色導航欄 --- */}
                    <aside className="w-64 bg-sidebar text-slate-300 flex flex-col shrink-0 z-20 shadow-xl">
                        <div className="h-16 flex items-center px-6 border-b border-slate-700/50">
                            <div className="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center mr-3 shadow-md">
                                <i className="ph-bold ph-shield-check text-white text-lg"></i>
                            </div>
                            <span className="text-white font-bold text-lg tracking-wide">ISAC 審查中心</span>
                        </div>

                        <div className="flex-1 overflow-y-auto py-4 custom-scrollbar">
                            <div className="px-6 mb-2 text-[10px] font-bold text-slate-500 uppercase tracking-widest">主要業務</div>
                            
                            <MenuBtn 
                                active={contentUrl === '/dashboard-content.html'} 
                                label="總覽儀表板" 
                                icon="ph-fill ph-squares-four" 
                                onClick={() => setContentUrl('/dashboard-content.html')} 
                            />
                            
                            <MenuBtn 
                                active={contentUrl === '/list.html'} 
                                label="學生待查核名單" 
                                icon="ph-fill ph-users-three" 
                                onClick={() => setContentUrl('/list.html')} 
                            />

                            <div className="px-6 mt-8 mb-2 text-[10px] font-bold text-slate-500 uppercase tracking-widest">設定與維護</div>
                            
                            <MenuBtn 
                                active={contentUrl === '/manage/departments.html'} 
                                label="系所清單管理" 
                                icon="ph-fill ph-buildings" 
                                onClick={() => setContentUrl('/manage/departments.html')} 
                            />
                            
                            <div className="sidebar-item w-full flex items-center px-6 py-3 text-sm font-medium mb-1 text-slate-500 opacity-50 cursor-not-allowed">
                                <i className="ph-fill ph-file-text text-xl mr-3 opacity-80"></i> 指標與表單設定
                            </div>
                        </div>

                        {/* --- 還原：底部使用者區塊 --- */}
                        <div className="p-4 border-t border-slate-700/50">
                            <div className="flex items-center gap-3 px-2 py-2 rounded-lg hover:bg-slate-800 transition-colors group">
                                <div className="w-9 h-9 rounded-full bg-gradient-to-tr from-blue-500 to-indigo-400 flex items-center justify-center text-white font-bold text-xs shadow-md">
                                    Ad
                                </div>
                                <div className="flex-1 overflow-hidden">
                                    <div className="text-sm font-bold text-white truncate">系統管理員</div>
                                    <div className="text-[10px] text-slate-500 truncate font-mono">{user.email}</div>
                                </div>
                                <button onClick={handleLogout} className="text-slate-500 hover:text-rose-400 transition-colors">
                                    <i className="ph-bold ph-sign-out text-lg"></i>
                                </button>
                            </div>
                        </div>
                    </aside>

                    {/* --- 還原：右側主要內容區 --- */}
                    <main className="flex-1 flex flex-col h-full relative overflow-hidden bg-slate-50">
                        <header className="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 shrink-0 z-10 shadow-sm">
                            <div className="flex items-center gap-4">
                                <h2 className="text-lg font-bold text-slate-800">{getPageTitle()}</h2>
                            </div>

                            <div className="flex items-center gap-6">
                                <div className="relative hidden lg:block">
                                    <i className="ph-bold ph-magnifying-glass absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                                    <input type="text" className="pl-9 pr-4 py-1.5 bg-slate-100 border-transparent rounded-lg text-sm focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all w-64" placeholder="搜尋系統內容..." />
                                </div>
                                <div className="h-6 w-px bg-slate-200"></div>
                                <div className="flex items-center gap-3">
                                    <span className="text-sm font-bold text-slate-700">114-1 學年度</span>
                                    <button className="relative w-9 h-9 flex items-center justify-center rounded-full hover:bg-slate-100 text-slate-500 transition-colors">
                                        <i className="ph-bold ph-bell text-lg"></i>
                                        <span className="absolute top-2 right-2 w-2 h-2 bg-rose-500 rounded-full border border-white"></span>
                                    </button>
                                </div>
                            </div>
                        </header>

                        {/* Iframe 內容載入區 */}
                        <div className="flex-1 overflow-hidden relative">
                            <iframe 
                                src={contentUrl} 
                                key={contentUrl}
                                className="animate-fade"
                            />
                        </div>
                    </main>
                </div>
            );
        }

        // 側邊欄按鈕子元件
        function MenuBtn({ active, label, icon, onClick }) {
            return (
                <div 
                    onClick={onClick} 
                    className={`sidebar-item w-full flex items-center px-6 py-3 text-sm font-medium mb-1 ${active ? 'active' : ''}`}
                >
                    <i className={`${icon} text-xl mr-3 ${active ? 'opacity-100' : 'opacity-80'}`}></i>
                    <span className="tracking-tight">{label}</span>
                </div>
            );
        }

        // 還原質感的登入頁面
        function LoginView() {
            const [isLoggingIn, setIsLoggingIn] = useState(false);
            const handleLogin = async (e) => {
                e.preventDefault();
                setIsLoggingIn(true);
                const email = e.target.email.value;
                const pw = e.target.password.value;
                try {
                    await signInWithEmailAndPassword(auth, email, pw);
                } catch (err) {
                    alert("登入失敗：請確認帳號密碼。");
                } finally {
                    setIsLoggingIn(false);
                }
            };

            return (
                <div className="h-full flex items-center justify-center bg-slate-50 p-4">
                    <form onSubmit={handleLogin} className="bg-white p-10 rounded-[2rem] shadow-2xl w-full max-w-md border border-slate-100 animate-fade">
                        <div className="flex flex-col items-center mb-8">
                            <div className="w-16 h-16 rounded-2xl bg-blue-600 flex items-center justify-center mb-4 text-white shadow-lg shadow-blue-500/20">
                                <i className="ph-bold ph-shield-check text-3xl"></i>
                            </div>
                            <h1 className="text-2xl font-black text-slate-800 tracking-tight">ISAC 審查管理系統</h1>
                            <p className="text-slate-400 text-sm mt-2 font-medium">請登入帳號以開始作業</p>
                        </div>
                        <div className="space-y-4">
                            <input name="email" type="email" placeholder="Email" className="w-full bg-slate-50 border border-slate-200 p-4 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm font-medium" required />
                            <input name="password" type="password" placeholder="Password" className="w-full bg-slate-50 border border-slate-200 p-4 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm font-medium" required />
                        </div>
                        <button disabled={isLoggingIn} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-bold shadow-xl transition-all mt-6 active:scale-[0.98] disabled:opacity-50">
                            {isLoggingIn ? "連線中..." : "進入系統"}
                        </button>
                    </form>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
