<!DOCTYPE html>
<html lang="zh-TW" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISAC 實習文件書審查核系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 使用 Import Map 定義模組路徑 -->
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom": "https://esm.sh/react-dom@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client"
        }
      }
    </script>
    
    <!-- 載入 Babel 翻譯機 -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f5fa',
                            100: '#e1ebf4',
                            500: '#2c75b3',
                            600: '#1a5c96',
                            700: '#004785', // 東海藍
                            800: '#003666',
                            900: '#002244',
                        },
                        sidebar: '#0f172a', // 深邃側邊欄
                    },
                    boxShadow: {
                        'card': '0 1px 3px 0 rgba(0, 0, 0, 0.05), 0 1px 2px -1px rgba(0, 0, 0, 0.03)',
                        'float': '0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -4px rgba(0, 0, 0, 0.05)',
                    }
                }
            }
        }
    </script>
    
    <style>
        html, body, #root { height: 100%; margin: 0; background-color: #f8fafc; overflow: hidden; }
        * { font-family: "SF Pro TC", "SF Pro Display", "PingFang TC", "Noto Sans TC", sans-serif !important; -webkit-font-smoothing: antialiased; }
        iframe { border: none; width: 100%; height: 100%; }
        
        /* 自定義滾動條 */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import ReactDOM from 'react-dom/client';
        import { 
            LayoutDashboard, 
            Building2, 
            Users, 
            ShieldCheck, 
            LogOut, 
            Loader2,
            Search,
            Bell,
            FileText
        } from 'https://esm.sh/lucide-react@0.344.0?external=react';
        
        // 載入 Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { 
            getAuth, 
            onAuthStateChanged, 
            signOut, 
            signInWithEmailAndPassword 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Firebase 設定
        const firebaseConfig = {
            apiKey: "AIzaSyDcsGfvVKnGmCzWfK5F03saydFpNc1ReYY",
            authDomain: "thu-isac-review.firebaseapp.com",
            projectId: "thu-isac-review",
            storageBucket: "thu-isac-review.firebasestorage.app",
            messagingSenderId: "453299876735",
            appId: "1:453299876735:web:1d8babca3315423161a04a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [contentUrl, setContentUrl] = useState('/dashboard-content.html'); 

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            const handleLogout = () => {
                if (window.confirm("確定要登出系統嗎？")) {
                    signOut(auth);
                }
            };

            if (loading) {
                return (
                    <div className="h-full flex flex-col items-center justify-center bg-slate-50 gap-4">
                        <Loader2 className="animate-spin text-blue-600 w-10 h-10" />
                        <p className="text-slate-400 font-bold">安全連線中...</p>
                    </div>
                );
            }

            if (!user) return <LoginView />;

            return (
                <div className="flex h-full overflow-hidden">
                    {/* 還原：深邃側邊欄 */}
                    <aside className="w-64 bg-sidebar text-slate-300 flex flex-col shrink-0 shadow-2xl z-20">
                        <div className="h-16 flex items-center px-6 border-b border-slate-700/50">
                            <div className="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center mr-3 shadow-md shadow-blue-500/20">
                                <ShieldCheck className="text-white" size={18} />
                            </div>
                            <span className="text-white font-bold text-lg tracking-wide">ISAC 審查中心</span>
                        </div>
                        
                        <nav className="flex-1 p-4 space-y-1 overflow-y-auto custom-scrollbar">
                            <div className="px-4 mb-2 mt-2 text-[10px] font-bold text-slate-500 uppercase tracking-widest">主要業務</div>
                            <MenuBtn 
                                active={contentUrl === '/dashboard-content.html'} 
                                label="總覽儀表板" 
                                icon={<LayoutDashboard size={20}/>} 
                                onClick={() => setContentUrl('/dashboard-content.html')} 
                            />
                            
                            <div className="px-4 mt-8 mb-2 text-[10px] font-bold text-slate-500 uppercase tracking-widest">審查項目設定</div>
                            <MenuBtn 
                                active={contentUrl === '/manage/docs_setting.html'} 
                                label="制度型文件設定" 
                                icon={<FileText size={20}/>} 
                                onClick={() => setContentUrl('/manage/docs_setting.html')} 
                            />

                            <div className="px-4 mt-8 mb-2 text-[10px] font-bold text-slate-500 uppercase tracking-widest">系統設定</div>
                            <MenuBtn 
                                active={contentUrl === '/manage/departments.html'} 
                                label="系所清單管理" 
                                icon={<Building2 size={20}/>} 
                                onClick={() => setContentUrl('/manage/departments.html')} 
                            />
                            <MenuBtn 
                                active={contentUrl === '/manage/roles.html'} 
                                label="用戶權限管理" 
                                icon={<Users size={20}/>} 
                                onClick={() => setContentUrl('/manage/roles.html')} 
                            />
                        </nav>

                        {/* 還原：左下角精美用戶資訊 */}
                        <div className="p-4 border-t border-slate-700/50">
                            <div className="flex items-center gap-3 p-2 rounded-xl hover:bg-slate-800 transition-colors group cursor-pointer">
                                <div className="w-9 h-9 rounded-full bg-gradient-to-tr from-blue-500 to-indigo-400 flex items-center justify-center text-white font-bold text-xs shadow-md">
                                    Ad
                                </div>
                                <div className="flex-1 overflow-hidden">
                                    <div className="text-sm font-bold text-white truncate">系統管理員</div>
                                    <div className="text-[10px] text-slate-500 truncate font-mono">{user.email}</div>
                                </div>
                                <button onClick={handleLogout} className="text-slate-500 hover:text-rose-400 transition-colors">
                                    <LogOut size={16} />
                                </button>
                            </div>
                        </div>
                    </aside>

                    {/* 主要內容區 */}
                    <div className="flex-1 flex flex-col min-w-0">
                        {/* 還原：導覽列設計 */}
                        <header className="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 shrink-0 z-10 shadow-sm">
                            <h2 className="font-bold text-slate-800 text-lg">
                                {contentUrl === '/dashboard-content.html' ? '總覽儀表板' : 
                                 contentUrl === '/manage/docs_setting.html' ? '制度型文件設定' : 
                                 contentUrl === '/manage/departments.html' ? '系所清單管理' : 
                                 contentUrl === '/manage/roles.html' ? '用戶權限管理' : 'ISAC 審查中心'}
                            </h2>
                            <div className="flex items-center gap-6">
                                <div className="relative hidden lg:block">
                                    <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={16} />
                                    <input className="pl-9 pr-4 py-1.5 bg-slate-100 border-transparent rounded-lg text-sm focus:bg-white focus:ring-2 focus:ring-blue-100 transition-all w-64 outline-none" placeholder="搜尋系統內容..." />
                                </div>
                                <div className="h-6 w-px bg-slate-200"></div>
                                <div className="text-sm font-bold text-slate-700 flex items-center gap-2 cursor-pointer">
                                    114-1 學年度 <Bell size={18} className="text-slate-400" />
                                </div>
                            </div>
                        </header>
                        
                        <div className="flex-1 bg-slate-50">
                            <iframe 
                                src={contentUrl} 
                                key={contentUrl} 
                                className="w-full h-full"
                                title="Content View"
                            />
                        </div>
                    </div>
                </div>
            );
        }

        function MenuBtn({ active, label, icon, onClick, disabled }) {
            if (disabled) {
                return (
                    <div className="w-full flex items-center px-4 py-3 text-slate-600 opacity-50 cursor-not-allowed">
                        <span className="mr-3">{icon}</span>
                        <span className="text-sm font-medium">{label}</span>
                    </div>
                );
            }
            return (
                <button 
                    onClick={onClick} 
                    className={`w-full flex items-center px-4 py-3 rounded-xl text-sm font-medium transition-all duration-200 border-l-4 ${
                        active 
                        ? 'bg-white/10 text-white border-blue-500 font-bold' 
                        : 'text-slate-400 border-transparent hover:bg-white/5 hover:text-slate-200'
                    }`}
                >
                    <span className={`mr-3 ${active ? 'opacity-100' : 'opacity-70'}`}>{icon}</span>
                    <span className="tracking-tight">{label}</span>
                </button>
            );
        }

        function LoginView() {
            const [isLoggingIn, setIsLoggingIn] = useState(false);
            const handleLogin = async (e) => {
                e.preventDefault();
                setIsLoggingIn(true);
                const email = e.target.email.value;
                const pw = e.target.password.value;
                try {
                    await signInWithEmailAndPassword(auth, email, pw);
                } catch (err) {
                    alert("登入失敗：帳號或密碼錯誤。");
                } finally {
                    setIsLoggingIn(false);
                }
            };

            return (
                <div className="h-full flex items-center justify-center bg-slate-50 p-4">
                    <form onSubmit={handleLogin} className="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-slate-100 space-y-6">
                        <div className="flex flex-col items-center mb-6">
                            <div className="w-16 h-16 rounded-2xl bg-blue-600 flex items-center justify-center mb-4 text-white shadow-xl shadow-blue-500/20">
                                <ShieldCheck size={32} />
                            </div>
                            <h1 className="text-2xl font-black text-slate-800">ISAC 審查管理系統</h1>
                            <p className="text-slate-400 text-sm mt-2 font-medium">請登入您的帳號以開始作業</p>
                        </div>
                        <div className="space-y-4">
                            <input name="email" type="email" placeholder="Email" className="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl outline-none focus:ring-4 focus:ring-blue-100 focus:bg-white transition-all text-sm font-medium" required />
                            <input name="password" type="password" placeholder="Password" className="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl outline-none focus:ring-4 focus:ring-blue-100 focus:bg-white transition-all text-sm" required />
                        </div>
                        <button disabled={isLoggingIn} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold shadow-xl shadow-blue-500/20 transition-all disabled:opacity-50">
                            {isLoggingIn ? "正在連線資料庫..." : "進入系統"}
                        </button>
                    </form>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
