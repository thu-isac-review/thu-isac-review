<!DOCTYPE html>
<html lang="zh-TW" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>實習課程書面審查作業系統 - 東海大學實習中心</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom": "https://esm.sh/react-dom@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client"
        }
      }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f5fa', 100: '#e1ebf4', 500: '#2c75b3', 600: '#1a5c96', 700: '#004785', 800: '#003666', 900: '#002244'
                        },
                        sidebar: '#0f172a',
                    }
                }
            }
        }
    </script>

    <style>
        html, #root { height: 100%; margin: 0; padding: 0; background-color: #f8fafc; overflow: hidden; }
        
        body { 
            height: 100%; margin: 0; padding: 0; background-color: #f8fafc; overflow: hidden;
            font-family: "SF Pro TC", "SF Pro Display", "PingFang TC", "Noto Sans TC", sans-serif; 
            -webkit-font-smoothing: antialiased; 
        }

        .sidebar-item.active { background-color: rgba(255, 255, 255, 0.1); color: #ffffff; border-left: 3px solid #3b82f6; font-weight: bold;}
        .sidebar-item { border-left: 3px solid transparent; transition: all 0.2s ease; cursor: pointer; }
        .sidebar-item:hover:not(.active) { background-color: rgba(255, 255, 255, 0.05); color: #f8fafc; }

        iframe { border: none; width: 100%; height: 100%; background: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import ReactDOM from 'react-dom/client';
        
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, updatePassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDcsGfvVKnGmCzWfK5F03saydFpNc1ReYY",
            authDomain: "thu-isac-review.firebaseapp.com",
            projectId: "thu-isac-review",
            storageBucket: "thu-isac-review.firebasestorage.app",
            messagingSenderId: "453299876735",
            appId: "1:453299876735:web:1d8babca3315423161a04a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function App() {
            const [user, setUser] = useState(null);
            const [userData, setUserData] = useState(null); 
            const [loading, setLoading] = useState(true);
            const [currentHash, setCurrentHash] = useState(''); 
            
            // 💡 解除網址參數強制綁定：只附加快取清除參數
            const getCacheBustedUrl = (url) => {
                if (!url) return '';
                const [path, queryStr] = url.split('?');
                let finalUrl = `${path}?v=${new Date().getTime()}`;
                if (queryStr) finalUrl += `&${queryStr}`;
                return finalUrl;
            };

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, async (u) => {
                    if (u) {
                        setUser(u);
                        try {
                            const userDoc = await getDoc(doc(db, "users", u.uid));
                            if(userDoc.exists()) {
                                setUserData(userDoc.data());
                            } else if (u.email === 'thu.isac.review@gmail.com') {
                                setUserData({
                                    level1Unit: '系統管理中心',
                                    level2Unit: '核心維運組',
                                    jobTitle: '管理員',
                                    name: '預設管理者',
                                    isFirstLogin: false
                                });
                            }
                        } catch (err) {
                            console.error("載入資料失敗", err);
                        }
                        setLoading(false);
                    } else {
                        setUser(null);
                        setUserData(null);
                        setLoading(false);
                    }
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                const handleHashChange = () => {
                    let hash = window.location.hash.replace('#', '');
                    if (!hash) {
                        hash = '/dashboard-content.html';
                        window.history.replaceState(null, null, '#' + hash);
                    }
                    setCurrentHash(hash);
                };
                
                window.addEventListener('hashchange', handleHashChange);
                handleHashChange(); 
                
                return () => window.removeEventListener('hashchange', handleHashChange);
            }, []);

            const navigate = (path) => {
                window.location.hash = path;
            };

            const handleLogout = () => {
                if (window.confirm("確定要登出系統嗎？")) {
                    signOut(auth);
                }
            };

            if (loading) return (
                <div className="h-full flex items-center justify-center bg-slate-50">
                    <div className="flex flex-col items-center gap-4">
                        <i className="fa-solid fa-circle-notch fa-spin text-4xl text-blue-600"></i>
                        <p className="text-slate-400 font-bold text-sm">系統載入中...</p>
                    </div>
                </div>
            );

            if (!user) return <LoginView />;

            if (userData?.isFirstLogin) {
                return <FirstTimeSetupView user={user} onComplete={() => setUserData({...userData, isFirstLogin: false})} />;
            }

            const getPageTitle = () => {
                if (currentHash.includes('dashboard')) return '首頁';
                if (currentHash.includes('list')) return '審查作業 / 學生待查核名單';
                
                if (currentHash.includes('review/department')) return '審查作業 / 系所審查作業';
                if (currentHash.includes('review/school')) return '審查作業 / 校級審查作業';
                
                if (currentHash.includes('intern_view/course')) return '實習資料瀏覽 / 實習課程清單';
                if (currentHash.includes('intern_view/students')) return '實習資料瀏覽 / 實習學生清單';
                if (currentHash.includes('intern_view/institution')) return '實習資料瀏覽 / 實習機構清單';
                if (currentHash.includes('intern_view/intern')) return '實習資料瀏覽 / 實習記錄清單';
                
                if (currentHash.includes('intern_manage/course')) return '實習資料管理 / 實習課程管理';
                if (currentHash.includes('intern_manage/students')) return '實習資料管理 / 實習學生管理';
                if (currentHash.includes('intern_manage/institution')) return '實習資料管理 / 實習機構管理';
                if (currentHash.includes('intern_manage/intern')) return '實習資料管理 / 實習記錄管理';

                if (currentHash.includes('moe-indicators')) return '審查項目設定 / 教育部審查指標設定';
                if (currentHash.includes('administrative_files')) return '審查項目設定 / 行政文件審查設定';
                if (currentHash.includes('students_files')) return '審查項目設定 / 學生文件審查設定';
                if (currentHash.includes('institution_files')) return '審查項目設定 / 機構文件審查設定';
                if (currentHash.includes('other_files')) return '審查項目設定 / 其他文件審查設定';
                
                if (currentHash.includes('departments')) return '系統設定 / 系所清單管理';
                if (currentHash.includes('roles')) return '系統設定 / 用戶權限管理';
                
                return '實習課程書面審查作業系統';
            };

            return (
                <div className="flex h-full overflow-hidden text-slate-800">
                    <aside className="w-72 bg-sidebar text-slate-300 flex flex-col shrink-0 z-20 shadow-xl">
                        {/* 系統標題品牌區塊 */}
                        <div className="h-auto py-4 flex items-center px-6 border-b border-slate-700/50 cursor-pointer shrink-0">
                            <div className="w-10 h-10 rounded-lg bg-blue-600 flex items-center justify-center mr-3 shadow-md shrink-0">
                                <i className="fa-solid fa-shield-halved text-white text-xl"></i>
                            </div>
                            <div className="flex flex-col">
                                <span className="text-blue-300 font-bold text-[10px] tracking-widest mb-0.5">東海大學 實習與學生成就中心</span>
                                <span className="text-white font-bold text-sm tracking-wide leading-tight">實習課程書面審查作業系統</span>
                            </div>
                        </div>

                        {/* 💡 已移除原先的全域學期切換區塊 */}

                        <div className="flex-1 overflow-y-auto py-4 custom-scrollbar">
                            <MenuBtn active={currentHash === '/dashboard-content.html'} label="首頁" icon="fa-solid fa-house" onClick={() => navigate('/dashboard-content.html')} />
                            
                            <div className="px-6 mt-6 mb-2 text-[10px] font-black text-slate-500 uppercase tracking-widest">審查作業</div>
                            <MenuBtn active={currentHash === '/list.html'} label="學生待查核名單" icon="fa-solid fa-user-check" onClick={() => navigate('/list.html')} />
                            <MenuBtn active={currentHash === '/review/department.html'} label="系所審查作業" icon="fa-solid fa-building-user" onClick={() => navigate('/review/department.html')} />
                            <MenuBtn active={currentHash === '/review/school.html'} label="校級審查作業" icon="fa-solid fa-building-columns" onClick={() => navigate('/review/school.html')} />
                            
                            <div className="px-6 mt-6 mb-2 text-[10px] font-black text-slate-500 uppercase tracking-widest">實習資料瀏覽</div>
                            <MenuBtn active={currentHash === '/intern_view/course.html'} label="實習課程清單" icon="fa-solid fa-book" onClick={() => navigate('/intern_view/course.html')} />
                            <MenuBtn active={currentHash === '/intern_view/students.html'} label="實習學生清單" icon="fa-solid fa-address-book" onClick={() => navigate('/intern_view/students.html')} />
                            <MenuBtn active={currentHash === '/intern_view/institution.html'} label="實習機構清單" icon="fa-solid fa-building" onClick={() => navigate('/intern_view/institution.html')} />
                            <MenuBtn active={currentHash === '/intern_view/intern.html'} label="實習記錄清單" icon="fa-solid fa-clipboard-list" onClick={() => navigate('/intern_view/intern.html')} />
                            
                            <div className="px-6 mt-6 mb-2 text-[10px] font-black text-slate-500 uppercase tracking-widest">實習資料管理</div>
                            <MenuBtn active={currentHash === '/intern_manage/course.html'} label="實習課程管理" icon="fa-solid fa-book" onClick={() => navigate('/intern_manage/course.html')} />
                            <MenuBtn active={currentHash === '/intern_manage/students.html'} label="實習學生管理" icon="fa-solid fa-user-gear" onClick={() => navigate('/intern_manage/students.html')} />
                            <MenuBtn active={currentHash === '/intern_manage/institution.html'} label="實習機構管理" icon="fa-solid fa-building" onClick={() => navigate('/intern_manage/institution.html')} />
                            <MenuBtn active={currentHash === '/intern_manage/intern.html'} label="實習記錄管理" icon="fa-solid fa-clipboard-check" onClick={() => navigate('/intern_manage/intern.html')} />
                            
                            <div className="px-6 mt-6 mb-2 text-[10px] font-black text-slate-500 uppercase tracking-widest">審查項目設定</div>
                            <MenuBtn active={currentHash === '/settings/moe-indicators.html'} label="教育部審查指標設定" icon="fa-solid fa-list-check" onClick={() => navigate('/settings/moe-indicators.html')} />
                            <MenuBtn active={currentHash === '/settings/administrative_files.html'} label="行政文件審查設定" icon="fa-solid fa-folder-closed" onClick={() => navigate('/settings/administrative_files.html')} />
                            <MenuBtn active={currentHash === '/settings/students_files.html'} label="學生文件審查設定" icon="fa-solid fa-file-lines" onClick={() => navigate('/settings/students_files.html')} />
                            <MenuBtn active={currentHash === '/settings/institution_files.html'} label="機構文件審查設定" icon="fa-solid fa-file-pen" onClick={() => navigate('/settings/institution_files.html')} />
                            <MenuBtn active={currentHash === '/settings/other_files.html'} label="其他文件審查設定" icon="fa-solid fa-file-circle-plus" onClick={() => navigate('/settings/other_files.html')} />
                            
                            <div className="px-6 mt-6 mb-2 text-[10px] font-black text-slate-500 uppercase tracking-widest">系統設定</div>
                            <MenuBtn active={currentHash === '/manage/departments.html'} label="系所清單管理" icon="fa-solid fa-graduation-cap" onClick={() => navigate('/manage/departments.html')} />
                            <MenuBtn active={currentHash === '/manage/roles.html'} label="用戶權限管理" icon="fa-solid fa-user-shield" onClick={() => navigate('/manage/roles.html')} />
                        </div>

                        <div className="p-4 border-t border-slate-700/50 shrink-0">
                            <div className="flex items-center gap-3 p-2 rounded-xl">
                                <div className="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-500 to-indigo-400 flex items-center justify-center text-white font-bold text-sm shadow-md shrink-0">
                                    {userData?.name ? userData.name.charAt(0) : 'U'}
                                </div>
                                <div className="flex-1 overflow-hidden">
                                    <div className="text-[10px] text-blue-300 font-bold truncate mb-0.5">
                                        {userData ? `${userData.level1Unit || '未設定'} | ${userData.level2Unit || '未設定'}` : '資料讀取中...'}
                                    </div>
                                    <div className="text-sm font-bold text-white truncate">
                                        {userData ? `${userData.jobTitle || '無'}  ${userData.name || '管理員'}` : '使用者'}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col h-full relative overflow-hidden bg-slate-50">
                        <header className="h-16 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-8 shrink-0 z-10 sticky top-0 shadow-sm">
                            <div className="flex items-center gap-4">
                                <h2 className="text-lg font-black text-slate-800">{getPageTitle()}</h2>
                            </div>
                            
                            <div className="flex items-center gap-5">
                                <i className="fa-solid fa-bell text-slate-400 text-lg cursor-pointer hover:text-blue-500 transition-colors ml-1"></i>
                                <div className="h-6 w-px bg-slate-200"></div>
                                <button onClick={handleLogout} className="bg-rose-500 hover:bg-rose-600 text-white border border-rose-600 px-4 py-1.5 rounded-lg text-sm font-bold transition-all flex items-center gap-2 shadow-sm active:scale-95" title="登出系統">
                                    <i className="fa-solid fa-arrow-right-from-bracket"></i> 登出
                                </button>
                            </div>
                        </header>

                        <div className="flex-1 overflow-hidden relative">
                            {currentHash && (
                                <iframe 
                                    src={getCacheBustedUrl(currentHash)} 
                                    key={currentHash}
                                    className="animate-fade w-full h-full"
                                    title="Content View"
                                />
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        function MenuBtn({ active, label, icon, onClick }) {
            return (
                <div onClick={onClick} className={`sidebar-item w-full flex items-center px-6 py-3.5 text-sm mb-1 ${active ? 'active' : 'font-medium'}`}>
                    <i className={`${icon} text-lg mr-3 ${active ? 'text-blue-400 opacity-100' : 'opacity-80'} w-5 text-center`}></i>
                    <span className="tracking-tight">{label}</span>
                </div>
            );
        }

        function FirstTimeSetupView({ user, onComplete }) {
            const [isUpdating, setIsUpdating] = useState(false);
            const [showPwd, setShowPwd] = useState(false);
            const [showConfirmPwd, setShowConfirmPwd] = useState(false);

            const handleUpdate = async (e) => {
                e.preventDefault();
                const pwd = e.target.password.value;
                const confirmPwd = e.target.confirmPassword.value;
                const pwdRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)[a-zA-Z\d]{8,20}$/;
                if (!pwdRegex.test(pwd)) {
                    alert("密碼不符合安全規則！\n請輸入 8~20 個字元，並包含至少一個「大寫字母」、一個「小寫字母」及「數字」。");
                    return;
                }
                if (pwd !== confirmPwd) {
                    alert("兩次輸入的密碼不相符，請重新確認！");
                    return;
                }
                setIsUpdating(true);
                try {
                    await updatePassword(user, pwd);
                    await updateDoc(doc(db, "users", user.uid), { isFirstLogin: false });
                    alert("✅ 專屬密碼設定成功！即將為您導向系統。");
                    onComplete();
                } catch (err) {
                    if (err.code === 'auth/requires-recent-login') {
                        alert("基於安全考量，請重新登入後再進行密碼設定。");
                        signOut(auth);
                    } else { alert("密碼設定失敗：" + err.message); }
                } finally { setIsUpdating(false); }
            };

            return (
                <div className="h-full flex items-center justify-center bg-slate-50 p-4">
                    <form onSubmit={handleUpdate} className="bg-white p-10 rounded-[2rem] shadow-2xl w-full max-w-md border border-slate-100 animate-fade">
                        <div className="flex flex-col items-center mb-8 text-center">
                            <div className="w-16 h-16 rounded-2xl bg-emerald-500 flex items-center justify-center mb-4 text-white shadow-lg shadow-emerald-500/20">
                                <i className="fa-solid fa-unlock-keyhole text-3xl"></i>
                            </div>
                            <h1 className="text-xl font-black text-slate-800 tracking-tight">初次啟用帳號</h1>
                            <p className="text-slate-500 text-sm mt-2 font-medium leading-relaxed">
                                歡迎加入實習書審平台！<br/>基於安全規範，請設定您的專屬登入密碼。
                            </p>
                        </div>
                        <div className="space-y-4">
                            <div>
                                <div className="relative">
                                    <input name="password" type={showPwd ? "text" : "password"} placeholder="設定新密碼" className="w-full bg-slate-50 border border-slate-200 px-4 py-3.5 pr-12 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm font-mono" required />
                                    <button type="button" onClick={() => setShowPwd(!showPwd)} className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors">
                                        <i className={`fa-solid ${showPwd ? 'fa-eye-slash' : 'fa-eye'} text-lg`}></i>
                                    </button>
                                </div>
                                <p className="text-[11px] text-slate-400 mt-2 ml-1"><i className="fa-solid fa-circle-info text-blue-500 mr-1"></i> 需為 8~20 碼，並包含大小寫字母與數字。</p>
                            </div>
                            <div className="relative">
                                <input name="confirmPassword" type={showConfirmPwd ? "text" : "password"} placeholder="再次確認新密碼" className="w-full bg-slate-50 border border-slate-200 px-4 py-3.5 pr-12 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm font-mono" required />
                                <button type="button" onClick={() => setShowConfirmPwd(!showConfirmPwd)} className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors">
                                    <i className={`fa-solid ${showConfirmPwd ? 'fa-eye-slash' : 'fa-eye'} text-lg`}></i>
                                </button>
                            </div>
                        </div>
                        <button disabled={isUpdating} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-3.5 rounded-xl font-bold shadow-xl transition-all mt-8 active:scale-[0.98] disabled:opacity-50 flex justify-center items-center gap-2">
                            {isUpdating ? <><i className="fa-solid fa-circle-notch fa-spin"></i> 設定中...</> : "確認設定並進入系統"}
                        </button>
                    </form>
                </div>
            );
        }

        function LoginView() {
            const [isLoggingIn, setIsLoggingIn] = useState(false);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [showPassword, setShowPassword] = useState(false);

            const handleLogin = async (e) => {
                e.preventDefault();
                setIsLoggingIn(true);
                let emailInput = email.trim();

                if (emailInput && !emailInput.includes('@')) {
                    const fullEmail = emailInput + '@thu.edu.tw';
                    setEmail(fullEmail); 
                    emailInput = fullEmail;
                }

                try {
                    await signInWithEmailAndPassword(auth, emailInput, password);
                } catch (err) {
                    alert("登入失敗：請確認帳號或密碼是否正確。\n(若為初次啟用，請使用管理員配發之初始密碼)");
                } finally { setIsLoggingIn(false); }
            };

            return (
                <div className="h-full flex items-center justify-center bg-slate-50 p-4">
                    <form onSubmit={handleLogin} className="bg-white p-10 rounded-[2rem] shadow-2xl w-full max-w-md border border-slate-100 animate-fade">
                        <div className="flex flex-col items-center mb-8 text-center">
                            <div className="w-16 h-16 rounded-2xl bg-blue-600 flex items-center justify-center mb-4 text-white shadow-lg shadow-blue-500/20">
                                <i className="fa-solid fa-shield-halved text-3xl"></i>
                            </div>
                            <h1 className="text-xl font-black text-slate-800 tracking-tight">東海大學 實習與學生成就中心</h1>
                            <p className="text-slate-500 text-sm mt-2 font-medium">實習課程書面審查作業系統</p>
                        </div>
                        <div className="space-y-4">
                            <input 
                                name="email" 
                                type="text" 
                                value={email}
                                onChange={(e) => setEmail(e.target.value)}
                                placeholder="請輸入帳號或電子郵件(@thu.edu.tw)" 
                                className="w-full bg-slate-50 border border-slate-200 p-4 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm font-medium" 
                                required 
                            />
                            <div className="relative">
                                <input 
                                    name="password" 
                                    type={showPassword ? "text" : "password"} 
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    placeholder="請輸入密碼" 
                                    className="w-full bg-slate-50 border border-slate-200 p-4 pr-12 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm font-medium" 
                                    required 
                                />
                                <button 
                                    type="button" 
                                    onClick={() => setShowPassword(!showPassword)} 
                                    className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors"
                                >
                                    <i className={`fa-solid ${showPassword ? 'fa-eye-slash' : 'fa-eye'} text-lg`}></i>
                                </button>
                            </div>
                        </div>
                        <button disabled={isLoggingIn} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-bold shadow-xl transition-all mt-8 active:scale-[0.98] disabled:opacity-50 flex justify-center items-center gap-2">
                            {isLoggingIn ? <><i className="fa-solid fa-circle-notch fa-spin"></i> 連線中...</> : "進入系統"}
                        </button>
                    </form>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
