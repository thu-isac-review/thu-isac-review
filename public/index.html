<!DOCTYPE html>
<html lang="zh-TW" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ISAC 實習文件書審查核平台</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom": "https://esm.sh/react-dom@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client"
        }
      }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 全面導入 Font Awesome 6.5.1 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f5fa', 100: '#e1ebf4', 500: '#2c75b3', 600: '#1a5c96', 700: '#004785', 800: '#003666', 900: '#002244'
                        },
                        sidebar: '#0f172a',
                    }
                }
            }
        }
    </script>

    <style>
        html, #root { height: 100%; margin: 0; padding: 0; background-color: #f8fafc; overflow: hidden; }
        
        body { 
            height: 100%; margin: 0; padding: 0; background-color: #f8fafc; overflow: hidden;
            font-family: "SF Pro TC", "SF Pro Display", "PingFang TC", "Noto Sans TC", sans-serif; 
            -webkit-font-smoothing: antialiased; 
        }

        .sidebar-item.active { background-color: rgba(255, 255, 255, 0.1); color: #ffffff; border-left: 3px solid #3b82f6; }
        .sidebar-item { border-left: 3px solid transparent; transition: all 0.2s ease; cursor: pointer; }
        .sidebar-item:hover:not(.active) { background-color: rgba(255, 255, 255, 0.05); color: #f8fafc; }

        iframe { border: none; width: 100%; height: 100%; background: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import ReactDOM from 'react-dom/client';
        
        // 匯入 Firebase Auth 的必要套件 (包含註冊用的 createUserWithEmailAndPassword)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDcsGfvVKnGmCzWfK5F03saydFpNc1ReYY",
            authDomain: "thu-isac-review.firebaseapp.com",
            projectId: "thu-isac-review",
            storageBucket: "thu-isac-review.firebasestorage.app",
            messagingSenderId: "453299876735",
            appId: "1:453299876735:web:1d8babca3315423161a04a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [contentUrl, setContentUrl] = useState('/manage/departments'); 
            
            const getCacheBustedUrl = (url) => {
                return `${url}?v=${new Date().getTime()}`;
            };

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            const handleLogout = () => {
                if (window.confirm("確定要登出系統嗎？")) {
                    signOut(auth);
                }
            };

            if (loading) return (
                <div className="h-full flex items-center justify-center bg-slate-50">
                    <div className="flex flex-col items-center gap-4">
                        <i className="fa-solid fa-circle-notch fa-spin text-4xl text-blue-600"></i>
                        <p className="text-slate-400 font-bold text-sm">系統載入中...</p>
                    </div>
                </div>
            );

            if (!user) return <LoginView />;

            const getPageTitle = () => {
                if (contentUrl.includes('dashboard')) return '總覽儀表板';
                if (contentUrl.includes('list')) return '學生待查核名單';
                if (contentUrl.includes('departments')) return '系所清單管理';
                if (contentUrl.includes('roles')) return '用戶權限管理';
                return 'ISAC 審查中心';
            };

            return (
                <div className="flex h-full overflow-hidden text-slate-800">
                    <aside className="w-64 bg-sidebar text-slate-300 flex flex-col shrink-0 z-20 shadow-xl">
                        <div className="h-16 flex items-center px-6 border-b border-slate-700/50">
                            <div className="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center mr-3 shadow-md">
                                <i className="fa-solid fa-shield-halved text-white text-lg"></i>
                            </div>
                            <span className="text-white font-bold text-lg tracking-wide">ISAC 審查中心</span>
                        </div>

                        <div className="flex-1 overflow-y-auto py-4 custom-scrollbar">
                            <div className="px-6 mb-2 text-xs font-bold text-slate-500 uppercase tracking-widest">主要業務</div>
                            <MenuBtn 
                                active={contentUrl === '/dashboard-content'} 
                                label="總覽儀表板" 
                                icon="fa-solid fa-table-cells-large" 
                                onClick={() => setContentUrl('/dashboard-content')} 
                            />
                            <MenuBtn 
                                active={contentUrl === '/list'} 
                                label="學生待查核名單" 
                                icon="fa-solid fa-users" 
                                onClick={() => setContentUrl('/list')} 
                            />

                            <div className="px-6 mt-8 mb-2 text-xs font-bold text-slate-500 uppercase tracking-widest">設定與維護</div>
                            
                            <MenuBtn 
                                active={contentUrl === '/manage/departments'} 
                                label="系所清單管理" 
                                icon="fa-solid fa-graduation-cap" 
                                onClick={() => setContentUrl('/manage/departments')} 
                            />
                            
                            {/* 新增用戶權限管理選單 */}
                            <MenuBtn 
                                active={contentUrl === '/manage/roles'} 
                                label="用戶權限管理" 
                                icon="fa-solid fa-user-shield" 
                                onClick={() => setContentUrl('/manage/roles')} 
                            />
                            
                            <div className="sidebar-item w-full flex items-center px-6 py-3 text-sm font-medium mb-1 text-slate-500 opacity-50 cursor-not-allowed">
                                <i className="fa-solid fa-file-contract text-lg mr-3 opacity-80 w-5 text-center"></i> 指標與表單設定
                            </div>
                        </div>

                        <div className="p-4 border-t border-slate-700/50">
                            <div className="flex items-center gap-3 px-2 py-2">
                                <div className="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-500 to-indigo-400 flex items-center justify-center text-white font-bold text-sm shadow-md">
                                    Ad
                                </div>
                                <div className="flex-1 overflow-hidden">
                                    <div className="text-sm font-bold text-white truncate">系統管理員</div>
                                    <div className="text-xs text-slate-500 truncate font-mono">{user.email}</div>
                                </div>
                                <button onClick={handleLogout} className="text-slate-400 hover:text-white transition-colors p-1" title="登出">
                                    <i className="fa-solid fa-arrow-right-from-bracket text-lg"></i>
                                </button>
                            </div>
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col h-full relative overflow-hidden bg-slate-50">
                        <header className="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 shrink-0 z-10 shadow-sm">
                            <div className="flex items-center gap-4">
                                <h2 className="text-lg font-bold text-slate-800">{getPageTitle()}</h2>
                            </div>
                            <div className="flex items-center gap-6">
                                <div className="relative hidden lg:block">
                                    <i className="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                                    <input type="text" className="pl-9 pr-4 py-1.5 bg-slate-100 border-transparent rounded-lg text-sm focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all w-64 outline-none" placeholder="搜尋系統內容..." />
                                </div>
                                <div className="h-6 w-px bg-slate-200"></div>
                                <div className="text-sm font-bold text-slate-700 flex items-center gap-2 cursor-pointer">
                                    114-1 學年度 <i className="fa-solid fa-bell text-slate-400 text-base"></i>
                                </div>
                            </div>
                        </header>

                        <div className="flex-1 overflow-hidden relative">
                            <iframe 
                                src={getCacheBustedUrl(contentUrl)} 
                                key={contentUrl}
                                className="animate-fade w-full h-full"
                                title="Content View"
                            />
                        </div>
                    </main>
                </div>
            );
        }

        function MenuBtn({ active, label, icon, onClick }) {
            return (
                <div onClick={onClick} className={`sidebar-item w-full flex items-center px-6 py-3 text-sm font-medium mb-1 ${active ? 'active' : ''}`}>
                    <i className={`${icon} text-lg mr-3 ${active ? 'opacity-100' : 'opacity-80'} w-5 text-center`}></i>
                    <span className="tracking-tight">{label}</span>
                </div>
            );
        }

        function LoginView() {
            const [isLoggingIn, setIsLoggingIn] = useState(false);
            const [isRegisterMode, setIsRegisterMode] = useState(false); // 控制登入/註冊模式

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsLoggingIn(true);
                const email = e.target.email.value.trim();
                const pw = e.target.password.value;

                if (isRegisterMode) {
                    // 註冊邏輯與信箱攔截規則
                    const isValidDomain = email === 'thu.isac.review@gmail.com' || email.endsWith('@thu.edu.tw');
                    
                    if (!isValidDomain) {
                        alert("註冊失敗：\n基於系統安全，僅限使用東海大學信箱 (@thu.edu.tw) 進行註冊！");
                        setIsLoggingIn(false);
                        return;
                    }

                    try {
                        await createUserWithEmailAndPassword(auth, email, pw);
                        // 註冊成功後，Firebase 會自動判定為已登入狀態，畫面會自動跳轉進系統
                    } catch (err) {
                        let errorMsg = err.message;
                        if (err.code === 'auth/email-already-in-use') errorMsg = "此信箱已經註冊過了！";
                        if (err.code === 'auth/weak-password') errorMsg = "密碼長度太弱，請至少輸入 6 個字元。";
                        alert("註冊發生錯誤：" + errorMsg);
                    } finally {
                        setIsLoggingIn(false);
                    }

                } else {
                    // 一般登入邏輯
                    try {
                        await signInWithEmailAndPassword(auth, email, pw);
                    } catch (err) {
                        alert("登入失敗：請確認帳號密碼是否正確。");
                    } finally {
                        setIsLoggingIn(false);
                    }
                }
            };

            return (
                <div className="h-full flex items-center justify-center bg-slate-50 p-4">
                    <form onSubmit={handleSubmit} className="bg-white p-10 rounded-[2rem] shadow-2xl w-full max-w-md border border-slate-100 animate-fade">
                        <div className="flex flex-col items-center mb-8 text-center">
                            <div className="w-16 h-16 rounded-2xl bg-blue-600 flex items-center justify-center mb-4 text-white shadow-lg shadow-blue-500/20 transition-all">
                                <i className={isRegisterMode ? "fa-solid fa-user-plus text-3xl" : "fa-solid fa-shield-halved text-3xl"}></i>
                            </div>
                            <h1 className="text-2xl font-black text-slate-800 tracking-tight">ISAC 審查管理系統</h1>
                            <p className="text-slate-400 text-sm mt-2 font-medium">
                                {isRegisterMode ? "建立新的系統用戶帳號" : "請登入帳號以開始作業"}
                            </p>
                        </div>
                        <div className="space-y-4">
                            <input name="email" type="email" placeholder="Email (@thu.edu.tw)" className="w-full bg-slate-50 border border-slate-200 p-4 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm font-medium" required />
                            <input name="password" type="password" placeholder="Password (至少6碼)" className="w-full bg-slate-50 border border-slate-200 p-4 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm font-medium" required />
                        </div>
                        <button disabled={isLoggingIn} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-bold shadow-xl transition-all mt-6 active:scale-[0.98] disabled:opacity-50 flex justify-center items-center gap-2">
                            {isLoggingIn ? (
                                <><i className="fa-solid fa-circle-notch fa-spin"></i> 處理中...</>
                            ) : (
                                isRegisterMode ? "確認註冊並登入" : "進入系統"
                            )}
                        </button>

                        <div className="mt-6 text-center">
                            <button type="button" onClick={() => setIsRegisterMode(!isRegisterMode)} className="text-sm font-bold text-slate-500 hover:text-blue-600 transition-colors">
                                {isRegisterMode ? "已經有帳號了？點此登入" : "還沒有帳號？註冊系統帳號"}
                            </button>
                        </div>
                    </form>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
